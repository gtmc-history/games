<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강화도 협상 테이블 — 1876년 2월</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Gowun+Batang&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT — 조선 말기 팔레트 (근현대 + 문서 질감)
═══════════════════════════════════════ */
:root {
  --bg:        #eee8dc;
  --bg2:       #e4ddd0;
  --surface:   #f5f0e6;
  --surface2:  #ede5d4;
  --primary:   #1a3a5c;   /* 관복 감색 */
  --primary2:  #244e7a;
  --accent:    #8b1a1a;   /* 인주 붉은색 */
  --accent2:   #b02020;
  --gold:      #8b6914;
  --gold2:     #b8860b;
  --sepia:     #6b5430;
  --ink:       #1c1410;
  --ink2:      #2d2018;
  --muted:     #7a6a50;
  --border:    #c4ae8a;
  --border2:   #9e8860;
  --safe:      #2d5a3d;
  --safe2:     #3d7a52;
  --warn:      #7a4a10;
  --danger:    #8b1a1a;

  --font-serif: 'Noto Serif KR', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
  --font-doc:   'Gowun Batang', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  /* 낡은 종이 노이즈 텍스처 */
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),
    radial-gradient(ellipse 120% 80% at 50% 0%, rgba(139,105,20,0.06) 0%, transparent 60%);
  display: flex;
  justify-content: center;
  padding: 0 12px 64px;
}

#app {
  width: 100%;
  max-width: 680px;
}

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--bg);
  border: 1px solid var(--border2); border-radius: 3px;
  padding: 10px 20px; font-size: 13px; font-family: var(--font-sans);
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
}
#toast.show { opacity: 1; }

/* ─── TOOLTIP ─── */
.tt {
  border-bottom: 1.5px dashed var(--gold2);
  cursor: pointer;
  white-space: nowrap;
  color: inherit;
  transition: border-color 0.15s;
}
.tt:hover { border-bottom-color: var(--accent); }

#tt-bubble {
  position: fixed; z-index: 9000; max-width: min(260px, 90vw);
  background: var(--ink); border: 1px solid rgba(139,105,20,0.6);
  border-radius: 3px; padding: 10px 13px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size: 12px; font-weight: 700; color: var(--gold2); margin-bottom: 5px; }
#tt-bubble .tb-desc { font-size: 12px; color: rgba(238,232,220,0.88); line-height: 1.7; }

/* ─── SCENE SHELL ─── */
.scene {
  animation: sceneIn 0.38s ease forwards;
  padding-top: 20px;
}
@keyframes sceneIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── PROGRESS BAR ─── */
.prog-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(238,232,220,0.95);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex; align-items: center; gap: 12px;
  backdrop-filter: blur(4px);
}
.prog-label { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; white-space: nowrap; font-family: var(--font-sans); }
.prog-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill  { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }
.prog-score { font-size: 13px; font-weight: 700; color: var(--primary); font-family: var(--font-sans); min-width: 60px; text-align: right; }

/* ─── DOCUMENT CARD ─── */
.doc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
  overflow: hidden;
  margin-bottom: 16px;
  /* 가로줄 텍스처 */
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px,
    rgba(160,140,100,0.06) 27px, rgba(160,140,100,0.06) 28px
  );
}

.doc-header {
  background: var(--primary);
  color: rgba(238,232,220,0.95);
  padding: 14px 20px 12px;
  display: flex; align-items: center; gap: 12px;
}
.doc-header-icon { font-size: 20px; }
.doc-header-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; flex: 1; }
.doc-header-sub { font-size: 11px; color: rgba(238,232,220,0.6); letter-spacing: 0.1em; }

.doc-body { padding: 20px 20px 22px; }

/* ─── ARTICLE NUMBER BADGE ─── */
.article-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--primary); color: rgba(238,232,220,0.95);
  font-size: 11px; letter-spacing: 0.18em;
  padding: 3px 10px; border-radius: 2px;
  font-family: var(--font-sans); margin-bottom: 12px;
}

/* ─── TREATY TEXT ─── */
.treaty-text {
  font-family: var(--font-doc);
  font-size: 15px; line-height: 1.95;
  color: var(--ink);
  border-left: 3px solid var(--border2);
  padding: 10px 14px;
  background: rgba(255,255,255,0.35);
  border-radius: 0 3px 3px 0;
  margin-bottom: 14px;
}
.treaty-text em { font-style: normal; color: var(--accent); font-weight: 600; }

/* ─── JAPAN NOTE (일본의 의도) ─── */
.japan-note {
  font-size: 12px; line-height: 1.75;
  color: var(--accent);
  border: 1px dashed rgba(139,26,26,0.35);
  background: rgba(139,26,26,0.04);
  border-radius: 3px;
  padding: 10px 13px;
  margin-bottom: 16px;
}
.japan-note::before {
  content: '🇯🇵 일본의 의도';
  display: block; font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; color: var(--accent);
  margin-bottom: 5px;
}

/* ─── PRESSURE METER ─── */
.pressure-box {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
  padding: 8px 12px;
  background: rgba(139,26,26,0.05);
  border: 1px solid rgba(139,26,26,0.15);
  border-radius: 3px;
}
.pressure-label { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: var(--font-sans); }
.pressure-track { flex: 1; height: 6px; background: rgba(139,26,26,0.12); border-radius: 3px; overflow: hidden; }
.pressure-fill  { height: 100%; background: linear-gradient(90deg, var(--warn), var(--accent)); border-radius: 3px; transition: width 0.5s ease; }
.pressure-val   { font-size: 11px; font-weight: 700; color: var(--accent); font-family: var(--font-sans); min-width: 32px; text-align: right; }

/* ─── CHOICE BUTTONS ─── */
.choice-label { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 10px; font-family: var(--font-sans); }

.choice-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }

.choice-btn {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 14px 16px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  font-family: var(--font-sans);
  border-left: 4px solid transparent;
}
.choice-btn:hover {
  transform: translateX(4px);
  background: rgba(255,255,255,0.6);
}
.choice-btn.accept { border-left-color: var(--safe); }
.choice-btn.accept:hover { border-color: var(--safe); border-left-color: var(--safe); }
.choice-btn.modify { border-left-color: var(--gold2); }
.choice-btn.modify:hover { border-color: var(--gold2); border-left-color: var(--gold2); }
.choice-btn.reject { border-left-color: var(--accent); }
.choice-btn.reject:hover { border-color: var(--accent); border-left-color: var(--accent); }

.choice-icon { font-size: 22px; flex-shrink: 0; line-height: 1.2; }
.choice-right { flex: 1; }
.choice-name  { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.choice-btn.accept .choice-name { color: var(--safe); }
.choice-btn.modify .choice-name { color: var(--warn); }
.choice-btn.reject .choice-name { color: var(--accent); }
.choice-desc  { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ─── SUB-CHOICE (수정안 선택) ─── */
.sub-choice-wrap {
  margin-top: 10px;
  padding: 14px 16px;
  background: rgba(184,134,11,0.06);
  border: 1px solid rgba(184,134,11,0.3);
  border-radius: 3px;
  animation: sceneIn 0.3s ease;
}
.sub-choice-label { font-size: 12px; color: var(--gold2); letter-spacing: 0.12em; margin-bottom: 10px; font-family: var(--font-sans); font-weight: 600; }
.sub-choice-grid  { display: flex; flex-direction: column; gap: 7px; }
.sub-btn {
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  font-size: 13px; font-family: var(--font-sans);
  color: var(--ink); line-height: 1.6;
  transition: background 0.15s, border-color 0.15s, transform 0.12s;
}
.sub-btn:hover {
  background: rgba(255,255,255,0.7);
  border-color: var(--gold2);
  transform: translateX(3px);
}

/* ─── FEEDBACK ─── */
.feedback-box {
  margin-top: 16px;
  border-radius: 3px;
  overflow: hidden;
  animation: sceneIn 0.35s ease;
}
.fb-result {
  padding: 12px 16px;
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-sans);
}
.fb-result.accept-fb { background: rgba(45,90,61,0.12); color: var(--safe); border-left: 4px solid var(--safe); }
.fb-result.modify-fb { background: rgba(122,74,16,0.1); color: var(--warn); border-left: 4px solid var(--gold2); }
.fb-result.reject-fb { background: rgba(139,26,26,0.1); color: var(--accent); border-left: 4px solid var(--accent); }

.fb-body {
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--border);
  border-top: none;
  padding: 14px 16px;
}
.fb-japan {
  font-size: 13px; color: var(--ink2); line-height: 1.8;
  margin-bottom: 10px;
  font-family: var(--font-sans);
}
.fb-history {
  font-size: 12px; color: var(--muted); line-height: 1.75;
  border-top: 1px dashed var(--border);
  padding-top: 10px;
  font-family: var(--font-sans);
}
.fb-history::before {
  content: '📜 실제 역사';
  display: block; font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em; color: var(--gold2);
  margin-bottom: 5px;
}
.fb-next-btn {
  width: 100%; margin-top: 14px;
  padding: 13px;
  background: var(--primary);
  color: rgba(238,232,220,0.95);
  border: none; border-radius: 3px;
  font-family: var(--font-serif); font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s;
  letter-spacing: 0.04em;
}
.fb-next-btn:hover { background: var(--primary2); transform: translateY(-1px); }
.fb-next-btn:active { transform: translateY(0) scale(0.98); }

/* ─── INTRO ─── */
.intro-wrap {
  padding: 32px 0 0;
}
.intro-eyebrow {
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--gold2); font-family: var(--font-sans);
  text-align: center; margin-bottom: 10px;
}
.intro-title {
  font-family: var(--font-serif);
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 700; text-align: center;
  color: var(--primary);
  line-height: 1.4; margin-bottom: 6px;
}
.intro-date {
  text-align: center; font-size: 13px;
  color: var(--muted); margin-bottom: 28px;
  font-family: var(--font-sans);
}

.intro-deco { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.intro-deco::before, .intro-deco::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}
.intro-deco span { font-size: 10px; letter-spacing: 0.25em; color: var(--gold2); white-space: nowrap; }

.intro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px 20px 22px;
  margin-bottom: 16px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px,
    rgba(160,140,100,0.05) 27px, rgba(160,140,100,0.05) 28px
  );
}

.intro-situation {
  font-size: 14px; line-height: 2; color: var(--ink);
  font-family: var(--font-sans); font-weight: 300;
  margin-bottom: 18px;
}
.intro-situation strong { color: var(--primary); font-weight: 600; }
.intro-situation em { color: var(--accent); font-style: normal; font-weight: 600; }

.role-box {
  background: rgba(26,58,92,0.06);
  border: 1px solid rgba(26,58,92,0.2);
  border-radius: 3px;
  padding: 14px 16px;
  margin-bottom: 18px;
}
.role-title { font-size: 11px; letter-spacing: 0.18em; color: var(--primary); margin-bottom: 8px; font-family: var(--font-sans); font-weight: 700; }
.role-name  { font-size: 16px; font-weight: 700; color: var(--primary); font-family: var(--font-serif); margin-bottom: 4px; }
.role-desc  { font-size: 12px; color: var(--muted); line-height: 1.7; font-family: var(--font-sans); }

.rule-list {
  display: flex; flex-direction: column; gap: 7px;
  margin-bottom: 20px;
}
.rule-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: var(--ink2); line-height: 1.6;
  font-family: var(--font-sans);
}
.rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold2); margin-top: 7px; flex-shrink: 0; }

.start-btn {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: rgba(238,232,220,0.95);
  border: none; border-radius: 3px;
  font-family: var(--font-serif); font-size: 16px; font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.15s, transform 0.12s;
}
.start-btn:hover { background: var(--primary2); transform: translateY(-2px); }
.start-btn:active { transform: translateY(0) scale(0.97); }

/* ─── PRESSURE EVENT ─── */
.pressure-event {
  background: rgba(139,26,26,0.06);
  border: 1px solid rgba(139,26,26,0.25);
  border-left: 4px solid var(--accent);
  border-radius: 0 3px 3px 0;
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 13px; line-height: 1.75;
  color: var(--ink); font-family: var(--font-sans);
  animation: sceneIn 0.3s ease;
}
.pressure-event strong { color: var(--accent); }
.pressure-event-title {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--accent); margin-bottom: 6px;
  font-weight: 700; font-family: var(--font-sans);
}

/* ─── PRESSURE MAX OVERLAY ─── */
.pressure-max-overlay {
  position: fixed; inset: 0;
  background: rgba(80,0,0,0.55);
  z-index: 800;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.25s ease;
}
.pressure-max-box {
  background: #1a0404;
  border: 2px solid var(--accent);
  border-radius: 3px;
  padding: 28px 24px;
  max-width: 380px; width: 100%;
  animation: sceneIn 0.3s ease;
  text-align: center;
}
.pressure-max-icon  { font-size: 44px; margin-bottom: 14px; }
.pressure-max-title { font-family: var(--font-serif); font-size: 20px; font-weight: 700; color: #f0a0a0; margin-bottom: 12px; }
.pressure-max-body  { font-size: 13px; line-height: 1.85; color: rgba(238,220,210,0.85); font-family: var(--font-sans); margin-bottom: 22px; }
.pressure-max-btn {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 3px;
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.pressure-max-btn:hover { background: var(--accent2); }

/* 거부 버튼 — 압박 MAX 시 경고 연출 */
.choice-btn.reject.pressure-warn {
  border-left-color: var(--accent);
  background: rgba(139,26,26,0.06);
  animation: rejectWarn 1.8s ease infinite;
}
@keyframes rejectWarn {
  0%, 100% { box-shadow: none; }
  50%       { box-shadow: inset 0 0 0 1px rgba(139,26,26,0.3); }
}
.reject-warn-label {
  font-size: 10px; color: var(--accent); font-family: var(--font-sans);
  margin-top: 5px; letter-spacing: 0.05em;
}

/* ─── CONFIRM DIALOG ─── */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(28,20,16,0.5);
  z-index: 800;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 24px 22px;
  max-width: 380px; width: 100%;
  animation: sceneIn 0.3s ease;
}
.confirm-title { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.confirm-body  { font-size: 14px; line-height: 1.8; color: var(--ink); font-family: var(--font-sans); margin-bottom: 20px; }
.confirm-btns  { display: flex; gap: 10px; }
.confirm-yes {
  flex: 1; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 3px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.confirm-yes:hover { background: var(--accent2); }
.confirm-no {
  flex: 1; padding: 12px;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border2); border-radius: 3px;
  font-family: var(--font-sans); font-size: 14px;
  cursor: pointer; transition: border-color 0.15s;
}
.confirm-no:hover { border-color: var(--border2); color: var(--ink); }

/* ─── FINAL ─── */
.final-wrap { padding: 24px 0 0; }

.final-banner {
  text-align: center;
  padding: 28px 20px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-bottom: 16px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px,
    rgba(160,140,100,0.05) 27px, rgba(160,140,100,0.05) 28px
  );
}
.final-icon  { font-size: 52px; margin-bottom: 14px; }
.final-title { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 8px; line-height: 1.35; }
.final-sub   { font-size: 13px; color: var(--muted); line-height: 1.75; font-family: var(--font-sans); }

.history-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}
.history-log-title {
  background: var(--ink2); color: rgba(238,232,220,0.9);
  padding: 10px 16px;
  font-size: 11px; letter-spacing: 0.18em;
  font-family: var(--font-sans); font-weight: 700;
}
.history-log-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.log-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 12px; font-family: var(--font-sans); line-height: 1.6;
  padding-bottom: 8px; border-bottom: 1px dashed var(--border);
}
.log-row:last-child { border-bottom: none; padding-bottom: 0; }

// tag별 조항 분류
const TAG_MAP = {
  경제: [4, 11, 9],
  군사: [7],
  주권: [1, 10],
};

function getPattern(log) {
  // log 항목별 저항 여부 (수정 or 거부 = 저항)
  const resistedIds = log
    .filter(l => l.logBadge !== 'badge-accept')
    .map(l => {
      const art = ARTICLES.find(a => a.label === l.label);
      return art ? art.id : null;
    }).filter(Boolean);

  const count = (ids) => ids.filter(id => resistedIds.includes(id)).length;

  return {
    경제: { resisted: count(TAG_MAP.경제), total: TAG_MAP.경제.length },
    군사: { resisted: count(TAG_MAP.군사), total: TAG_MAP.군사.length },
    주권: { resisted: count(TAG_MAP.주권), total: TAG_MAP.주권.length },
    total: resistedIds.length,
  };
}

function getResultType(pattern) {
  const { 경제, 군사, 주권, total } = pattern;

  if (total === 0) return {
    icon: '📜', title: '현실 타협형',
    color: '#6b5430',
    headline: '모든 조항을 수용했습니다.',
    body: '실제 강화도 조약과 같은 결과입니다. 군사력 열세 속에서 협상단이 할 수 있는 것은 많지 않았습니다. 이것이 당시 조선의 현실이었고, 이 조약이 출발점이 되어 조선은 30년 뒤 주권을 잃게 됩니다.',
  };

  if (total >= 5) return {
    icon: '🔥', title: '전방위 저항형',
    color: '#2d5a3d',
    headline: '거의 모든 조항에 저항했습니다.',
    body: '경제·군사·주권 어느 영역도 쉽게 내주지 않으려 했습니다. 원칙은 분명했지만, 군함 6척이 대기 중인 상황에서 협상력은 한계가 있었습니다. 역사는 의지만으로 바꾸기 어렵지만, 문제를 꿰뚫어 본 것 자체가 중요합니다.',
  };

  // 영역별 패턴 분석
  const 경제방어 = 경제.resisted >= 2;
  const 주권방어 = 주권.resisted >= 1;
  const 군사방어 = 군사.resisted >= 1;

  if (주권방어 && 경제방어 && !군사방어) return {
    icon: '⚖️', title: '경제·주권 방어형',
    color: '#1a3a5c',
    headline: '경제와 주권 조항을 지키려 했지만, 군사 정보는 내줬습니다.',
    body: '관세·무역·사법권에서 저항했습니다. 그러나 연안 측량권을 허용한 결과, 일본은 조선의 해안선을 군사적으로 파악하게 됩니다. 경제·주권의 형식을 지키면서도 군사적 열위는 굳어졌습니다.',
  };

  if (경제방어 && !주권방어) return {
    icon: '💰', title: '경제 방어형',
    color: '#7a4a10',
    headline: '경제 조항은 막으려 했지만, 주권 조항에서 타협했습니다.',
    body: '관세·무역 방어에 집중했습니다. 그러나 치외법권과 자주국 조항을 수용하면서 사법 주권이 사라졌습니다. 경제 방어선은 쳤지만, 법적·정치적 토대가 흔들리는 구조입니다.',
  };

  if (주권방어 && !경제방어) return {
    icon: '🏛️', title: '주권 방어형',
    color: '#1a3a5c',
    headline: '사법권과 자주권을 지키려 했지만, 경제 조항을 놓쳤습니다.',
    body: '치외법권·자주국 조항에서 저항했습니다. 그러나 관세 누락과 자유 무역을 수용하면서 경제 주권이 열렸습니다. 주권의 형식은 지켰지만, 경제의 실질은 일본 손에 넘어가는 구조입니다.',
  };

  return {
    icon: '📋', title: '부분 저항형',
    color: '#7a4a10',
    headline: '일부 조항에서 저항하고, 일부는 수용했습니다.',
    body: '선택적으로 저항했지만 일관된 방어선을 만들지는 못했습니다. 협상은 각 조항이 따로 작동하지 않습니다. 경제·군사·주권이 서로 연결된 구조라는 것이 이 조약의 핵심입니다.',
  };
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

let bubbleTimer = null;
document.addEventListener('click', function(e) {
  const bubble = document.getElementById('tt-bubble');
  const el = e.target.closest('.tt');
  if (el) {
    e.stopPropagation();
    bubble.querySelector('.tb-word').textContent = el.dataset.word;
    bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
    const rect = el.getBoundingClientRect();
    const bw = 260;
    let left = Math.max(8, Math.min(rect.left + rect.width / 2 - bw / 2, window.innerWidth - bw - 8));
    bubble.style.width = bw + 'px';
    bubble.style.left  = left + 'px';
    bubble.style.top   = '-9999px';
    bubble.classList.add('show');
    const bubH = bubble.offsetHeight;
    bubble.style.top = (rect.top - bubH - 14 < 8)
      ? (rect.bottom + 10) + 'px'
      : (rect.top - bubH - 14) + 'px';
    if (bubbleTimer) clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4000);
  } else {
    bubble.classList.remove('show');
  }
});

function R() {
  window.scrollTo(0, 0);
  const app = document.getElementById('app');
  app.innerHTML =
    S.phase==='intro'   ? renderIntro()   :
    S.phase==='final'   ? renderFinal()   :
                          renderGame();
  if (S.showConfirm) {
    document.body.insertAdjacentHTML('beforeend', renderConfirm());
  }
  if (S.showPressureMax) {
    document.body.insertAdjacentHTML('beforeend', renderPressureMax());
  }
}

  <div class="prog-bar">

  if (!S.feedbackData) {
    // 선택 전
    bodyHtml = `
    <div class="pressure-box">
      <span class="pressure-label">🇯🇵 압박 수위</span>

function renderChoices(art) {
  const pressureMax = S.pressure >= 100;
  return art.choices.map(c => {
    const selected = S.chosenType === c.type;
    const isRejectWarn = c.type === 'reject' && pressureMax;
    return `
    <button class="choice-btn ${c.type}${selected ? ' selected' : ''}${isRejectWarn ? ' pressure-warn' : ''}"
            onclick="selectChoice('${c.type}')">
      <span class="choice-icon">${c.icon}</span>
      <div class="choice-right">
        <div class="choice-name">${c.name}</div>
        <div class="choice-desc">${c.desc}</div>
        ${isRejectWarn ? '<div class="reject-warn-label">⚠ 압박이 극한에 달했습니다. 거부 시 돌이킬 수 없을 수 있습니다.</div>' : ''}
      </div>
    </button>`;
  }).join('');
}

function renderSubChoices(art) {
  const modifyChoice = art.choices.find(c => c.type === 'modify');
  if (!modifyChoice || !modifyChoice.subChoices) return '';
  return `
  <div class="sub-choice-wrap">
    <div class="sub-choice-label">✏️ 어떤 방식으로 수정을 요구하겠습니까?</div>
    <div class="sub-choice-grid">
      ${modifyChoice.subChoices.map((sc, idx) => `
        <button class="sub-btn" onclick="selectSubChoice(${idx})">${sc.text}</button>
      `).join('')}
    </div>
  </div>`;
}

// ─── FINAL ───
function renderFinal() {
  const pattern = getPattern(S.log);
  const result  = getResultType(pattern);

  if (!S._finalTracked) {
    track('finish_game', {
      result_type: result.title,
      resisted_total: pattern.total,
    });
    S._finalTracked = true;
  }

  // 내 선택 로그
  const logHtml = S.log.map(l => {
    const art = ARTICLES.find(a => a.label === l.label);
    const tagLabel = art ? `<span style="font-size:10px;padding:1px 7px;border-radius:2px;background:rgba(26,58,92,0.1);color:var(--primary);font-family:var(--font-sans);margin-left:6px">${art.tag}</span>` : '';
    const badge = l.logBadge === 'badge-accept' ? '수용' : l.logBadge === 'badge-modify' ? '수정' : '거부';
    return `
    <div class="log-row">
      <span class="log-article">${l.label}${tagLabel}</span>
      <span class="log-choice">${l.logChoice}</span>
      <span class="log-badge ${l.logBadge}">${badge}</span>
    </div>`;
  }).join('');

  // 실제 역사 비교
  const compareHtml = ARTICLES.map(art => {
    const myLog = S.log.find(l => l.label === art.label);
    const myBadge = myLog ? myLog.logBadge : 'badge-accept';
    const myChoice = myLog ? myLog.logChoice : '수용';
    const same = art.realChoice === '수용' ? myBadge === 'badge-accept' : myBadge !== 'badge-accept';
    return `
    <div class="compare-row">
      <span class="compare-article">${art.label}<br><span style="font-size:10px;color:var(--muted)">${art.tag}</span></span>
      <div class="compare-impact">
        <div style="display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap">
          <span style="font-size:11px;font-family:var(--font-sans)">나: <strong class="${myBadge === 'badge-accept'?'':''}"> ${myChoice}</strong></span>
          <span style="font-size:11px;color:var(--muted);font-family:var(--font-sans)">실제 조선: <strong>${art.realChoice}</strong> ${same?'<span style="color:var(--safe2)">일치</span>':'<span style="color:var(--accent)">차이</span>'}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--font-sans);line-height:1.6">${art.realNote}</div>
      </div>
    </div>`;
  }).join('');

  // 영역별 저항 현황
  const tagBarHtml = Object.entries(TAG_MAP).map(([tag, ids]) => {
    const p = pattern[tag];
    const pct = Math.round((p.resisted / p.total) * 100);
    const color = pct >= 67 ? 'var(--safe)' : pct >= 34 ? 'var(--warn)' : 'var(--accent)';
    return `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-family:var(--font-sans);color:var(--ink2)">${tag} 조항 (${ids.length}개)</span>
        <span style="font-size:12px;font-weight:700;font-family:var(--font-sans);color:${color}">${p.resisted}/${p.total} 저항</span>
      </div>
      <div style="height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width 0.6s ease"></div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="scene final-wrap">
    <div class="final-banner">
      <div class="final-icon">${result.icon}</div>
      <div class="final-title" style="color:${result.color}">${result.title}</div>
      <div style="font-size:14px;color:var(--muted);font-family:var(--font-sans);margin:6px 0 14px">${result.headline}</div>
      <div class="final-sub">${result.body}</div>
    </div>

    <div class="history-log">
      <div class="history-log-title">📊 영역별 저항 현황</div>
      <div class="history-log-body">${tagBarHtml}</div>
    </div>

    <div class="history-log">
      <div class="history-log-title">📋 내 협상 기록</div>
      <div class="history-log-body">${logHtml}</div>
    </div>

    <div class="compare-box">
      <div class="compare-title">🔍 내 선택 vs 실제 역사</div>
      <div class="compare-body">${compareHtml}</div>
    </div>

    <div class="insight-box">
      <div class="insight-title">💡 핵심 인사이트</div>
      강화도 조약은 조선이 체결한 최초의 근대적 조약이었습니다. 그러나 동시에
      <strong>불평등 조약의 시작</strong>이기도 했습니다. ${tt('치외법권')}과 ${tt('관세')} 누락,
      연안 ${tt('측량', '연안 측량')}권은 서로 독립된 문제가 아닙니다.
      군사·경제·주권이 맞물려 작동하면서, 조선은 이후 30년간 이 조약의 구조에서 벗어나지 못했습니다.
    </div>

    <div class="final-btns">
      <button class="btn-copy" onclick="copyResult()">📋 내 협상 결과 복사 (패들렛 공유용)</button>
      <button class="btn-restart" onclick="restart()">처음부터 다시 협상하기</button>
    </div>

    <div class="footer-credit">© 찰리쌤 · hischarlie.tistory.com</div>
  </div>`;
}

// ═══════════════════════════════════════
function startGame() {
  track('start_game');
  S.phase = 'game'; R();
}

function selectChoice(type) {
  if (S.feedbackData) return;
  if (type === S.chosenType && type !== 'modify') {
    S.chosenType = null; R(); return;
  }
  S.chosenType = type;
  S.subChosen  = null;

  if (type === 'reject') {
    S.showConfirm = true; R(); return;
  }
  if (type === 'accept') {
    applyChoice(type);
    return;
  }
  // modify → 수정 선택지 표시
  R();
}

function selectSubChoice(idx) {
  if (S.feedbackData) return;
  const art = ARTICLES[S.articleIdx];
  const modifyChoice = art.choices.find(c => c.type === 'modify');
  const sc = modifyChoice.subChoices[idx];
  S.subChosen = idx;

  track('select_sub_choice', {
    article_id: art.id,
    sub_index: idx,
  });

  S.feedbackData = {
    feedbackType: sc.feedbackType,
    feedbackIcon: sc.feedbackIcon,
    feedbackTitle: sc.feedbackTitle,
    japan: sc.japan,
    history: sc.history,
  };
  S.log.push({
    label: art.label,
    logChoice: sc.logChoice || ('수정 요구 ' + (idx + 1)),
    logBadge: 'badge-modify',
  });
  R();
}

function applyChoice(type) {
  const art = ARTICLES[S.articleIdx];
  const choice = art.choices.find(c => c.type === type);

  track('select_choice', {
    article_id: art.id,
    choice_type: type,
    pressure: S.pressure,
  });
  const prevPressure = S.pressure;
  if (choice.pressureUp) S.pressure = Math.min(100, S.pressure + 20);

  S.feedbackData = {
    feedbackType: choice.feedbackType,
    feedbackIcon: choice.feedbackIcon,
    feedbackTitle: choice.feedbackTitle,
    japan: choice.japan,
    history: choice.history,
  };
  S.log.push({
    label: art.label,
    logChoice: choice.logChoice || type,
    logBadge: choice.logBadge || (type === 'accept' ? 'badge-accept' : 'badge-reject'),
  });

  // 압박 수위 100% 최초 도달 시 경고 오버레이
  if (prevPressure < 100 && S.pressure >= 100) {
    S.showPressureMax = true;
  }

  R();
}

function closePressureMax() {
  document.getElementById('pressure-max-overlay')?.remove();
  S.showPressureMax = false;
}

function confirmReject() {
  document.getElementById('confirm-overlay')?.remove();
  S.showConfirm = false;
  applyChoice('reject');
}

function cancelReject() {
  document.getElementById('confirm-overlay')?.remove();
  S.showConfirm = false;
  S.chosenType = null;
  R();
}

function nextArticle() {
  track('complete_article', {
    article_id: ARTICLES[S.articleIdx].id,
  });
  S.articleIdx++;
  S.chosenType  = null;
  S.subChosen   = null;
  S.feedbackData = null;
  S.showConfirm  = false;
  if (S.articleIdx >= ARTICLES.length) {
    S.phase = 'final';
  }
  R();
}

function copyResult() {
  const pattern = getPattern(S.log);
  const result  = getResultType(pattern);
  const lines = [
    `📋 강화도 협상 테이블 — 내 결과`,
    ``,
    `역할: 조선 측 전권대관 신헌`,
    `결과 유형: ${result.title}`,
    `저항 조항: ${pattern.total}/6개`,
    ``,
    `── 영역별 저항 ──`,
    `경제 조항: ${pattern.경제.resisted}/${pattern.경제.total}개 저항`,
    `군사 조항: ${pattern.군사.resisted}/${pattern.군사.total}개 저항`,
    `주권 조항: ${pattern.주권.resisted}/${pattern.주권.total}개 저항`,
    ``,
    `── 조항별 선택 ──`,
    ...S.log.map(l => {
      const badge = l.logBadge === 'badge-accept' ? '수용' : l.logBadge === 'badge-modify' ? '수정 요구' : '거부';
      return `${l.label}: [${badge}] ${l.logChoice}`;
    }),
    ``,
    `── 한 줄 평가 ──`,
    result.headline,
    result.body,
    ``,
    `— 찰리쌤의 한국사 게임실`,
  ];
  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 결과가 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
    try { document.execCommand('copy'); showToast('📋 결과가 복사되었습니다!'); }
    catch (e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = {
    phase: 'intro', articleIdx: 0, pressure: 20,
    log: [], chosenType: null, subChosen: null,
    feedbackData: null, showConfirm: false,
    showPressureMax: false, _finalTracked: false,
  };
  R();
}

// START
R();
</script>
</body>
</html>
`;
