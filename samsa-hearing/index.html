<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>3사 청문회 — 이 임명을 막아라</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-serif: 'Noto Serif KR', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
  --ink:        #07090c;
  --ink2:       #0d1018;
  --ink3:       #141820;
  --gold:       #c9a052;
  --gold2:      #e8c97a;
  --gold-dim:   rgba(201,160,82,0.15);
  --border:     rgba(201,160,82,0.2);
  --text:       #e8dcc8;
  --muted:      #7a8090;
  /* 역할별 컬러 */
  --heon:   #c0392b;   /* 사헌부 — 붉은 기강 */
  --gan:    #2471a3;   /* 사간원 — 파란 논박 */
  --hong:   #1e8449;   /* 홍문관 — 녹색 학문 */
  --jang:   #7d6608;   /* 이조전랑 — 황갈 실리 */
  --heon-bg:  rgba(192,57,43,0.12);
  --gan-bg:   rgba(36,113,163,0.12);
  --hong-bg:  rgba(30,132,73,0.12);
  --jang-bg:  rgba(125,102,8,0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px 12px 60px;
}

/* ── 배경 패턴 ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(201,160,82,0.07) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a052' fill-opacity='0.025'%3E%3Cpath d='M20 20h-2v2h2v-2zm0-10h-2v2h2v-2zm10 10h-2v2h2v-2zm-20 0H8v2h2v-2z'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

#app { width: 100%; max-width: 460px; position: relative; z-index: 1; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink3); color: var(--gold2);
  border: 1px solid var(--gold); border-radius: 24px;
  padding: 10px 22px; font-size: 13px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#toast.show { opacity: 1; }

/* ── 공통 카드 ── */
.card {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
  box-shadow: 0 0 0 1px rgba(201,160,82,0.08), 0 20px 60px rgba(0,0,0,0.6);
}
.card::before {
  content: ''; display: block; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 헤더 ── */
.hdr {
  padding: 22px 20px 16px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.hdr-badge {
  width: 60px; height: 60px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 12px;
  border: 2px solid var(--gold);
  background: rgba(201,160,82,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.hdr-title {
  font-family: var(--font-serif);
  font-size: 19px; font-weight: 700; color: #f0e8d4; margin-bottom: 5px;
}
.hdr-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; }

/* ── BODY ── */
.body { padding: 18px 18px 24px; }

/* ── 버튼 ── */
.btn {
  width: 100%; padding: 13px; border: none; border-radius: 3px;
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.04em;
}
.btn + .btn { margin-top: 8px; }
.btn-gold { background: var(--gold); color: var(--ink); border: 1.5px solid var(--gold2); }
.btn-gold:hover:not(:disabled) { background: var(--gold2); transform: translateY(-1px); }
.btn-gold:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--muted); border: 1.5px solid rgba(150,130,100,0.3); }
.btn-outline:hover { border-color: var(--gold); color: var(--text); }
.btn-danger { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1.5px solid rgba(192,57,43,0.4); }
.btn-danger:hover { background: rgba(192,57,43,0.35); transform: translateY(-1px); }

/* ── 역할 카드 ── */
.role-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.role-card {
  border-radius: 4px; padding: 14px 16px;
  cursor: pointer; transition: all 0.18s;
  border: 1.5px solid transparent;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.role-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
}
.role-card.heon { background: var(--heon-bg); }
.role-card.heon::before { background: var(--heon); }
.role-card.heon:hover, .role-card.heon.selected { border-color: var(--heon); box-shadow: 0 0 0 1px var(--heon); }
.role-card.gan  { background: var(--gan-bg); }
.role-card.gan::before  { background: var(--gan); }
.role-card.gan:hover,  .role-card.gan.selected  { border-color: var(--gan);  box-shadow: 0 0 0 1px var(--gan); }
.role-card.hong { background: var(--hong-bg); }
.role-card.hong::before { background: var(--hong); }
.role-card.hong:hover, .role-card.hong.selected { border-color: var(--hong); box-shadow: 0 0 0 1px var(--hong); }
.role-card.jang { background: var(--jang-bg); }
.role-card.jang::before { background: var(--jang); }
.role-card.jang:hover, .role-card.jang.selected { border-color: var(--jang); box-shadow: 0 0 0 1px var(--jang); }
.role-card.selected::after {
  content: '✓'; position: absolute; top: 10px; right: 12px;
  font-size: 13px; font-weight: 700; color: var(--gold2);
}
.role-icon { font-size: 28px; flex-shrink: 0; }
.role-info { flex: 1; }
.role-name { font-size: 14px; font-weight: 700; color: #f0e8d4; margin-bottom: 3px; }
.role-heon .role-name { color: #e87060; }
.role-gan  .role-name { color: #60a8e8; }
.role-hong .role-name { color: #60c880; }
.role-jang .role-name { color: #d4a830; }
.role-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
.role-power {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  padding: 2px 8px; border-radius: 20px; margin-top: 5px; display: inline-block;
}
.heon .role-power { background: rgba(192,57,43,0.2); color: #e87060; }
.gan  .role-power { background: rgba(36,113,163,0.2); color: #60a8e8; }
.hong .role-power { background: rgba(30,132,73,0.2);  color: #60c880; }
.jang .role-power { background: rgba(125,102,8,0.2);  color: #d4a830; }

/* ── 안건 카드 ── */
.agenda-box {
  border: 1px solid var(--border); border-radius: 4px;
  padding: 16px; margin-bottom: 16px;
  background: rgba(255,255,255,0.02);
  position: relative;
}
.agenda-num {
  font-size: 10px; letter-spacing: 0.2em; color: var(--gold);
  margin-bottom: 8px; font-weight: 700;
}
.agenda-title {
  font-family: var(--font-serif); font-size: 16px; font-weight: 700;
  color: #f0e8d4; line-height: 1.5; margin-bottom: 10px;
}
.agenda-detail {
  font-size: 12px; color: var(--muted); line-height: 1.8;
  border-top: 1px solid var(--border); padding-top: 10px;
}
.agenda-detail strong { color: var(--text); }

/* ── 역할별 논거 ── */
.argument-box {
  border-radius: 4px; padding: 14px 16px; margin-bottom: 16px;
  border-left: 3px solid;
}
.argument-box.heon { background: var(--heon-bg); border-color: var(--heon); }
.argument-box.gan  { background: var(--gan-bg);  border-color: var(--gan); }
.argument-box.hong { background: var(--hong-bg); border-color: var(--hong); }
.argument-box.jang { background: var(--jang-bg); border-color: var(--jang); }
.argument-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.heon .argument-label, .argument-box.heon .argument-label { color: var(--heon); }
.argument-box.gan  .argument-label { color: var(--gan); }
.argument-box.hong .argument-label { color: var(--hong); }
.argument-box.jang .argument-label { color: var(--jang); }
.argument-text { font-size: 13px; color: var(--text); line-height: 1.8; }
.argument-text strong { color: var(--gold2); }

/* ── 선택 버튼 그룹 ── */
.decision-label {
  font-size: 11px; color: var(--muted); text-align: center;
  margin-bottom: 10px; letter-spacing: 0.1em;
}
.decision-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.dec-btn {
  padding: 13px 16px; border-radius: 3px; border: 1.5px solid transparent;
  cursor: pointer; transition: all 0.18s; text-align: left;
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-sans); background: rgba(255,255,255,0.03);
}
.dec-btn:hover { transform: translateY(-1px); }
.dec-btn.selected { box-shadow: 0 0 0 2px var(--gold2); }
.dec-btn.pass    { border-color: rgba(46,204,113,0.3); }
.dec-btn.pass:hover    { background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.6); }
.dec-btn.pass.selected { background: rgba(46,204,113,0.12); border-color: #2ecc71; }
.dec-btn.argue   { border-color: rgba(52,152,219,0.3); }
.dec-btn.argue:hover   { background: rgba(52,152,219,0.1); border-color: rgba(52,152,219,0.6); }
.dec-btn.argue.selected { background: rgba(52,152,219,0.12); border-color: #3498db; }
.dec-btn.block   { border-color: rgba(231,76,60,0.3); }
.dec-btn.block:hover   { background: rgba(231,76,60,0.1); border-color: rgba(231,76,60,0.6); }
.dec-btn.block.selected { background: rgba(231,76,60,0.12); border-color: #e74c3c; }
.dec-icon { font-size: 22px; flex-shrink: 0; }
.dec-right { flex: 1; }
.dec-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.pass  .dec-name { color: #2ecc71; }
.argue .dec-name { color: #3498db; }
.block .dec-name { color: #e74c3c; }
.dec-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── 타이머 ── */
.timer-wrap {
  text-align: center; margin-bottom: 16px;
  padding: 14px; border-radius: 4px;
  background: rgba(201,160,82,0.06); border: 1px solid var(--border);
}
.timer-label { font-size: 10px; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 6px; }
.timer-num {
  font-family: var(--font-serif); font-size: 36px; font-weight: 700;
  color: var(--gold2); line-height: 1;
}
.timer-num.urgent { color: #e74c3c; animation: timerPulse 0.5s ease infinite alternate; }
@keyframes timerPulse { from { opacity: 1; } to { opacity: 0.4; } }
.timer-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* ── 결과 화면 ── */
.result-choice {
  text-align: center; padding: 14px; border-radius: 4px;
  margin-bottom: 16px; border: 1px solid;
}
.result-choice.pass  { background: rgba(46,204,113,0.1);  border-color: #2ecc71; }
.result-choice.argue { background: rgba(52,152,219,0.1);  border-color: #3498db; }
.result-choice.block { background: rgba(231,76,60,0.1);   border-color: #e74c3c; }
.result-choice-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.result-choice-name  { font-size: 16px; font-weight: 700; }
.pass  .result-choice-name { color: #2ecc71; }
.argue .result-choice-name { color: #3498db; }
.block .result-choice-name { color: #e74c3c; }

.history-box {
  border: 1px dashed var(--border); border-radius: 3px;
  padding: 12px 14px; margin-bottom: 14px;
  font-size: 12px; line-height: 1.8; color: var(--text);
}
.history-box::before {
  content: '📜 실제 역사'; display: block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 6px;
}

/* ── 수치 바 ── */
.gauge-wrap { margin-bottom: 16px; }
.gauge-row { margin-bottom: 10px; }
.gauge-label {
  display: flex; justify-content: space-between;
  font-size: 11px; margin-bottom: 5px;
}
.gauge-name { color: var(--muted); }
.gauge-val  { font-weight: 700; color: var(--gold2); }
.gauge-bar {
  height: 7px; border-radius: 4px;
  background: rgba(255,255,255,0.07); overflow: hidden;
}
.gauge-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.gauge-trust .gauge-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); }
.gauge-gonron .gauge-fill { background: linear-gradient(90deg, #1e8449, #2ecc71); }
.gauge-change {
  font-size: 11px; font-weight: 700; margin-top: 3px; text-align: right;
}
.gauge-change.pos { color: #2ecc71; }
.gauge-change.neg { color: #e74c3c; }

/* ── 역할별 반응 ── */
.reactions { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.reaction-item {
  padding: 10px 12px; border-radius: 3px;
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 12px; line-height: 1.6;
  border-left: 2px solid;
}
.reaction-item.heon { background: var(--heon-bg); border-color: var(--heon); color: #e87060; }
.reaction-item.gan  { background: var(--gan-bg);  border-color: var(--gan);  color: #60a8e8; }
.reaction-item.hong { background: var(--hong-bg); border-color: var(--hong); color: #60c880; }
.reaction-item.jang { background: var(--jang-bg); border-color: var(--jang); color: #d4a830; }
.reaction-role { font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.reaction-text { color: var(--text); }

/* ── 라운드 진행 바 ── */
.round-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
}
.round-label { font-size: 11px; color: var(--gold); letter-spacing: 0.1em; white-space: nowrap; }
.round-pips  { flex: 1; display: flex; gap: 4px; }
.round-pip {
  flex: 1; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.07); transition: background 0.4s;
}
.round-pip.done   { background: var(--gold); }
.round-pip.active { background: #e74c3c; }
.round-score { font-size: 12px; font-weight: 700; color: var(--gold2); white-space: nowrap; }

/* ── 최종 결과 ── */
.final-banner { text-align: center; padding: 24px 0 18px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
.final-icon  { font-size: 56px; margin-bottom: 12px; }
.final-title { font-family: var(--font-serif); font-size: 22px; font-weight: 800; line-height: 1.3; }
.final-sub   { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.7; }
.final-score { font-size: 12px; color: var(--muted); margin-top: 8px; }

.summary-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
.summary-table th {
  padding: 8px 10px; text-align: left; color: var(--gold);
  font-size: 10px; letter-spacing: 0.1em; font-weight: 700;
  border-bottom: 1px solid var(--border);
}
.summary-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }
.summary-table td.pass  { color: #2ecc71; font-weight: 700; }
.summary-table td.argue { color: #3498db; font-weight: 700; }
.summary-table td.block { color: #e74c3c; font-weight: 700; }

.role-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  font-weight: 700; margin-bottom: 14px; border: 1px solid;
}
.role-badge.heon { background: var(--heon-bg); border-color: var(--heon); color: #e87060; }
.role-badge.gan  { background: var(--gan-bg);  border-color: var(--gan);  color: #60a8e8; }
.role-badge.hong { background: var(--hong-bg); border-color: var(--hong); color: #60c880; }
.role-badge.jang { background: var(--jang-bg); border-color: var(--jang); color: #d4a830; }

hr.div { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* 툴팁 */
.tt {
  border-bottom: 1.5px dashed var(--gold);
  cursor: pointer; white-space: nowrap; color: inherit;
  transition: border-color 0.15s;
}
.tt:hover { border-bottom-color: #e74c3c; }
#tt-bubble {
  position: fixed; z-index: 9000; max-width: 240px;
  background: var(--ink); border: 1px solid rgba(184,134,11,0.6);
  border-radius: 4px; padding: 10px 13px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size:12px; font-weight:700; color:var(--gold2); margin-bottom:5px; }
#tt-bubble .tb-desc { font-size:12px; color:rgba(240,228,192,0.85); line-height:1.7; }

@media (max-width: 480px) {
  .hdr-title { font-size: 17px; }
  .agenda-title { font-size: 15px; }
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script>
// ══════════════════════════════════════
// 툴팁
// ══════════════════════════════════════
const TIPS = {
  '사헌부': '사헌부(司憲府) — 관리의 비리·기강을 감찰하는 언론 삼사 중 하나.',
  '사간원': '사간원(司諫院) — 왕의 잘못된 명령에 직언하는 간쟁 담당 기관.',
  '홍문관': '홍문관(弘文館) — 학문 연구·경연·정책 자문을 담당하는 기관.',
  '이조전랑': '이조전랑(吏曹銓郎) — 3사 언관의 인사권과 후임 추천권을 가진 요직.',
  '서경': '서경(署經) — 관리 임명 시 사헌부·사간원이 동의 여부를 심사하는 절차. 인사 안건에만 쓰는 수단.',
  '간쟁': '간쟁(諫爭) — 신하가 왕의 잘못된 결정을 직언으로 바로잡으려는 행위.',
  '경연': '경연(經筵) — 왕과 신하가 함께 유교 경전을 공부하며 정사를 논하는 자리.',
  '언관': '언관(言官) — 언론 삼사(사헌부·사간원·홍문관) 소속의 관리 총칭.',
  '공론': '공론(公論) — 사림이 중시한 공적 여론. 왕권을 견제하는 명분의 근거.',
  '훈구': '훈구(勳舊) — 세조 찬위 등 공신 계열. 사림과 대립한 보수 세력.',

function tt(word, key) {
  const tip = TIPS[key||word] || '';
  if (!tip) return word;
  return `<span class="tt" data-tip="${encodeURIComponent(tip)}" data-word="${word}">${word}</span>`;
}

document.body.insertAdjacentHTML('beforeend',
  '<div id="tt-bubble"><div class="tb-word"></div><div class="tb-desc"></div></div>');
const bubble = document.getElementById('tt-bubble');
let bbTimer = null;
document.addEventListener('click', e => {
  const el = e.target.closest('.tt');
  if (el) {
    e.stopPropagation();
    bubble.querySelector('.tb-word').textContent = el.dataset.word;
    bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
    const rect = el.getBoundingClientRect();
    const bw = 240;
    const left = Math.max(8, Math.min(rect.left + rect.width/2 - bw/2, window.innerWidth - bw - 8));
    bubble.style.width = bw + 'px';
    bubble.style.left  = left + 'px';
    bubble.style.top   = '-9999px';
    bubble.classList.add('show');
    const bh = bubble.offsetHeight;
    bubble.style.top = (rect.top - bh - 14 < 8) ? (rect.bottom + 10) + 'px' : (rect.top - bh - 14) + 'px';
    if (bbTimer) clearTimeout(bbTimer);
    bbTimer = setTimeout(() => bubble.classList.remove('show'), 4000);
  } else {
    bubble.classList.remove('show');
  }
});

// 상태
// ══════════════════════════════════════
let S = {
  phase: 'intro',    // intro | role | game | result | between | final
  role: null,        // 선택한 역할 객체
  agendaIdx: 0,      // 현재 안건 인덱스 (0~5)
  decision: null,    // 현재 선택 (pass/argue/block)
  trust: 60,         // 왕 신뢰도 (0~100)
  gonron: 60,        // 공론 지지도 (0~100)
  history: [],       // [{agendaId, decision, trustChange, gonronChange}]
  timerVal: 120,
  timerRunning: false,
  timerHandle: null,
};

// ══════════════════════════════════════
// 유틸
// ══════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

function R() {
  window.scrollTo(0,0);
  const app = document.getElementById('app');
  app.innerHTML =
    S.phase === 'intro'       ? renderIntro()       :
    S.phase === 'role'        ? renderRole()        :
    S.phase === 'roleconfirm' ? renderRoleConfirm() :
    S.phase === 'game'        ? renderGame()        :
    S.phase === 'result'      ? renderResult()      :
    S.phase === 'between'     ? renderBetween()     :
                                renderFinal();
}

function decisionLabel(d, agendaIdx) {
  if (d === 'pass')  return '통과';
  if (d === 'argue') return '간쟁';
  // block: 인사 안건(0,2,4)은 서경 거부, 나머지는 연명 상소
  const idx = agendaIdx !== undefined ? agendaIdx : S.agendaIdx - 1;
  return [0, 2, 4].includes(idx) ? '서경 거부' : '연명 상소';
}

function roundBar() {
  const pips = AGENDAS.map((_,i) => {
    let c = 'round-pip';
    if (i < S.agendaIdx) c += ' done';
    else if (i === S.agendaIdx) c += ' active';
    return `<div class="${c}"></div>`;
  }).join('');
  const lowTrust   = S.trust < 30;
  const lowGonron  = S.gonron < 30;
  const warn = lowTrust || lowGonron;
  return `
  <div class="round-bar">
    <span class="round-label">📋 안건</span>
    <div class="round-pips">${pips}</div>
    <span class="round-score${warn?' urgent':''}">
      ${lowTrust?'⚠':'👑'}${S.trust} / ${lowGonron?'⚠':'🌿'}${S.gonron}
    </span>
  </div>`;
}

function renderGame() {
  const agenda = AGENDAS[S.agendaIdx];
  const arg = agenda.arguments[S.role.id];

  // 안건 1·3·5는 인사 안건 → 서경 거부 / 안건 2·4·6은 왕 행동 안건 → 연명 상소
  const isPersonnelAgenda = [0, 2, 4].includes(S.agendaIdx);
  const blockOption = isPersonnelAgenda
    ? { id:'block', icon:'🚫', name:'서경 거부', desc:`${tt('서경')} 거부로 임명을 막습니다. 공론↑, 왕 신뢰도 크게↓` }
    : { id:'block', icon:'📜', name:'연명 상소', desc:`${tt('연명 상소')}로 왕에게 집단 이의를 제기합니다. 공론↑, 왕 신뢰도↓` };

  const decButtons = [
    { id:'pass',  icon:'✅', name:'통과',  desc:`왕의 결정을 그대로 수용합니다. 왕 신뢰도↑, 공론↓` },
    { id:'argue', icon:'📢', name:'간쟁',  desc:`${tt('간쟁')}을 올려 왕의 결정에 이의를 제기합니다. 균형을 유지하는 선택.` },
    blockOption,
  ].map(d => `
    <div class="dec-btn ${d.id}${S.decision === d.id ? ' selected' : ''}"
         onclick="selectDecision('${d.id}')">
      <div class="dec-icon">${d.icon}</div>
      <div class="dec-right">
        <div class="dec-name">${d.name}</div>
        <div class="dec-desc">${d.desc}</div>
      </div>
    </div>`).join('');

  return `
  ${roundBar()}
  <div class="card">
    <div class="hdr">
      <div class="hdr-badge">${S.role.icon}</div>
      <div class="hdr-title">${S.role.title}</div>
      <div class="hdr-sub">안건 ${S.agendaIdx + 1} / ${AGENDAS.length}</div>
    </div>
    <div class="body">
      <div class="agenda-box">
        <div class="agenda-num">📋 안건 ${S.agendaIdx + 1}</div>
        <div class="agenda-title">${agenda.title}</div>
        <div class="agenda-detail">${agenda.detail}</div>
      </div>

      <div class="argument-box ${S.role.cls}">
        <div class="argument-label">⚡ ${S.role.name}의 관점</div>
        <div class="argument-text">${arg}</div>
      </div>

      <div style="background:rgba(201,160,82,0.06);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--muted);line-height:1.9">
        💬 <strong style="color:var(--text)">모둠 토론 시간</strong> — 각자 화면의 논거를 서로 공유하고 합의하세요.<br>

      <div class="decision-label">결정을 선택하세요</div>
      <div class="decision-grid">${decButtons}</div>

      <button class="btn btn-gold" ${S.decision ? '' : 'disabled'}

        결정 확정 →

}

// ══════════════════════════════════════
// 결과 화면
// ══════════════════════════════════════
function renderResult() {
  const agenda   = AGENDAS[S.agendaIdx];
  const dec      = S.decision;
  const res      = agenda.results[dec];
  const reactions = agenda.reactions[dec];

  const newTrust  = Math.max(0, Math.min(100, S.trust  + res.trust));
  const newGonron = Math.max(0, Math.min(100, S.gonron + res.gonron));

  // 내 역할 반응 먼저, 나머지는 접기
  const myReaction = `
    <div class="reaction-item ${S.role.cls}" style="border-width:2px;margin-bottom:4px">
      <span class="reaction-role">${S.role.icon} ${S.role.name} <span style="font-size:10px;opacity:0.7">(나)</span></span>
      <span class="reaction-text">${reactions[S.role.id]}</span>
    </div>`;

  const otherReactions = ROLES.filter(r => r.id !== S.role.id).map(r => `
    <div class="reaction-item ${r.cls}">
      <span class="reaction-role">${r.icon} ${r.name}</span>
      <span class="reaction-text">${reactions[r.id]}</span>
    </div>`).join('');

  const reactHtml = `
    ${myReaction}
    <details style="margin-top:4px">
      <summary style="font-size:11px;color:var(--muted);cursor:pointer;padding:6px 4px;list-style:none;display:flex;align-items:center;gap:6px">
        <span style="color:var(--gold)">▸</span> 다른 역할의 반응 보기
      </summary>
      <div style="margin-top:6px;display:flex;flex-direction:column;gap:6px">${otherReactions}</div>
    </details>`;

  const trustChange  = res.trust  >= 0 ? `+${res.trust}` : `${res.trust}`;
  const gonronChange = res.gonron >= 0 ? `+${res.gonron}` : `${res.gonron}`;

  return `
  ${roundBar()}
  <div class="card">
    <div class="hdr">
      <div class="hdr-badge">📊</div>
      <div class="hdr-title">안건 ${S.agendaIdx + 1} 결과</div>
      <div class="hdr-sub">${agenda.title}</div>
    </div>
    <div class="body">
      <div class="result-choice ${dec}">
        <div class="result-choice-label">모둠의 선택</div>
        <div class="result-choice-name">${decisionLabel(dec, S.agendaIdx)}</div>
      </div>

      <div class="gauge-wrap">
        <div class="gauge-row gauge-trust">
          <div class="gauge-label">
            <span class="gauge-name">👑 왕 신뢰도</span>
            <span class="gauge-val">${newTrust}</span>
          </div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${newTrust}%"></div></div>
          <div class="gauge-change ${res.trust >= 0 ? 'pos' : 'neg'}">${trustChange}</div>
        </div>
        <div class="gauge-row gauge-gonron">
          <div class="gauge-label">
            <span class="gauge-name">🌿 공론 지지도</span>
            <span class="gauge-val">${newGonron}</span>
          </div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${newGonron}%"></div></div>
          <div class="gauge-change ${res.gonron >= 0 ? 'pos' : 'neg'}">${gonronChange}</div>
        </div>
      </div>

      <div class="history-box">${res.history}</div>

      <div style="font-size:11px;color:var(--gold);letter-spacing:0.1em;margin-bottom:8px;font-weight:700">💬 역할별 반응</div>
      <div class="reactions">${reactHtml}</div>

      <button class="btn btn-gold" onclick="nextAgenda()">
        ${S.agendaIdx + 1 < AGENDAS.length ? '다음 안건으로 →' : '최종 결과 확인 →'}
      </button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// 비트윈 (라운드 사이 요약 — 3안건 후)
// ══════════════════════════════════════
function renderBetween() {
  const warningTrust  = S.trust < 30;
  const warningGonron = S.gonron < 30;

  const histHtml = S.history.map((h,i) => {
    const ag = AGENDAS[h.agendaId];
    const tch = h.trustChange >= 0 ? `+${h.trustChange}` : `${h.trustChange}`;
    const gch = h.gonronChange >= 0 ? `+${h.gonronChange}` : `${h.gonronChange}`;
    return `<tr>
      <td>${i+1}. ${ag.title.substring(0,18)}…</td>
      <td class="${h.decision}">${decisionLabel(h.decision, h.agendaId)}</td>
      <td style="color:${h.trustChange>=0?'#2ecc71':'#e74c3c'}">${tch}</td>
      <td style="color:${h.gonronChange>=0?'#2ecc71':'#e74c3c'}">${gch}</td>
    </tr>`;
  }).join('');

  return `
  <div class="card">
    <div class="hdr">
      <div class="hdr-badge">📋</div>
      <div class="hdr-title">전반 3안건 결산</div>
      <div class="hdr-sub">후반 3안건이 남았습니다</div>
    </div>
    <div class="body">
      <table class="summary-table">
        <thead><tr><th>안건</th><th>선택</th><th>👑</th><th>🌿</th></tr></thead>
        <tbody>${histHtml}</tbody>
      </table>
      <div class="gauge-wrap">
        <div class="gauge-row gauge-trust">
          <div class="gauge-label">
            <span class="gauge-name">👑 왕 신뢰도</span>
            <span class="gauge-val ${warningTrust ? 'urgent' : ''}">${S.trust}${warningTrust ? ' ⚠' : ''}</span>
          </div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${S.trust}%"></div></div>
        </div>
        <div class="gauge-row gauge-gonron">
          <div class="gauge-label">
            <span class="gauge-name">🌿 공론 지지도</span>
            <span class="gauge-val ${warningGonron ? 'urgent' : ''}">${S.gonron}${warningGonron ? ' ⚠' : ''}</span>
          </div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${S.gonron}%"></div></div>
        </div>
      </div>
      ${warningTrust ? '<div style="font-size:12px;color:#e74c3c;text-align:center;margin-bottom:10px;padding:8px;background:rgba(231,76,60,0.1);border-radius:3px;">⚠ 왕 신뢰도가 위험합니다. 후반 안건에서 왕의 역공이 거세질 수 있습니다.</div>' : ''}
      ${warningGonron ? '<div style="font-size:12px;color:#e74c3c;text-align:center;margin-bottom:10px;padding:8px;background:rgba(231,76,60,0.1);border-radius:3px;">⚠ 공론 지지도가 낮습니다. 언관의 목소리가 힘을 잃고 있습니다.</div>' : ''}
      <div style="background:rgba(201,160,82,0.06);border:1px solid var(--border);border-radius:4px;padding:12px 14px;margin-bottom:16px;font-size:12px;line-height:1.9">
        <div style="font-size:10px;letter-spacing:0.15em;color:var(--gold);font-weight:700;margin-bottom:8px">🧭 현재 상태 진단</div>
        ${(() => {
          const t = S.trust, g = S.gonron;
          if (t >= 50 && g >= 50) return '<span style="color:#60c880">균형이 잘 유지되고 있습니다. 후반에도 같은 방향으로 가되, 너무 한쪽으로 치우치지 않도록 주의하세요.</span>';
          if (t >= 50 && g < 50)  return '<span style="color:#e87060">공론이 너무 낮습니다. 후반엔 간쟁이나 연명 상소로 공론을 회복해야 균형을 찾을 수 있습니다.</span>';
          if (t < 50  && g >= 50) return '<span style="color:#60a8e8">왕 신뢰도가 낮습니다. 후반 안건 중 한두 개는 통과를 선택해 왕의 분노를 누그러뜨릴 필요가 있습니다.</span>';
          return '<span style="color:#e74c3c">왕 신뢰도와 공론 모두 위험합니다. 후반에는 안건을 신중하게 골라 균형을 회복하는 것이 최선입니다.</span>';
        })()}
      </div>
      <button class="btn btn-gold" onclick="continueToBetween()">후반 안건 시작 →</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// 최종 결과
// ══════════════════════════════════════
function renderFinal() {
  const t = S.trust, g = S.gonron;
  let icon, title, color, sub;

  if (t >= 50 && g >= 50) {
    icon='⚖️'; title='완벽한 균형'; color='var(--gold2)';
    sub='왕권과 공론 사이에서 균형을 지켰습니다. 언론 삼사가 제 기능을 했을 때 조선의 정치가 이런 모습이었습니다. 중종 초반 조광조 시대가 지향했던 이상에 가장 가깝습니다.';
    historyCue='📜 실제 역사 — 중종 초반(1515~1519) 조광조가 이상적 균형을 추구했으나 4년 만에 기묘사화로 무너졌습니다. 균형이 얼마나 유지하기 어려운지 보여주는 사례입니다.';
  } else if (t >= 50 && g < 50) {
    icon='👑'; title='왕의 도구가 되다'; color='#e87060';
    sub='공론이 무너지고 왕의 뜻만 남았습니다. 언관이 왕의 도구로 전락한 상태입니다. 삼사가 존재해도 제 기능을 못 하는 연산군 말기의 모습과 닮았습니다.';
    historyCue='📜 실제 역사 — 연산군(재위 1494~1506)은 언관들이 굴복하자 삼사를 사실상 무력화했습니다. 제 기능을 못하는 삼사는 있으나 마나였습니다.';
  } else if (t < 50 && g >= 50) {
    icon='🌿'; title='공론의 수호자'; color='#60c880';
    sub='왕의 신뢰를 잃었지만 공론을 지켰습니다. 조광조가 걸었던 길입니다. 공론이 강할수록 왕권의 역공도 거세졌습니다. 험하지만 역사는 이들을 기억합니다.';
    historyCue='📜 실제 역사 — 기묘사화(1519) 직전 조광조 세력의 선택과 가장 닮았습니다. 공론을 지키려 했지만 훈구의 역공으로 조광조는 사사되었습니다.';
  } else {
    icon='💥'; title='모든 것을 잃다'; color='#e74c3c';
    sub='왕의 신뢰도 잃고 공론도 사라졌습니다. 언관이 방향을 잃으면 왕권도 신권도 모두 무너집니다. 훈구와 왕 모두에게 외면받은 최악의 상황입니다.';
    historyCue='📜 실제 역사 — 무오사화(1498) 이후 언관들이 방향을 잃고 왕권과 훈구 사이에서 갈팡질팡했을 때 조선 정치가 가장 혼란스러웠습니다.';
  }

  const histHtml = S.history.map((h,i) => {
    const ag = AGENDAS[h.agendaId];
    const tch = h.trustChange >= 0 ? `+${h.trustChange}` : `${h.trustChange}`;
    const gch = h.gonronChange >= 0 ? `+${h.gonronChange}` : `${h.gonronChange}`;
    return `<tr>
      <td>${i+1}. ${ag.title.substring(0,16)}…</td>
      <td class="${h.decision}">${decisionLabel(h.decision, h.agendaId)}</td>
      <td style="color:${h.trustChange>=0?'#2ecc71':'#e74c3c'}">${tch}</td>
      <td style="color:${h.gonronChange>=0?'#2ecc71':'#e74c3c'}">${gch}</td>
    </tr>`;
  }).join('');

  const roleCls = S.role?.cls || 'heon';

  return `
  <div class="card">
    <div class="hdr">
      <div class="hdr-badge">🏛️</div>
      <div class="hdr-title">최종 결과</div>
      <div class="hdr-sub">6개 안건 처리 완료</div>
    </div>
    <div class="body">
      <div class="final-banner">
        <div class="final-icon">${icon}</div>
        <div class="final-title" style="color:${color}">${title}</div>
        <div class="final-sub">${sub}</div>
        <div class="final-score">👑 왕 신뢰도 ${t} · 🌿 공론 지지도 ${g}</div>
      </div>
      <div style="background:rgba(201,160,82,0.07);border:1px dashed rgba(201,160,82,0.35);border-radius:4px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text);line-height:1.8">
        ${historyCue}
      </div>
      <div class="role-badge ${roleCls}">${S.role.icon} ${S.role.title}로 플레이</div>
      <table class="summary-table">
        <thead><tr><th>안건</th><th>선택</th><th>👑</th><th>🌿</th></tr></thead>
        <tbody>${histHtml}</tbody>
      </table>
      <div class="gauge-wrap">
        <div class="gauge-row gauge-trust">
          <div class="gauge-label"><span class="gauge-name">👑 최종 왕 신뢰도</span><span class="gauge-val">${t}</span></div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${t}%"></div></div>
        </div>
        <div class="gauge-row gauge-gonron">
          <div class="gauge-label"><span class="gauge-name">🌿 최종 공론 지지도</span><span class="gauge-val">${g}</span></div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${g}%"></div></div>
        </div>
      </div>
      <button class="btn btn-gold" onclick="copyResult()" style="margin-bottom:8px">
        📋 결과 복사하기 (패들렛 공유용)
      </button>
      <button class="btn btn-outline" onclick="restart()">다시 플레이하기</button>
      <div style="text-align:center;margin-top:20px;font-size:11px;color:rgba(201,160,82,0.35);letter-spacing:0.05em">
        © 찰리쌤 · hischarlie.tistory.com
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// 이벤트
// ══════════════════════════════════════
function goRole()  { S.phase = 'role'; R(); }

function selectRole(id) {
  S.role = ROLES.find(r => r.id === id);
  R();
}

function startGame() {
  if (!S.role) return;
  S.phase = 'roleconfirm';
  R();
}

function confirmRole() {
  S.agendaIdx = 0; S.decision = null;
  S.trust = 60; S.gonron = 60; S.history = [];
  S.phase = 'game';
  R();
}

      <button class="btn btn-outline" style="margin-top:8px" onclick="goRole()">← 역할 다시 선택</button>
    </div>
  </div>`;
}

function selectDecision(d) {
  S.decision = d; R();
}

function submitDecision() {
  if (!S.decision) return;
  const agenda = AGENDAS[S.agendaIdx];
  const res    = agenda.results[S.decision];
  S.trust  = Math.max(0, Math.min(100, S.trust  + res.trust));
  S.gonron = Math.max(0, Math.min(100, S.gonron + res.gonron));
  S.history.push({
    agendaId:    S.agendaIdx,
    decision:    S.decision,
    trustChange: res.trust,
    gonronChange: res.gonron,
  });
  S.phase = 'result';
  R();
}

function nextAgenda() {
  // 3안건 후 중간 결산
  if (S.agendaIdx === 2) {
    S.agendaIdx++;
    S.phase = 'between';
    R();
    return;
  }
  S.agendaIdx++;
  if (S.agendaIdx >= AGENDAS.length) {
    S.phase = 'final';
  } else {
    S.decision = null;
    S.phase = 'game';
  }
  R();
}

function continueToBetween() {
  S.decision = null;
  S.phase = 'game';
  R();
}

function copyResult() {
  const lines = [
    `⚖️ 3사 청문회 — ${S.role.title}로 플레이`,
    `👑 왕 신뢰도: ${S.trust} / 🌿 공론 지지도: ${S.gonron}`,
    '',
    ...S.history.map((h,i) => {
      const ag = AGENDAS[h.agendaId];
      return `${i+1}. ${ag.title} → ${decisionLabel(h.decision, h.agendaId)} (👑${h.trustChange>=0?'+':''}${h.trustChange} / 🌿${h.gonronChange>=0?'+':''}${h.gonronChange})`;
    }),
  ];
  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 결과가 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 결과가 복사되었습니다!'); }
    catch(e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = { phase:'intro', role:null, agendaIdx:0, decision:null, trust:60, gonron:60, history:[], timerVal:120, timerRunning:false, timerHandle:null };
  R();
}

R();
</script>
