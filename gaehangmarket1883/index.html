<title>내 돈이 사라진다 — 개항장 상인 1883</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   근현대 테마 — 세피아 + 개항기 분위기
   ═══════════════════════════════════ */
:root {
  --bg:        #1a1410;
  --bg2:       #231c16;
  --surface:   #2e2519;
  --surface2:  #3a2f22;
  --primary:   #c8892a;   /* 황동색 — 개항기 동전 */
  --primary2:  #e8aa4a;
  --accent:    #8b1a1a;   /* 적색 — 위기 */
  --safe:      #2d5a3d;   /* 녹색 — 이익 */
  --safe2:     #4a8a5d;
  --text:      #f0e6d0;
  --text-mid:  #c8b89a;
  --text-dim:  #8a7a62;
  --border:    rgba(200,137,42,0.25);
  --border2:   rgba(200,137,42,0.5);
  --sepia:     #8b7355;

  --font-title: 'Black Han Sans', sans-serif;
  --font-serif: 'Noto Serif KR', serif;
  --font-body:  'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  padding: 12px 12px 60px;
  /* 낡은 종이 노이즈 */
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,137,42,0.06) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8892a' fill-opacity='0.025'%3E%3Crect x='0' y='0' width='1' height='1'/%3E%3Crect x='20' y='20' width='1' height='1'/%3E%3Crect x='40' y='60' width='1' height='1'/%3E%3Crect x='60' y='10' width='1' height='1'/%3E%3C/g%3E%3C/svg%3E");
}

#app { width: 100%; max-width: 520px; }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); color: var(--primary2);
  border: 1px solid var(--primary); border-radius: 4px;
  padding: 10px 20px; font-size: 13px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
}
#toast.show { opacity: 1; }

/* ─── TOOLTIP ─── */
.tt {
  border-bottom: 1.5px dashed var(--primary);
  cursor: pointer;
  white-space: nowrap;
  color: inherit;
  transition: border-color 0.15s;
}
.tt:hover { border-bottom-color: var(--accent); }
#tt-bubble {
  position: fixed; z-index: 9000;
  max-width: 240px;
  background: var(--bg2);
  border: 1px solid rgba(200,137,42,0.6);
  border-radius: 4px;
  padding: 10px 13px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.7);
  pointer-events: none;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size: 12px; font-weight: 700; color: var(--primary2); margin-bottom: 5px; }
#tt-bubble .tb-desc { font-size: 12px; color: rgba(240,228,192,0.85); line-height: 1.7; }

/* ─── PANEL ─── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  animation: fadeUp 0.35s ease;
  position: relative;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 모서리 장식 */
.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-style: solid;
  border-color: var(--primary);
  opacity: 0.4; z-index: 2;
}
.panel::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
.panel::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

/* ─── HEADER BAR ─── */
.hbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky; top: 0; z-index: 50;
}
.hbar-title {
  font-family: var(--font-serif);
  font-size: 13px; color: var(--primary);
  letter-spacing: 0.05em;
}
.hbar-capital {
  font-size: 13px; font-weight: 700;
  font-family: var(--font-body);
}
.capital-num {
  font-size: 18px; font-weight: 700;
  transition: color 0.4s;
}
.capital-up   { color: var(--safe2); }
.capital-mid  { color: var(--primary2); }
.capital-down { color: var(--accent); animation: warnPulse 0.8s ease infinite alternate; }
@keyframes warnPulse { from{opacity:1;} to{opacity:0.5;} }

/* 라운드 pip */
.round-pips { display: flex; gap: 5px; align-items: center; }
.pip {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  transition: background 0.3s;
}
.pip.done    { background: var(--text-dim); }
.pip.active  { background: var(--primary); }
.pip.danger  { background: var(--accent); }

/* ─── INTRO ─── */
.intro-hdr {
  padding: 28px 24px 20px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.intro-badge {
  width: 70px; height: 70px; border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--bg2);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 16px;
}
.intro-title {
  font-family: var(--font-title);
  font-size: 26px; color: var(--text);
  margin-bottom: 6px;
}
.intro-sub {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.2em; margin-top: 6px;
}
.intro-body { padding: 20px 22px 28px; }
.intro-desc {
  font-size: 14px; line-height: 2; color: var(--text-mid);
  font-family: var(--font-serif);
  border-left: 3px solid var(--primary);
  padding: 12px 16px;
  background: rgba(200,137,42,0.06);
  border-radius: 0 3px 3px 0;
  margin-bottom: 20px;
}
.intro-desc strong { color: var(--primary2); }

.setup-row {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.setup-card {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 14px 12px; text-align: center;
}
.setup-val { font-size: 22px; font-weight: 700; color: var(--primary2); margin-bottom: 4px; }
.setup-key { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }

/* ─── SCENE (라운드 화면) ─── */
.scene-hdr {
  padding: 22px 22px 16px;
  border-bottom: 1px solid var(--border);
}
.round-badge {
  display: inline-block;
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--primary); border: 1px solid var(--border2);
  padding: 3px 10px; border-radius: 2px; margin-bottom: 10px;
}
.scene-title {
  font-family: var(--font-serif);
  font-size: 19px; font-weight: 700;
  color: var(--text); line-height: 1.4; margin-bottom: 6px;
}
.scene-year {
  font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em;
}
.scene-body { padding: 18px 22px 24px; }

/* 상황 설명 박스 */
.situation {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 14px 16px; margin-bottom: 18px;
  font-size: 13px; line-height: 1.9; color: var(--text-mid);
}
.situation strong { color: var(--text); }

/* 선택지 카드 */
.choices { display: flex; flex-direction: column; gap: 9px; margin-bottom: 6px; }
.choice {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: 3px; padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s, transform 0.15s;
  display: flex; align-items: flex-start; gap: 12px;
}
.choice:hover {
  border-left-color: var(--primary);
  background: rgba(200,137,42,0.08);
  transform: translateX(3px);
}
.choice.selected {
  border-color: var(--primary);
  border-left-color: var(--primary);
  background: rgba(200,137,42,0.12);
}
.choice-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
.choice-text { flex: 1; }
.choice-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.choice-why {
  font-size: 12px; color: var(--text-mid); line-height: 1.6;
  font-style: italic;
}
.choice-why em { color: var(--safe2); font-style: normal; font-weight: 700; }

/* ─── RESULT (1차 결과 — 희망) ─── */
.result-hope {
  padding: 22px 22px 16px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.result-hope-icon { font-size: 48px; margin-bottom: 10px; }
.result-hope-title {
  font-family: var(--font-serif);
  font-size: 18px; color: var(--safe2); margin-bottom: 6px;
}
.gain-badge {
  display: inline-block;
  background: rgba(45,90,61,0.3);
  border: 1px solid var(--safe2);
  border-radius: 3px; padding: 6px 18px;
  font-size: 20px; font-weight: 700; color: var(--safe2);
  font-family: var(--font-body);
  margin-top: 8px;
}

/* ─── RESULT (2차 결과 — 규칙 개입) ─── */
.rule-box {
  margin: 0 22px 18px;
  border: 1px solid rgba(139,26,26,0.5);
  border-radius: 3px; overflow: hidden;
  animation: ruleIn 0.5s 0.3s ease both;
}
@keyframes ruleIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rule-header {
  background: rgba(139,26,26,0.25);
  padding: 10px 14px;
  font-size: 11px; font-weight: 700;
  color: #d44; letter-spacing: 0.15em;
  display: flex; align-items: center; gap: 8px;
}
.rule-body {
  padding: 14px 16px;
  background: rgba(139,26,26,0.08);
}
.rule-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 8px;
}
.rule-desc {
  font-size: 12px; color: var(--text-mid); line-height: 1.8;
  margin-bottom: 10px;
}
.rule-effect {
  display: flex; gap: 8px; align-items: center;
  padding-top: 8px; border-top: 1px dashed rgba(139,26,26,0.3);
}
.before-val {
  font-size: 13px; color: var(--safe2); font-weight: 700;
  text-decoration: line-through; opacity: 0.6;
}
.arrow-txt { font-size: 13px; color: var(--text-dim); }
.after-val { font-size: 16px; color: var(--accent); font-weight: 700; }
.loss-note { font-size: 11px; color: #d44; margin-left: auto; font-style: italic; }

/* 최종 자산 표시 */
.capital-result {
  margin: 0 22px 22px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 3px; padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.cr-label { font-size: 12px; color: var(--text-dim); }
.cr-val {
  font-size: 20px; font-weight: 700;
  font-family: var(--font-body);
}

/* ─── 화폐정리 미션 ─── */
.currency-mission {
  padding: 20px 22px 24px;
}
.mission-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 3px; padding: 16px; margin-bottom: 16px;
}
.mission-label {
  font-size: 11px; letter-spacing: 0.15em; color: var(--primary);
  margin-bottom: 10px;
}
.currency-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px dashed rgba(200,137,42,0.15);
}
.currency-row:last-child { border-bottom: none; }
.c-name { font-size: 13px; color: var(--text-mid); }
.c-val  { font-size: 16px; font-weight: 700; color: var(--text); }
.c-rate { font-size: 11px; color: var(--accent); }

.exchange-calc {
  background: rgba(139,26,26,0.1);
  border: 1px solid rgba(139,26,26,0.4);
  border-radius: 3px; padding: 16px; margin-bottom: 16px;
}
.calc-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.calc-step {
  font-size: 12px; color: var(--text-mid); line-height: 2;
}
.calc-step .hi { color: var(--accent); font-weight: 700; }

.exchange-btn {
  width: 100%; padding: 16px;
  background: var(--accent);
  border: none; border-radius: 3px;
  color: #fff; font-size: 15px; font-weight: 700;
  font-family: var(--font-serif);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 8px;
}
.exchange-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(139,26,26,0.4);
}
.exchange-btn:active { transform: scale(0.97); }

/* ─── 자산 감소 애니메이션 ─── */
@keyframes capitalDrop {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.15); color: var(--accent); }
  100% { transform: scale(1); }
}
.capital-drop { animation: capitalDrop 0.6s ease; }

/* ─── FINAL ─── */
.final-banner {
  padding: 28px 22px 20px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.final-icon { font-size: 56px; margin-bottom: 12px; }
.final-title {
  font-family: var(--font-title); font-size: 24px;
  color: var(--text); margin-bottom: 8px;
}
.final-sub {
  font-size: 13px; color: var(--text-mid); line-height: 1.8;
}
.final-capital {
  font-size: 13px; color: var(--text-dim); margin-top: 8px;
}
.final-body { padding: 20px 22px 28px; }

/* 라운드 요약 */
.round-summary { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.rs-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 3px; border: 1px solid transparent;
  font-size: 12px;
}
.rs-row.green { background: rgba(45,90,61,0.12); border-color: rgba(74,138,93,0.3); }
.rs-row.red   { background: rgba(139,26,26,0.10); border-color: rgba(139,26,26,0.3); }
.rs-icon  { font-size: 16px; flex-shrink: 0; }
.rs-name  { flex: 1; color: var(--text-mid); }
.rs-delta { font-weight: 700; }
.rs-delta.pos { color: var(--safe2); }
.rs-delta.neg { color: var(--accent); }

/* 역사 해설 박스 */
.hist-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  border-radius: 0 3px 3px 0; padding: 14px 16px;
  margin-bottom: 18px;
}
.hist-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  color: var(--primary); margin-bottom: 8px;
}
.hist-text {
  font-size: 12px; color: var(--text-mid); line-height: 1.9;
}
.hist-text strong { color: var(--text); }

/* 발문 */
.question-box {
  background: rgba(200,137,42,0.08);
  border: 1px solid var(--border2);
  border-radius: 3px; padding: 16px; margin-bottom: 20px;
}
.q-label {
  font-size: 10px; letter-spacing: 0.2em; color: var(--primary);
  margin-bottom: 10px;
}
.q-text {
  font-family: var(--font-serif);
  font-size: 14px; color: var(--text); line-height: 1.9;
}
.q-text li { margin-left: 16px; margin-bottom: 4px; }

/* 소감 */
.comment-area {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 12px 14px;
  color: var(--text); font-family: var(--font-body); font-size: 13px;
  resize: none; outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.comment-area:focus { border-color: var(--primary); }
.comment-area::placeholder { color: var(--text-dim); }

/* 저작권 */
.copyright {
  font-size: 11px; color: rgba(120,100,80,0.4);
  text-align: center; margin-top: 14px;
}

/* ─── BUTTON ─── */
.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 3px;
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.04em;
}
.btn + .btn { margin-top: 8px; }
.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--primary); color: var(--bg); }
.btn-primary:hover:not(:disabled) { background: var(--primary2); }
.btn-safe    { background: var(--safe); color: #fff; }
.btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--text); }

/* ─── 씬 전환 ─── */
.scene-enter { animation: fadeUp 0.35s ease; }

/* ─── 역사 해설 (라운드 결과 하단) ─── */
.hist-note {
  margin: 0 22px 18px;
  background: rgba(200,137,42,0.05);
  border: 1px dashed rgba(200,137,42,0.3);
  border-radius: 3px; padding: 12px 14px;
  font-size: 12px; color: var(--text-dim); line-height: 1.9;
}
.hist-note::before {
  content: '📜 역사 기록';
  display: block; font-size: 10px; font-weight: 700;
  color: var(--primary); letter-spacing: 0.15em; margin-bottom: 6px;
}

/* ─── 희망 결과 타이머 ─── */
.hope-wait {
  font-size: 12px; color: var(--text-dim); text-align: center;
  margin-bottom: 16px; font-style: italic;
  animation: dotPulse 1.2s ease infinite;
}
@keyframes dotPulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}
</style>
</head>

<div id="app"></div>

function tt(word, tipKey) {
  const k = tipKey || word;
  const tip = TIPS[k] || '';
  if (!tip) return word;
  return `<span class="tt" data-tip="${encodeURIComponent(tip)}" data-word="${word}">${word}</span>`;
}

  const choices = {};
  S.history.forEach((h, i) => {
    choices[`r${i+1}`] = { choiceId: h.choiceId, finalGain: h.final };
  });
  fetch(`${SUPABASE_URL}/rest/v1/game_results`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({
      class: CLASS,
      game: 'gaehangmarket1883',
      choices,
      comment: comment || '',
      timestamp: new Date().toISOString(),
    }),
  }).catch(() => {});
}

/* ═══════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function capitalColor() {
  const pct = S.capital / START_CAPITAL;
  if (pct >= 0.6) return 'capital-up';
  if (pct >= 0.3) return 'capital-mid';
  return 'capital-down';
}

function pipHtml() {
  return ROUNDS.map((r, i) => {
    let cls = 'pip';
    if (i < S.ri) cls += ' done';
    else if (i === S.ri) cls += S.ri >= 3 ? ' danger active' : ' active';
    return `<div class="${cls}" title="${r.label}"></div>`;
  }).join('');
}

function hbar() {
  return `
  <div class="hbar">
    <div class="hbar-title">개항장 상인</div>
    <div class="round-pips">${pipHtml()}</div>
    <div class="hbar-capital">
      <span class="capital-num ${capitalColor()}">${S.capital}</span>
      <span style="font-size:11px;color:var(--text-dim)"> 냥</span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
function R() {
  window.scrollTo(0, 0);
  document.getElementById('app').innerHTML =
    S.phase === 'intro'    ? renderIntro()    :
    S.phase === 'select'   ? renderSelect()   :
    S.phase === 'hope'     ? renderHope()     :
    S.phase === 'rule'     ? renderRule()     :
    S.phase === 'currency' ? renderCurrency() :
                             renderFinal();
}

/* ─── FINAL ─── */
function renderFinal() {
  const pct = S.capital / START_CAPITAL;
  let icon, title, titleColor, sub;

  if (pct >= 0.8) {
    icon = '🏆'; title = '기적의 생존'; titleColor = 'var(--primary2)';
    sub = '어떻게 이렇게 버텼을까요? 하지만 주위를 보면 동료 상인들은 대부분 폐업했습니다.';
  } else if (pct >= 0.5) {
    icon = '😤'; title = '버텨냈지만…'; titleColor = 'var(--primary)';
    sub = '겨우 살아남았습니다. 처음보다 절반 가까이 잃었습니다. 내가 못해서일까요, 규칙이 문제였을까요?';
  } else if (pct >= 0.25) {
    icon = '📉'; title = '거의 다 잃었다'; titleColor = 'var(--sepia)';
    sub = '시작보다 3/4를 잃었습니다. 어느 라운드부터 이상했는지 돌아보세요.';
  } else {
    icon = '💸'; title = '파산'; titleColor = 'var(--accent)';
    sub = '100냥이 이렇게 됐습니다. 당신이 잘못한 게 있었나요?';
  }

  const histRows = S.history.map((h, i) => {
    const round = ROUNDS[i];
    const card = round.choices.find(c => c.id === h.choiceId);
    const isPos = h.final > 0;
    return `
    <div class="rs-row ${isPos ? 'green' : 'red'}">
      <span class="rs-icon">${card ? card.icon : '💰'}</span>
      <span class="rs-name">${round.label} — ${card ? card.name : '화폐교환'}</span>
      <span class="rs-delta ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${h.final}냥</span>
    </div>`;
  }).join('');

  // 화폐정리 행
  const currencyDelta = S.capital - (S.history.reduce((a, h) => a + h.final, START_CAPITAL));
  const currRow = `
  <div class="rs-row red">
    <span class="rs-icon">💱</span>
    <span class="rs-name">5라운드 — 화폐정리사업</span>
    <span class="rs-delta neg">${currencyDelta}냥</span>
  </div>`;

  return `
  <div class="panel scene-enter">
    <div class="final-banner">
      <div class="final-icon">${icon}</div>
      <div class="final-title" style="color:${titleColor}">${title}</div>
      <div class="final-sub">${sub}</div>

    </div>
    <div class="final-body">
      <div style="font-size:12px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:10px">📋 라운드별 기록</div>
      <div class="round-summary">${histRows}${currRow}</div>

      <div class="question-box">
        <div class="q-label">💬 수업 토론 질문</div>

            <li>어느 라운드부터 이상하다고 느꼈나요?</li>
            <li>누가 규칙을 바꿨나요? 왜?</li>
          </ul>
        </div>
      </div>

      <div class="hist-box">
        <div class="hist-label">📖 역사적 정리</div>
        <div class="hist-text">
          열강의 경제 침탈은 <strong>거류지 무역 → 내지행상 허용 → 관세 불균형 → 화폐정리</strong> 순서로
          조선 상인의 선택 공간을 단계적으로 좁혀갔습니다.
          조선 상인이 무능해서가 아니라, <strong>규칙 자체가 불리하게 설계된 구조</strong>였습니다.
        </div>
      </div>

      <textarea class="comment-area" id="comment" rows="2"
        placeholder="한 줄 소감을 남겨보세요. (이름·학번 제외)"

      <button class="btn btn-outline" onclick="restart()">처음부터 다시</button>

      <div class="copyright">© 찰리쌤 · hischarlie.tistory.com</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════ */
function startGame() {
  S.ri = 0;
  S.phase = 'select';
  R();
}

function selectChoice(id) {
  S.chosen = id;
  R();
}

function submitChoice() {
  if (!S.chosen) return;
  S.phase = 'hope';
  R();
}

function showRule() {
  const round = ROUNDS[S.ri];
  const card = round.choices.find(c => c.id === S.chosen);

  // 자본 갱신
  S.capital += card.finalGain;
  if (S.capital < 0) S.capital = 0;

  // 기록 저장
  S.history.push({
    round: round.id,
    choiceId: S.chosen,
    hope: card.hope.gain,
    final: card.finalGain,
    delta: card.finalGain,
  });

  S.phase = 'rule';
  R();
}

function nextRound() {
  S.ri++;
  S.chosen = null;

  if (S.ri === ROUNDS.length - 1) {
    // 5라운드 = 화폐정리
    S.phase = 'currency';
  } else {
    S.phase = 'select';
  }
  R();
}

function doExchange(exchanged) {
  const before = S.capital;
  S.capital = exchanged;
  S.exchanged = true;

  // 화폐정리 기록
  S.history.push({
    round: 'r5',
    choiceId: 'currency',
    hope: before,
    final: -(before - exchanged),
    delta: -(before - exchanged),
  });

  R();
}

function goFinal() {
  S.phase = 'final';
  if (!S.submitted) {
    sendToSupabase('');
    S.submitted = true;
  }
  R();
}

function copyResult() {
  const comment = document.getElementById('comment')?.value?.trim() || '';
  if (comment) sendToSupabase(comment);

  const pct = Math.round(S.capital / START_CAPITAL * 100);
  const lines = [
    `💸 개항장 상인 1883 — 최종 자본: ${S.capital}냥 (시작 100냥의 ${pct}%)`,
    '',
    ...S.history.map((h, i) => {
      const round = ROUNDS[Math.min(i, ROUNDS.length - 1)];
      const sign = h.final >= 0 ? '+' : '';
      return `${round.label}: ${sign}${h.final}냥`;
    }),
    '',
    comment ? `소감: ${comment}` : '',
    '— 찰리쌤의 한국사 게임실',
  ].filter(l => l !== undefined);

  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast('📋 복사되었습니다!'); }
    catch (e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = {
    phase: 'intro', ri: 0, capital: START_CAPITAL,
    chosen: null, history: [], submitted: false, exchanged: false,
  };
  R();
}

/* ═══════════════════════════════════════════
   TOOLTIP EVENTS
   ═══════════════════════════════════════════ */
const bubble = document.getElementById('tt-bubble');
let bubTimer = null;

document.addEventListener('click', function(e) {
  const el = e.target.closest('.tt');
  if (el) {
    e.stopPropagation();
    bubble.querySelector('.tb-word').textContent = el.dataset.word;
    bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
    const rect = el.getBoundingClientRect();
    const bw = 240;
    const left = Math.max(8, Math.min(rect.left + rect.width / 2 - bw / 2, window.innerWidth - bw - 8));
    bubble.style.width = bw + 'px';
    bubble.style.left = left + 'px';
    bubble.style.top = '-9999px';
    bubble.classList.add('show');
    const bH = bubble.offsetHeight;
    bubble.style.top = (rect.top - bH - 14 < 8)
      ? (rect.bottom + 10) + 'px'
      : (rect.top - bH - 14) + 'px';
    if (bubTimer) clearTimeout(bubTimer);
    bubTimer = setTimeout(() => bubble.classList.remove('show'), 4000);
  } else {
    bubble.classList.remove('show');
  }
});
