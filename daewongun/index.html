<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대원군의 결단 — 무너지는 조선을 세워라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   조선 팔레트
═══════════════════════════════════ */
:root {
  --bg:       #f2ece0;
  --bg2:      #e8dfd0;
  --surface:  #ede5d5;
  --surface2: #e0d5c0;
  --primary:  #1a3a5c;
  --accent:   #8b1a1a;
  --gold:     #b8860b;
  --gold2:    #d4a82a;
  --text:     #1c1410;
  --text-mid: #3a2e20;
  --muted:    #7a6e5a;
  --border:   #c8b88a;
  --border2:  #a09070;
  --jade:     #2e6e52;
  --jade2:    #48a07a;
  --g-king:     #8b1a1a;
  --g-noble:    #1a3a5c;
  --g-people:   #2e6e52;
  --g-treasury: #b8860b;
  --font-serif: 'Noto Serif KR', 'Gowun Batang', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
  --font-doc:   'Gowun Batang', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),
    linear-gradient(160deg, #f5ede0 0%, #ece0cc 100%);
}

#app { max-width: 740px; margin: 0 auto; padding: 0 16px 80px; }

/* ─── 토스트 ─── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #f0e8d4;
  border-radius: 4px; padding: 10px 22px;
  font-size: 13px; opacity: 0; pointer-events: none;
  white-space: nowrap; z-index: 9999; transition: opacity 0.3s;
}
#toast.show { opacity: 1; }

/* ─── 툴팁 ─── */
.tt { border-bottom: 1.5px dashed var(--gold); cursor: pointer; color: inherit; }
.tt:hover { border-bottom-color: var(--accent); }
#tt-bubble {
  position: fixed; z-index: 9000; max-width: 260px;
  background: #1c1a14; border: 1px solid rgba(184,134,11,0.55);
  border-radius: 4px; padding: 10px 13px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size: 12px; font-weight: 700; color: var(--gold2); margin-bottom: 5px; }
#tt-bubble .tb-desc { font-size: 12px; color: rgba(240,228,192,0.85); line-height: 1.7; }

/* ─── 애니메이션 ─── */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
@keyframes stampIn {
  0%  { transform: scale(2.2) rotate(-8deg); opacity: 0; }
  60% { transform: scale(0.92) rotate(2deg); opacity: 1; }
  100%{ transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes gaugePulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }
.scene { animation: fadeUp 0.4s ease both; }

/* ─── 페이퍼 ─── */
.paper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  box-shadow: 0 0 0 4px var(--bg), 0 0 0 5px var(--border2), 0 8px 32px rgba(0,0,0,0.12);
  position: relative; overflow: hidden;
}
.paper::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(160,140,100,0.04) 32px,rgba(160,140,100,0.04) 33px);
}
.paper > * { position: relative; z-index: 1; }
.cr { position:absolute; width:20px; height:20px; border-style:solid; opacity:0.4; z-index:2; border-color:var(--gold); }
.cr.tl{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}
.cr.tr{top:8px;right:8px;border-width:1.5px 1.5px 0 0;}
.cr.bl{bottom:8px;left:8px;border-width:0 0 1.5px 1.5px;}
.cr.br{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}

/* ─── 헤더 ─── */
.hdr { padding: 28px 24px 20px; text-align: center; border-bottom: 1px solid var(--border); }
.hdr-eyebrow { font-size:11px; letter-spacing:0.25em; color:var(--gold); font-family:var(--font-sans); margin-bottom:10px; }
.hdr-title { font-family:var(--font-serif); font-size:clamp(1.3rem,3.5vw,1.75rem); font-weight:700; color:var(--primary); line-height:1.4; margin-bottom:6px; }
.hdr-sub { font-size:13px; color:var(--muted); font-family:var(--font-sans); font-weight:300; }

/* ─── 게이지 바 ─── */
.gauge-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(242,236,224,0.97);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
  backdrop-filter: blur(4px);
}
.gauge-item { display:flex; flex-direction:column; gap:4px; }
.gauge-label { font-size:10px; color:var(--muted); font-family:var(--font-sans); letter-spacing:0.06em; }
.gauge-track { height:7px; background:rgba(0,0,0,0.08); border-radius:4px; overflow:hidden; }
.gauge-fill { height:100%; border-radius:4px; transition:width 0.5s cubic-bezier(0.34,1.2,0.64,1); }
.gauge-fill.king     { background:var(--g-king); }
.gauge-fill.noble    { background:var(--g-noble); }
.gauge-fill.people   { background:var(--g-people); }
.gauge-fill.treasury { background:var(--g-treasury); }
.gauge-fill.warn     { animation:gaugePulse 0.6s ease infinite; }
.gauge-val { font-size:10px; font-weight:700; font-family:var(--font-sans); text-align:right; }
.gauge-val.king{color:var(--g-king);}
.gauge-val.noble{color:var(--g-noble);}
.gauge-val.people{color:var(--g-people);}
.gauge-val.treasury{color:var(--g-treasury);}

/* ─── 도입 대시보드 ─── */
.intro-lead {
  font-family:var(--font-serif); font-size:15px; color:var(--text-mid);
  line-height:2; padding:16px 24px 8px; text-align:center;
}
.intro-lead strong { color:var(--accent); }

.dash-section-label {
  font-size:10px; letter-spacing:0.2em; color:var(--gold);
  font-family:var(--font-sans); font-weight:700;
  padding:12px 20px 6px; text-transform:uppercase;
}
.dashboard {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  padding:0 20px 8px;
}
.dashboard.two-col { grid-template-columns:1fr 1fr; }
.dash-card {
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:3px; padding:12px 13px;
}
.dash-icon { font-size:20px; margin-bottom:5px; }
.dash-label { font-size:10px; letter-spacing:0.1em; color:var(--muted); font-family:var(--font-sans); margin-bottom:3px; }
.dash-value { font-family:var(--font-serif); font-size:13px; font-weight:700; color:var(--accent); line-height:1.4; }
.dash-scene { font-size:11px; color:var(--muted); font-family:var(--font-sans); margin-top:4px; line-height:1.5; font-style:italic; }

.intro-divider {
  margin:8px 20px;
  padding:12px 16px;
  background:var(--primary);
  border-radius:3px;
  font-family:var(--font-serif);
  font-size:14px; color:#f0e8d4;
  line-height:1.8; text-align:center;
}
.intro-divider strong { color:var(--gold2); }

.intro-question {
  margin:8px 20px 0;
  background:rgba(26,58,92,0.06);
  border:1px solid rgba(26,58,92,0.15);
  border-left:3px solid var(--primary);
  border-radius:0 3px 3px 0;
  padding:14px 16px;
  font-family:var(--font-serif);
  font-size:14px; color:var(--text-mid); line-height:1.9;
}
.intro-question strong { color:var(--primary); }

/* ─── 카드 화면 ─── */
.reform-card {
  margin:12px 20px 0;
  background:#faf6ee;
  border:1px solid var(--border);
  border-top:3px solid var(--primary);
  border-radius:3px; padding:18px 18px 16px;
}
.rc-eyebrow { font-size:10px; letter-spacing:0.2em; color:var(--gold); font-family:var(--font-sans); margin-bottom:8px; }
.rc-title { font-family:var(--font-serif); font-size:20px; font-weight:700; color:var(--primary); margin-bottom:6px; }
.rc-target {
  display:inline-block; font-size:11px; padding:3px 10px;
  background:rgba(26,58,92,0.08); border:1px solid rgba(26,58,92,0.2);
  border-radius:2px; color:var(--primary); font-family:var(--font-sans); margin-bottom:12px;
}
.rc-voice {
  font-family:var(--font-doc); font-size:14px; color:var(--text-mid);
  line-height:1.9; border-left:3px solid var(--border2);
  padding-left:12px; margin-bottom:14px; font-style:italic;
}
.rc-voice strong { color:var(--accent); font-style:normal; font-weight:700; }

/* ─── 선택 버튼 ─── */
.choice-area { display:flex; flex-direction:column; gap:10px; padding:16px 20px 24px; }
.choice-btn {
  width:100%; background:var(--surface);
  border:1.5px solid var(--border); border-left:4px solid var(--primary);
  border-radius:3px; padding:15px 16px;
  cursor:pointer; text-align:left;
  transition:all 0.18s; font-family:var(--font-sans);
}
.choice-btn:hover { border-color:var(--primary); background:rgba(26,58,92,0.05); transform:translateX(3px); }
.choice-btn:active { transform:translateX(0) scale(0.98); }
.choice-btn.b-type { border-left-color:var(--gold); }
.choice-btn.b-type:hover { border-color:var(--gold); background:rgba(184,134,11,0.05); }
.cb-label { font-size:11px; letter-spacing:0.12em; color:var(--muted); margin-bottom:5px; font-weight:500; }
.cb-text { font-size:15px; font-weight:700; color:var(--text); line-height:1.4; font-family:var(--font-serif); }
.cb-sub { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.5; }

/* ─── 피드백 오버레이 ─── */
.feedback-overlay {
  position:fixed; inset:0; background:rgba(28,20,16,0.7);
  z-index:500; display:flex; align-items:center; justify-content:center; padding:20px;
}
.feedback-box {
  background:var(--surface); border:1px solid var(--border); border-radius:3px;
  max-width:480px; width:100%; padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeUp 0.35s ease; position:relative;
}
.fb-stamp {
  position:absolute; top:-12px; right:20px; font-size:36px; line-height:1;
  animation:stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
.fb-title { font-family:var(--font-serif); font-size:18px; font-weight:700; color:var(--primary); margin-bottom:8px; }
.fb-result { font-size:13px; color:var(--text-mid); line-height:1.9; margin-bottom:14px; font-family:var(--font-sans); }
.fb-result strong { color:var(--accent); font-weight:700; }
.fb-unexpected {
  background:rgba(139,26,26,0.06); border:1px solid rgba(139,26,26,0.2);
  border-left:3px solid var(--accent); border-radius:0 3px 3px 0;
  padding:10px 13px; margin-bottom:14px;
  font-size:13px; font-family:var(--font-serif);
  color:var(--text-mid); line-height:1.8; font-style:italic;
}
.fb-unexpected::before { content:'⚡ 예상치 못한 결과'; display:block; font-size:10px; font-weight:700; font-style:normal; color:var(--accent); letter-spacing:0.15em; margin-bottom:5px; font-family:var(--font-sans); }
.fb-hist {
  border:1px dashed var(--border2); border-radius:3px; padding:11px 13px;
  font-size:12px; color:var(--muted); line-height:1.8; font-family:var(--font-sans); margin-bottom:18px;
}
.fb-hist::before { content:'📜 실제 역사'; display:block; font-size:10px; font-weight:700; color:var(--gold); letter-spacing:0.15em; margin-bottom:5px; }
.fb-changes { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.fb-pill {
  font-size:12px; padding:4px 11px; border-radius:20px;
  font-family:var(--font-sans); font-weight:700; border:1px solid;
}
.fp-king-up   { background:rgba(139,26,26,0.1); border-color:var(--g-king); color:var(--g-king); }
.fp-noble-up  { background:rgba(26,58,92,0.1); border-color:var(--g-noble); color:var(--primary); }
.fp-people-up { background:rgba(46,110,82,0.1); border-color:var(--g-people); color:var(--jade); }
.fp-people-dn { background:rgba(139,26,26,0.08); border-color:var(--accent); color:var(--accent); }
.fp-treasury-up { background:rgba(184,134,11,0.1); border-color:var(--g-treasury); color:var(--gold); }
.fp-treasury-dn { background:rgba(139,26,26,0.08); border-color:var(--accent); color:var(--accent); }
.fb-btn {
  width:100%; background:var(--primary); color:#f0e8d4;
  border:none; border-radius:3px; padding:13px;
  font-size:14px; font-weight:700; font-family:var(--font-serif);
  cursor:pointer; transition:all 0.18s; letter-spacing:0.04em;
}
.fb-btn:hover { background:#24527a; transform:translateY(-1px); }

/* ─── 버튼 ─── */
.btn { width:100%; padding:13px; border:none; border-radius:3px; font-family:var(--font-serif); font-size:14px; font-weight:700; cursor:pointer; transition:all 0.18s; letter-spacing:0.04em; }
.btn + .btn { margin-top:8px; }
.btn-primary { background:var(--primary); color:#f0e8d4; border:1.5px solid rgba(26,58,92,0.5); }
.btn-primary:hover { background:#24527a; transform:translateY(-1px); }
.btn-outline { background:transparent; color:var(--muted); border:1.5px solid var(--border2); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }

/* ─── 고종 이벤트 화면 ─── */
.gojong-scroll {
  font-family:var(--font-doc); font-size:14px; color:var(--text-mid);
  line-height:2; border-left:3px solid var(--accent);
  padding:14px 16px; margin-bottom:14px;
  background:rgba(139,26,26,0.04); border-radius:0 3px 3px 0;
}
.gojong-scroll::before { content:'📜 최익현의 상소 (1873)'; display:block; font-size:10px; font-weight:700; color:var(--accent); letter-spacing:0.15em; margin-bottom:8px; font-family:var(--font-sans); font-style:normal; }

/* ─── 결과 화면 ─── */
.result-banner { padding:28px 24px 20px; text-align:center; border-bottom:1px solid var(--border); }
.result-icon { font-size:52px; margin-bottom:12px; }
.result-title { font-family:var(--font-serif); font-size:22px; font-weight:700; line-height:1.4; margin-bottom:8px; }
.result-sub { font-size:13px; color:var(--muted); font-family:var(--font-sans); line-height:1.7; }
.result-cause {
  margin:0 20px 16px;
  background:rgba(26,58,92,0.05); border:1px solid rgba(26,58,92,0.15);
  border-left:3px solid var(--primary);
  border-radius:0 3px 3px 0; padding:14px 16px;
  font-size:14px; color:var(--text-mid); line-height:1.9; font-family:var(--font-serif);
}
.result-cause strong { color:var(--accent); }

.result-history {
  margin:0 20px 16px; border:1px solid var(--border); border-radius:3px; overflow:hidden;
}
.rh-title { background:var(--surface2); padding:9px 14px; font-size:11px; font-weight:700; color:var(--primary); letter-spacing:0.1em; font-family:var(--font-sans); }
.rh-row {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  border-top:1px solid rgba(200,184,138,0.3); font-size:13px;
}
.rh-emoji { font-size:18px; flex-shrink:0; }
.rh-name { flex:1; font-family:var(--font-serif); color:var(--text); }
.rh-choice { font-size:11px; padding:2px 8px; border-radius:2px; border:1px solid; }
.rh-choice.a-type { border-color:var(--primary); color:var(--primary); background:rgba(26,58,92,0.07); }
.rh-choice.b-type { border-color:var(--gold); color:var(--gold); background:rgba(184,134,11,0.07); }

/* ─── 성찰 선택지 ─── */
.eval-section { margin:0 20px 16px; }
.eval-question {
  font-size:10px; letter-spacing:0.12em; color:var(--muted);
  font-family:var(--font-sans); margin-bottom:8px;
}
.eval-highlight {
  background:var(--primary); border-radius:3px; padding:14px 18px;
  margin-bottom:12px; text-align:center;
  font-family:var(--font-serif); color:#f0e8d4; font-size:14px; line-height:1.8;
}
.eval-highlight .eq-sub { font-size:10px; letter-spacing:0.2em; color:var(--gold2); margin-bottom:8px; display:block; font-family:var(--font-sans); }
.eval-btn {
  width:100%; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:3px; padding:12px 14px; text-align:left; cursor:pointer;
  font-family:var(--font-sans); font-size:13px; color:var(--text);
  transition:all 0.18s; margin-bottom:6px; display:block;
}
.eval-btn:hover { border-color:var(--primary); background:rgba(26,58,92,0.06); }
.eval-btn.selected { background:rgba(26,58,92,0.1); border-color:var(--primary); color:var(--primary); font-weight:700; }

/* ─── 저작권 ─── */
.copyright { text-align:center; font-size:11px; color:rgba(120,100,80,0.4); padding:12px 0 4px; font-family:var(--font-sans); }

/* ─── 반응형 ─── */
@media (min-width:600px) {
  .choice-area { flex-direction:row; }
  .choice-btn { flex:1; }
}
@media (max-width:520px) {
  .dashboard { grid-template-columns:1fr 1fr; }
  .gauge-bar { gap:5px; padding:8px 12px; }
  .gauge-label { font-size:9px; }
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="tt-bubble"><div class="tb-word"></div><div class="tb-desc"></div></div>
<div id="app"></div>

<script>
// ══════════════════════════════════════════
// 툴팁
// ══════════════════════════════════════════
const TIPS = {
  '비변사':    '비변사(備邊司) — 16세기 이후 군국 대사를 총괄하던 최고 기관. 세도 가문이 장악해 왕권을 약화시켰다.',
  '의정부':    '의정부(議政府) — 조선의 최고 행정 기관. 대원군은 비변사를 폐지하고 의정부 기능을 회복시켰다.',
  '삼군부':    '삼군부(三軍府) — 군사 업무를 전담하는 기관. 대원군이 부활시켜 정치와 군사를 분리했다.',
  '서원':      '서원(書院) — 지방 사립 교육 기관. 면세·면역 특권을 누려 국가 재정을 잠식했다.',
  '호포제':    '호포제(戶布制) — 집집마다 군포를 거두는 제도. 양반도 군포를 내도록 했다.',

function tt(word, key) {
  const tip = TIPS[key || word] || '';
  if (!tip) return word;
  return `<span class="tt" data-tip="${encodeURIComponent(tip)}" data-word="${word}">${word}</span>`;
}

const bubble = document.getElementById('tt-bubble');
let bubTimer = null;
document.addEventListener('click', e => {
  const el = e.target.closest('.tt');
  if (el) {
    e.stopPropagation();
    bubble.querySelector('.tb-word').textContent = el.dataset.word;
    bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
    const rect = el.getBoundingClientRect(), bw = 260;
    const left = Math.max(8, Math.min(rect.left + rect.width/2 - bw/2, window.innerWidth - bw - 8));
    bubble.style.width = bw + 'px'; bubble.style.left = left + 'px'; bubble.style.top = '-9999px';
    bubble.classList.add('show');
    const bh = bubble.offsetHeight;
    bubble.style.top = (rect.top - bh - 14 < 8) ? (rect.bottom + 10) + 'px' : (rect.top - bh - 14) + 'px';
    if (bubTimer) clearTimeout(bubTimer);
    bubTimer = setTimeout(() => bubble.classList.remove('show'), 4000);
  } else {
    bubble.classList.remove('show');
  }
});

let S = {
  phase: 'intro',  // intro | game | feedback | gojong | result
  step: 0,
  gauges: { king:20, noble:0, people:30, treasury:20 },
  history: [],
  pendingFeedback: null,
  evalChoice: null,
};

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}
function clamp(v) { return Math.max(0, Math.min(100, v)); }
function applyDelta(delta) {
  S.gauges.king     = clamp(S.gauges.king     + (delta.king     || 0));
  S.gauges.noble    = clamp(S.gauges.noble    + Math.abs(delta.noble || 0));
  S.gauges.people   = clamp(S.gauges.people   + (delta.people   || 0));
  S.gauges.treasury = clamp(S.gauges.treasury + (delta.treasury || 0));
}

function R() {
  window.scrollTo(0, 0);
  const app = document.getElementById('app');
  app.innerHTML =
    S.phase === 'intro'    ? renderIntro()    :
    S.phase === 'game'     ? renderGame()     :
    S.phase === 'feedback' ? renderGame()     :
    S.phase === 'gojong'   ? renderGojong()   :
    S.phase === 'result'   ? renderResult()   : '';
  if (S.phase === 'feedback' && S.pendingFeedback) showFeedbackOverlay(S.pendingFeedback);
}

function renderGaugeBar() {
  const g = S.gauges;
  const kW = g.king <= 20, nW = g.noble >= 60, pW = g.people <= 20, tW = g.treasury <= 15;
  function item(label, val, cls, warn) {
    return `<div class="gauge-item">
      <div class="gauge-label">${label}</div>
      <div class="gauge-track"><div class="gauge-fill ${cls}${warn?' warn':''}" style="width:${val}%"></div></div>
      <div class="gauge-val ${cls}${warn?' warn':''}">${val}</div>
    </div>`;
  }
  return `<div class="gauge-bar">
    ${item('👑 왕권', g.king, 'king', kW)}
    ${item('📜 양반 반발', g.noble, 'noble', nW)}
    ${item('🌾 백성 지지', g.people, 'people', pW)}
    ${item('💰 국고', g.treasury, 'treasury', tW)}
  </div>`;
}

function renderGame() {
  const reform = REFORMS[S.step];
  const g = S.gauges;
  const warnings = [];
  if (g.noble >= 55) warnings.push('📜 양반 반발이 위험 수준에 달했습니다.');
  if (g.people <= 25) warnings.push('🌾 백성의 불만이 임계점에 다가서고 있습니다.');
  if (g.treasury <= 15) warnings.push('💰 국고가 위태롭습니다.');

  const warnHtml = warnings.length ? `
    <div style="margin-bottom:12px; padding:10px 13px; background:rgba(139,26,26,0.06); border:1px solid rgba(139,26,26,0.2); border-radius:3px;">
      <div style="font-size:10px; letter-spacing:0.2em; color:var(--accent); font-family:var(--font-sans); font-weight:700; margin-bottom:5px;">🚨 위기 경보</div>
      ${warnings.map(w=>`<div style="font-size:13px; color:var(--text-mid); font-family:var(--font-serif); line-height:1.7;">${w}</div>`).join('')}
    </div>` : '';

  return `
  ${renderGaugeBar()}
  <div style="padding-top:16px;">
  <div class="paper scene">
    <div class="cr tl"></div><div class="cr tr"></div>
    <div class="cr bl"></div><div class="cr br"></div>

      ${warnHtml}
      <div class="reform-card">

}

// ══════════════════════════════════════════
// 선택 처리
// ══════════════════════════════════════════
function choose(choiceId) {
  const reform = REFORMS[S.step];
  const choice = reform.choices.find(c => c.id === choiceId);
  applyDelta(choice.delta);
  S.history.push({ id: reform.id, choiceId, title: reform.title, emoji: reform.emoji });
  S.pendingFeedback = { reform, choice };
  S.phase = 'feedback';
  R();
  gtag('event', 'reform_choice', { reform_id: reform.id, choice_id: choiceId });
}

function showFeedbackOverlay({ reform, choice }) {
  const fb = choice.feedback;
  const isLast = S.step >= REFORMS.length - 1;
  const btnText = isLast ? '1873년, 역사의 순간으로 →' : `제${S.step+2}호 결단으로 →`;

  const pillsHtml = (fb.pills || []).map((p,i) =>
    `<span class="fb-pill ${fb.pillCls[i]}">${p}</span>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'feedback-overlay';
  overlay.innerHTML = `
  <div class="feedback-box">
    <div class="fb-stamp">${fb.stamp}</div>
    <div class="fb-title">${fb.title}</div>
    <div class="fb-result">${fb.text}</div>
    ${fb.unexpected ? `<div class="fb-unexpected">${fb.unexpected}</div>` : ''}
    <div class="fb-changes">${pillsHtml}</div>
    <div class="fb-hist">${reform.hist}</div>
    <button class="fb-btn" onclick="nextStep()">${btnText}</button>
  </div>`;
  document.body.appendChild(overlay);
}

function nextStep() {
  document.querySelectorAll('.feedback-overlay').forEach(el => el.remove());
  S.pendingFeedback = null;
  S.step++;
  S.phase = S.step >= REFORMS.length ? 'gojong' : 'game';
  R();
}

        <strong style="color:var(--primary); font-family:var(--font-serif);">결정적인 사실이 있습니다.</strong><br>
        평소라면 이 상소는 대원군 측에 의해 차단됐을 것입니다.<br>
        그러나 이번엔 달랐습니다. <strong>고종이 직접 이 상소를 받아들였습니다.</strong><br>
        22세의 고종은 아버지의 그늘에서 벗어나기를 원했습니다.<br>
        명성황후 세력은 최익현을 앞세워 그 명분을 만들었습니다.<br><br>
        유생의 반발이 방아쇠였지만,<br>
        <strong>방아쇠를 당긴 건 고종 자신이었습니다.</strong>
      </div>
      <div style="background:var(--primary); border-radius:3px; padding:14px 18px; margin-bottom:20px; text-align:center; font-family:var(--font-serif); color:#f0e8d4; font-size:14px; line-height:1.8;">
        1873년 11월, 고종은 친정을 선포했습니다.<br>
        <strong style="color:var(--gold2);">흥선대원군 이하응, 10년 집권을 마치고 운현궁으로 물러납니다.</strong>
      </div>
    </div>
    <div style="padding:0 20px 24px;">
      <button class="btn btn-primary" onclick="S.phase='result'; R();">
        대원군의 10년을 평가한다 →
      </button>
    </div>
  </div>
  </div>`;
}

// ══════════════════════════════════════════
// 결과 화면
// ══════════════════════════════════════════
function renderResult() {
  const g = S.gauges;
  const nobleHigh = g.noble >= 55;
  const peopleLow = g.people <= 35;

  let icon, titleText, titleColor, cause, sub;
  if (nobleHigh && peopleLow) {
    icon = '⚖️'; titleColor = 'var(--accent)';
    titleText = '모든 세력이 등을 돌리다';
    cause = `개혁은 기득권의 반발을 샀고, 경복궁은 백성의 원성을 샀습니다. 유생·양반·백성 모두가 최익현의 상소에 고개를 끄덕였습니다. <strong>고종에게는 선택지가 넘쳤습니다.</strong>`;
    sub = '개혁이 만들어낸 적들이, 고종의 친정 의지와 결합했다.';
  } else if (nobleHigh) {
    icon = '📜'; titleColor = 'var(--primary)';
    titleText = '지지자가 적이 된 결과';
    cause = `개혁으로 쌓인 반발 세력이 최익현을 통해 하나로 묶였습니다. 백성은 여전히 대원군 편이었지만 <strong>조정 안의 적들이 너무 많았습니다.</strong>`;
    sub = '개혁의 내용은 옳았다. 그러나 기득권의 연대를 막지 못했다.';
  } else if (peopleLow) {
    icon = '🏯'; titleColor = 'var(--gold)';
    titleText = '개혁의 수혜자를 잃다';
    cause = `서원 철폐와 사창제로 백성의 지지를 얻었으나, 경복궁 공사로 그 지지를 소모했습니다. <strong>개혁의 수혜자가 피해자가 됐습니다.</strong>`;
    sub = '좋은 개혁도 나쁜 선택 하나로 무너질 수 있다.';
  } else {
    icon = '👑'; titleColor = 'var(--primary)';
    titleText = '고종이 자랐다';
    cause = `반발은 크지 않았고 민심도 나쁘지 않았습니다. 그러나 고종은 22세였습니다. <strong>아들이 성인이 되면 아버지의 섭정은 끝납니다.</strong> 최익현의 상소는 명분이었을 뿐입니다.`;
    sub = '어떻게 해도 결과는 같았을까? 아니면 다를 수 있었을까?';
  }

  const gaugeCards = [
    { label:'👑 왕권', val:g.king, cls:'king', color:'var(--g-king)', note:g.king>=60?'강화':g.king>=35?'불안정':'위기' },
    { label:'📜 양반 반발', val:g.noble, cls:'noble', color:'var(--g-noble)', note:g.noble>=65?'폭발':g.noble>=45?'위험':'관리됨' },
    { label:'🌾 백성 지지', val:g.people, cls:'people', color:'var(--g-people)', note:g.people>=60?'지지':g.people>=35?'불만':'분노' },
    { label:'💰 국고', val:g.treasury, cls:'treasury', color:'var(--g-treasury)', note:g.treasury>=50?'안정':g.treasury>=25?'위태':'바닥' },
  ].map(c => `
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:12px 14px;">
    <div style="font-size:10px;letter-spacing:0.1em;color:var(--muted);font-family:var(--font-sans);margin-bottom:6px;">${c.label}</div>
    <div style="height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden;margin-bottom:5px;">
      <div style="width:${c.val}%;height:100%;background:${c.color};border-radius:3px;"></div>
    </div>
    <div style="font-size:12px;font-weight:700;font-family:var(--font-sans);color:${c.color};">${c.val} — ${c.note}</div>
  </div>`).join('');

  const histRows = S.history.map(h => {
    const r = REFORMS.find(r => r.id === h.id);
    return `
    <div class="rh-row">
      <span class="rh-emoji">${r.emoji}</span>
      <span class="rh-name">${r.title}</span>
      <span class="rh-choice ${h.choiceId==='A'?'a-type':'b-type'}">선택 ${h.choiceId}</span>
    </div>`;
  }).join('');

  return `
  ${renderGaugeBar()}
  <div style="padding-top:16px;">
  <div class="paper scene">
    <div class="cr tl"></div><div class="cr tr"></div>
    <div class="cr bl"></div><div class="cr br"></div>
    <div class="result-banner">
      <div class="result-icon">${icon}</div>
      <div class="result-title" style="color:${titleColor}">${titleText}</div>
      <div class="result-sub">${sub}</div>
    </div>
    <div style="padding:16px 0 0;">
      <div class="result-cause">${cause}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 20px 16px;">${gaugeCards}</div>
      <div class="result-history">
        <div class="rh-title">📋 나의 결단 기록</div>
        ${histRows}
      </div>

      <div class="eval-section">
        <div class="eval-highlight">
          <span class="eq-sub">✦ 수업 토론 질문 ✦</span>
          대원군의 10년은 조선을 살린 <strong style="color:var(--gold2);">'골든타임'</strong>이었을까요,<br>
          아니면 멸망을 늦춘 <strong style="color:rgba(255,160,140,0.9);">'진통제'</strong>였을 뿐일까요?
          <div style="font-size:12px;color:rgba(240,228,192,0.65);margin-top:6px;font-family:var(--font-sans);">게임 속 경험을 근거로 평가해 봅시다</div>
        </div>
        <div class="eval-question">나의 평가는?</div>
        <button class="eval-btn" onclick="selectEval(this,'골든타임 — 개혁의 방향은 옳았다. 경복궁만 아니었다면')">
          🟡 골든타임 — 개혁의 방향은 옳았다. 경복궁만 아니었다면
        </button>
        <button class="eval-btn" onclick="selectEval(this,'진통제 — 어떻게 해도 결과는 같았다. 고종이 크면 끝이었다')">
          🔴 진통제 — 어떻게 해도 결과는 같았다. 고종이 크면 끝이었다
        </button>
        <button class="eval-btn" onclick="selectEval(this,'둘 다 — 개혁은 필요했지만, 만든 적이 너무 많았다')">
          ⚖️ 둘 다 — 개혁은 필요했지만, 만든 적이 너무 많았다
        </button>
      </div>

      <div style="padding:0 20px 28px;">
        <button class="btn btn-primary" onclick="copyResult()" style="margin-bottom:8px;">
          📋 결과 복사 (패들렛 공유용)
        </button>
        <button class="btn btn-outline" onclick="restart()">다시 결단하기</button>
      </div>
      <div class="copyright">© 찰리쌤 · hischarlie.tistory.com</div>
    </div>
  </div>
  </div>`;
}

// ══════════════════════════════════════════
// 공유 & 재시작
// ══════════════════════════════════════════
function selectEval(btn, label) {
  document.querySelectorAll('.eval-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.evalChoice = label;
}

function copyResult() {
  const g = S.gauges;
  const nobleHigh = g.noble >= 55, peopleLow = g.people <= 35;
  let ending = '고종이 자랐다 — 어떤 개혁도 성장을 막지 못한다';
  if (nobleHigh && peopleLow) ending = '모든 세력이 등을 돌리다';
  else if (nobleHigh) ending = '지지자가 적이 된 결과';
  else if (peopleLow) ending = '개혁의 수혜자를 잃다';

  const lines = [
    '⚖️ 대원군의 결단 — 나의 결단 기록',
    '',
    ...S.history.map(h => {
      const r = REFORMS.find(r => r.id === h.id);
      const c = r.choices.find(c => c.id === h.choiceId);
      return `${r.emoji} ${r.title}: 선택${h.choiceId} — ${c.text}`;
    }),
    '',
    `👑 왕권 ${g.king}  📜 양반 반발 ${g.noble}  🌾 백성 지지 ${g.people}  💰 국고 ${g.treasury}`,
    '',
    `결말: ${ending}`,
    '',
    S.evalChoice ? `나의 평가: ${S.evalChoice}` : '나의 평가: (미선택)',
    '',
    '— hischarlie.tistory.com',
  ];
  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 복사 완료!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px;top:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 복사 완료!'); }
    catch(e) { showToast('복사 실패'); }
    document.body.removeChild(ta);
  }
}

function startGame() { S.phase = 'game'; R(); }

function restart() {
  S = { phase:'intro', step:0, gauges:{king:20,noble:0,people:30,treasury:20}, history:[], pendingFeedback:null, evalChoice:null };
  R();
}

R();
</script>
</body>
</html>
