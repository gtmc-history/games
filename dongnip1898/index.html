<html lang="ko">

<title>황제와 맞서다 — 1898 독립협회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   DESIGN TOKENS — 근현대 테마
   태극의 청홍, 독립의 결기, 낡은 사진 질감
══════════════════════════════════ */
:root {
  --bg:        #1a1410;   /* 야회(夜會) 어둠 — 긴박한 밤 분위기 */
  --bg2:       #231c16;
  --surface:   #2e2318;
  --surface2:  #3a2d20;
  --primary:   #003087;   /* 태극 청색 */
  --primary2:  #1a4fa8;
  --accent:    #cd2e3a;   /* 태극 적색 */
  --accent2:   #e8404e;
  --gold:      #c9a052;
  --gold2:     #e8c97a;
  --text:      #f0e8d8;
  --text-mid:  #c8b898;
  --text-muted:#8a7a64;
  --border:    rgba(201,160,82,0.25);
  --border2:   rgba(201,160,82,0.12);
  --sepia:     #8b7355;

  --font-display: 'Black Han Sans', sans-serif;
  --font-serif:   'Noto Serif KR', serif;
  --font-body:    'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  padding: 0 0 60px;

  /* 낡은 종이 질감 */
  background-image:
    radial-gradient(ellipse 100% 60% at 50% 0%, rgba(205,46,58,0.04) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a052' fill-opacity='0.025'%3E%3Crect x='0' y='0' width='1' height='80'/%3E%3Crect x='0' y='0' width='80' height='1'/%3E%3C/g%3E%3C/svg%3E");
}

#app {
  width: 100%;
  max-width: 680px;
  padding: 0 16px;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); color: var(--gold2);
  border: 1px solid var(--gold); border-radius: 24px;
  padding: 10px 24px; font-size: 13px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#toast.show { opacity: 1; }

/* ── TOOLTIP ── */
.tt {
  border-bottom: 1.5px dashed var(--gold);
  cursor: pointer;
  white-space: nowrap;
  color: inherit;
  transition: border-color 0.15s;
}
.tt:hover { border-bottom-color: var(--accent); }

#tt-bubble {
  position: fixed; z-index: 9000; max-width: 260px;
  background: #0d0a06; border: 1px solid rgba(201,160,82,0.5);
  border-radius: 4px; padding: 10px 14px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.7);
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size: 11px; font-weight: 700; color: var(--gold2); margin-bottom: 5px; letter-spacing: 0.08em; }
#tt-bubble .tb-desc { font-size: 12px; color: rgba(240,232,216,0.85); line-height: 1.7; }

/* ── SCENE SHELL ── */
.scene {
  animation: sceneIn 0.4s ease forwards;
  padding-top: 24px;
}
@keyframes sceneIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(26,20,16,0.95);
  border-bottom: 1px solid var(--border2);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  backdrop-filter: blur(4px);
}
.progress-label {
  font-size: 11px; color: var(--gold); letter-spacing: 0.15em;
  white-space: nowrap; font-family: var(--font-serif);
}
.progress-track {
  flex: 1; display: flex; gap: 4px;
}
.prog-pip {
  flex: 1; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.08);
  transition: background 0.4s;
}
.prog-pip.done   { background: var(--gold); }
.prog-pip.active { background: var(--accent); }
.progress-step {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-body); white-space: nowrap;
}

/* ── CARD FRAME ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

/* 모서리 장식 */
.card::before, .card::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-style: solid;
  border-color: var(--gold);
  opacity: 0.4;
}
.card::before { top: 7px; left: 7px; border-width: 1px 0 0 1px; }
.card::after  { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }

.card-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border2);
}
.card-era {
  font-size: 10px; letter-spacing: 0.2em; color: var(--gold);
  margin-bottom: 8px; font-family: var(--font-serif);
}
.card-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 4vw, 24px);
  color: var(--text);
  line-height: 1.3;
}
.card-sub {
  font-size: 12px; color: var(--text-muted);
  margin-top: 6px; letter-spacing: 0.04em;
  font-family: var(--font-serif);
}
.card-body { padding: 20px 24px 28px; }

/* ── INTRO ── */
.intro-img {
  width: 100%; height: 140px;
  background: linear-gradient(180deg, #0d0a06 0%, var(--surface) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; letter-spacing: 8px;
  border-bottom: 1px solid var(--border2);
  position: relative; overflow: hidden;
}
.intro-img::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
  );
}
.intro-text {
  font-size: 15px; line-height: 2; color: var(--text-mid);
  font-family: var(--font-serif); font-weight: 300;
  margin-bottom: 20px;
}
.intro-text strong { color: var(--text); font-weight: 600; }

.intro-box {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  border-radius: 0 3px 3px 0;
  padding: 14px 16px; margin-bottom: 24px;
  font-size: 13px; line-height: 1.9; color: var(--text-mid);
  font-family: var(--font-serif);
}
.intro-box .ib-title {
  font-size: 10px; letter-spacing: 0.15em; color: var(--accent);
  margin-bottom: 8px; font-weight: 700;
}

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 3px;
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.04em;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s;
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.btn:active { transform: translateY(0) scale(0.97); }
.btn + .btn { margin-top: 8px; }

.btn-primary {
  background: var(--primary);
  color: #fff;
  border: 1px solid var(--primary2);
}
.btn-primary:hover { background: var(--primary2); }

.btn-accent {
  background: var(--accent);
  color: #fff;
  border: 1px solid var(--accent2);
}
.btn-accent:hover { background: var(--accent2); }

.btn-gold {
  background: var(--gold);
  color: #1a1410;
  border: 1px solid var(--gold2);
  font-weight: 700;
}
.btn-gold:hover { background: var(--gold2); }

.btn-outline {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid rgba(150,130,100,0.3);
}
.btn-outline:hover { border-color: var(--gold); color: var(--text); }

.btn:disabled {
  opacity: 0.35; cursor: not-allowed;
  transform: none; box-shadow: none;
}

/* ── ROUND SCENE ── */
.round-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 11px; letter-spacing: 0.12em; color: var(--gold);
  font-family: var(--font-serif); margin-bottom: 16px;
}

.issue-box {
  background: rgba(0,48,135,0.12);
  border: 1px solid rgba(0,48,135,0.35);
  border-left: 3px solid var(--primary);
  border-radius: 0 3px 3px 0;
  padding: 14px 16px; margin-bottom: 20px;
}
.issue-box .iss-label {
  font-size: 10px; letter-spacing: 0.18em; color: var(--primary2);
  margin-bottom: 6px; font-weight: 700;
}
.issue-box .iss-text {
  font-size: 14px; font-family: var(--font-serif);
  line-height: 1.8; color: var(--text);
}

/* 익명서 사건 컷신 */
.briefing-box {
  background: rgba(205,46,58,0.08);
  border: 1px solid rgba(205,46,58,0.3);
  border-left: 3px solid var(--accent);
  border-radius: 0 3px 3px 0;
  padding: 14px 16px; margin-bottom: 16px;
}
.briefing-box .br-label {
  font-size: 10px; letter-spacing: 0.18em; color: var(--accent);
  margin-bottom: 6px; font-weight: 700;
}
.briefing-box .br-text {
  font-size: 13px; font-family: var(--font-serif);
  line-height: 1.9; color: var(--text-mid);
}

/* 선택지 카드 */
.choice-label {
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 10px; letter-spacing: 0.06em;
  font-family: var(--font-serif);
}
.choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.choice-card {
  background: var(--surface2);
  border: 1.5px solid rgba(201,160,82,0.2);
  border-left: 3px solid transparent;
  border-radius: 0 3px 3px 0;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative;
}
.choice-card:hover {
  border-left-color: var(--primary2);
  background: rgba(0,48,135,0.12);
  transform: translateX(4px);
}
.choice-card.selected {
  border-left-color: var(--gold);
  border-color: rgba(201,160,82,0.5);
  background: rgba(201,160,82,0.08);
}
.choice-card.selected::after {
  content: '✓';
  position: absolute; top: 12px; right: 14px;
  font-size: 14px; color: var(--gold); font-weight: 700;
}
.choice-card.disabled { opacity: 0.5; cursor: not-allowed; }
.choice-card.disabled:hover { transform: none; border-left-color: transparent; background: var(--surface2); }

.choice-strength {
  font-size: 9px; letter-spacing: 0.1em;
  margin-bottom: 5px; font-weight: 700;
}
.str-strong { color: var(--primary2); }
.str-mid    { color: var(--gold); }
.str-weak   { color: var(--text-muted); }

.choice-text {
  font-size: 14px; font-family: var(--font-serif);
  line-height: 1.7; color: var(--text);
}
.choice-sub {
  font-size: 12px; color: var(--text-muted);
  margin-top: 5px; line-height: 1.6;
}

/* ── AI 응답 ── */
.emperor-wrap {
  margin-top: 20px; animation: sceneIn 0.5s ease;
}

.emperor-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.emperor-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--surface2), #0d0a06);
  border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.emperor-name {
  font-family: var(--font-serif); font-size: 13px;
  color: var(--gold); font-weight: 600;
}
.emperor-title {
  font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em;
  margin-top: 2px;
}

.emperor-bubble {
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 6px;
  padding: 16px 18px;
  font-family: var(--font-serif);
  font-size: 14px; line-height: 2; color: var(--text-mid);
  position: relative;
}
.emperor-bubble::before {
  content: ''; position: absolute;
  top: -1px; left: -16px;
  border: 8px solid transparent;
  border-right-color: var(--gold);
  border-top: 0;
}

.loading-dots {
  display: flex; gap: 5px; align-items: center; padding: 4px 0;
}
.loading-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold2); opacity: 0.4;
  animation: dotPulse 1.2s ease infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50%       { opacity: 1;   transform: scale(1.1); }
}

.saryoh-tag {
  display: inline-block; font-size: 10px;
  background: rgba(201,160,82,0.15); border: 1px solid rgba(201,160,82,0.3);
  border-radius: 2px; padding: 1px 7px; color: var(--gold2);
  letter-spacing: 0.06em; margin-bottom: 6px;
}

/* ── 해산 씬 ── */
.dissolution-scene {
  min-height: 70vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 48px 24px;
  animation: dissolveIn 1.2s ease;
}
@keyframes dissolveIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.diss-date {
  font-size: 11px; letter-spacing: 0.25em; color: var(--text-muted);
  margin-bottom: 40px; font-family: var(--font-serif);
}
.diss-icon { font-size: 56px; margin-bottom: 24px; opacity: 0.9; }
.diss-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 5vw, 32px);
  color: var(--accent);
  margin-bottom: 16px; line-height: 1.3;
}
.diss-decree {
  background: rgba(205,46,58,0.08);
  border: 1px solid rgba(205,46,58,0.25);
  border-radius: 3px;
  padding: 16px 20px; margin: 20px 0;
  font-family: var(--font-serif); font-size: 14px;
  line-height: 1.9; color: var(--text-mid); text-align: left;
}
.diss-decree .dd-label {
  font-size: 10px; letter-spacing: 0.18em; color: var(--accent);
  margin-bottom: 8px; font-weight: 700;
}
.diss-question {
  font-family: var(--font-serif); font-size: 15px;
  color: var(--gold2); line-height: 1.9; margin-top: 8px;
  font-style: italic;
}

/* ── 결과 씬 ── */
.result-header {
  text-align: center; padding: 28px 0 20px;
  border-bottom: 1px solid var(--border2); margin-bottom: 20px;
}
.result-icon { font-size: 52px; margin-bottom: 12px; }
.result-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 4vw, 26px); color: var(--text); margin-bottom: 8px;
}
.result-sub { font-size: 13px; color: var(--text-muted); font-family: var(--font-serif); }

/* 선택 흐름 */
.flow-title {
  font-size: 11px; letter-spacing: 0.18em; color: var(--gold);
  margin-bottom: 10px; font-family: var(--font-serif);
}
.flow-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.flow-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border2); border-radius: 3px;
}
.flow-round {
  font-size: 10px; color: var(--gold2); font-weight: 700;
  white-space: nowrap; margin-top: 2px; letter-spacing: 0.06em;
  min-width: 36px;
}
.flow-choice {
  font-size: 13px; font-family: var(--font-serif);
  color: var(--text-mid); line-height: 1.6; flex: 1;
}

.final-decree {
  background: rgba(205,46,58,0.07);
  border: 1px solid rgba(205,46,58,0.25);
  border-radius: 3px; padding: 14px 16px; margin-bottom: 16px;
  text-align: center;
}
.fd-label {
  font-size: 10px; letter-spacing: 0.15em; color: var(--accent);
  margin-bottom: 8px;
}
.fd-text {
  font-family: var(--font-serif); font-size: 14px;
  color: var(--text-mid); line-height: 1.8; font-style: italic;
}

.hist-result {
  background: rgba(0,0,0,0.3);
  border: 1px dashed rgba(201,160,82,0.3);
  border-radius: 3px; padding: 14px 16px; margin-bottom: 20px;
}
.hr-label {
  font-size: 10px; letter-spacing: 0.15em; color: var(--gold);
  margin-bottom: 8px;
}
.hr-text {
  font-family: var(--font-serif); font-size: 13px;
  color: var(--text-muted); line-height: 1.9;
}

/* 소감 */
.comment-wrap { margin-bottom: 20px; }
.comment-label {
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 8px; letter-spacing: 0.04em;
}
.comment-wrap textarea {
  width: 100%; border-radius: 3px; resize: none;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font-serif); font-size: 14px;
  padding: 12px 14px; line-height: 1.7;
  transition: border-color 0.2s;
}
.comment-wrap textarea:focus {
  outline: none; border-color: rgba(201,160,82,0.5);
}
.comment-wrap textarea::placeholder { color: var(--text-muted); }

/* 저작권 */
.copyright {
  text-align: center; padding-top: 20px; margin-top: 8px;
  font-size: 11px; color: rgba(120,100,80,0.5);
  font-family: var(--font-body); letter-spacing: 0.04em;
}

/* 구분선 */
hr.div { border: none; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 20px 0;
}

/* ── 반응형 ── */
@media (max-width: 480px) {
  .card-body { padding: 16px 16px 24px; }
  .card-header { padding: 16px 16px 14px; }
  .emperor-bubble { font-size: 13px; }
  .choice-text { font-size: 13px; }
}
</style>
</head>

function tt(word, key) {
  const tip = TIPS[key || word];
  if (!tip) return word;
  return `<span class="tt" data-tip="${encodeURIComponent(tip)}" data-word="${word}">${word}</span>`;
}

async function callEmperor(roundData, choiceText, strength) {
  const strengthHint = {
    strong: '학생의 논거가 날카롭고 구조적이다. 황제는 한 발 물러서는 듯 "그 점은 인정하나…"로 시작하되 결국 전제황권 논리로 귀결한다.',
    mid:    '학생의 논거가 현실적이나 타협적이다. 황제는 냉정하게 현실 논리로 반박한다.',
    weak:   '학생의 논거가 감정적이고 추상적이다. 황제는 단호하게 일축한다.',
  }[strength];

  const systemPrompt = `당신은 1898년 대한제국의 황제 고종이다.
규칙:
- 반드시 한국어로만 답하라.
- 응답은 2~4문장, 130자 이내로 간결하게.
- 감정적 분노 없이 냉정한 통치 논리로 말한다.
- 대한제국의 자주독립 수호, 광무개혁 추진, 열강 각축 속 황제권 중심 근대화 논리를 바탕으로 한다.
- 필요시 대한국 국제 조문을 인용할 수 있다.
- 어떤 경우에도 독립협회의 요구를 수용하거나 해산을 철회하지 않는다.
- 현대 민주주의 관점으로 자기비판하지 않는다.
- 1898년 대한제국 황제의 역사적 관점만 유지한다.
- 말투: 짐/과인, 격식체 (~하오, ~이오, ~하노라).
${strengthHint}`;

  const userPrompt = `${roundData.emperorContext}

학생이 선택한 논거:
"${choiceText}"

황제의 응답:`;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        prompt: userPrompt,
        maxTokens: 120,
      }),
    });
    const data = await res.json();
    return data.response || data.text || '짐은 이 요구를 받아들일 수 없소.';
  } catch {
    // fallback
    const fallbacks = {
      r1: '지금 대한제국은 외세의 압박 속에서 겨우 자주권을 지키고 있소. 국정의 권한을 분산하면 외세가 그 틈을 파고들 것이오. 짐이 홀로 이 짐을 지는 것은 선택이 아니라 책임이오.',
      r2: '짐을 폐위하려 했다는 소문이 도는 이상, 짐은 국가의 안정을 위해 결단할 수밖에 없소. 의심이 사실이 아니길 바라나, 위험을 감수할 수는 없소.',
      r3: '대한국 국제 2조는 우리가 자주독립국임을 세상에 선언한 것이오. 전제정치란 황제가 독단적으로 군림한다는 뜻이 아니라, 외세의 간섭 없이 짐이 직접 국정을 책임진다는 뜻이오.',
    };
    return fallbacks[roundData.id] || '짐은 이 요구를 받아들일 수 없소.';
  }
}

  initTooltip();

let tooltipInitialized = false;
function initTooltip() {
  if (tooltipInitialized) return;
  tooltipInitialized = true;
  const bubble = document.getElementById('tt-bubble');
  let timer = null;
  document.addEventListener('click', function handler(e) {
    const el = e.target.closest('.tt');
    if (el) {
      e.stopPropagation();
      bubble.querySelector('.tb-word').textContent = el.dataset.word;
      bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
      const rect = el.getBoundingClientRect();
      const bw = 260;
      const left = Math.max(8, Math.min(rect.left + rect.width/2 - bw/2, window.innerWidth - bw - 8));
      bubble.style.width = bw + 'px';
      bubble.style.left  = left + 'px';
      bubble.style.top   = '-9999px';
      bubble.classList.add('show');
      const bubH = bubble.offsetHeight;
      bubble.style.top = (rect.top - bubH - 14 < 8)
        ? (rect.bottom + 10) + 'px'
        : (rect.top - bubH - 14) + 'px';
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => bubble.classList.remove('show'), 4000);
    } else {
      bubble.classList.remove('show');
    }
  });
}

function progressBar() {
  const total = ROUNDS.length + 1; // rounds + dissolution
  const done  = S.ri;
  const pips  = Array.from({ length: total }, (_, i) => {
    let cls = 'prog-pip';
    if (i < done) cls += ' done';
    else if (i === done) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  return `
  <div class="progress-wrap">
    <span class="progress-label">🏛 독립협회</span>
    <div class="progress-track">${pips}</div>
    <span class="progress-step">${done + 1} / ${total}</span>
  </div>`;
}

  const choicesHtml = round.choices.map(c => {
    const strLabel = { strong: '▲ 원칙 중심', mid: '● 현실 대응', weak: '◆ 민심 호소' }[c.strength];
    const strCls   = { strong: 'str-strong', mid: 'str-mid', weak: 'str-weak' }[c.strength];
    const isDisabled = (sel !== null) || S.loading;
    const isSelected = sel === c.id;

    return `
    <div class="choice-card ${isSelected ? 'selected' : ''} ${isDisabled && !isSelected ? 'disabled' : ''}"
         onclick="${isDisabled ? '' : `selectChoice('${c.id}')`}">
      <div class="choice-strength ${strCls}">${strLabel}</div>
      <div class="choice-text">${c.text}</div>
      <div class="choice-sub">${c.sub}</div>
    </div>`;
  }).join('');

  const emperorHtml = (() => {
    if (!sel) return '';
    return `
    <div class="emperor-wrap">
      <div class="emperor-header">
        <div class="emperor-avatar">👑</div>
        <div>
          <div class="emperor-name">황제 고종</div>
          <div class="emperor-title">대한제국 황제 · ${tt('광무개혁')} 추진 중</div>
        </div>
      </div>
      <div class="emperor-bubble">
        ${reply
          ? reply
          : `<div style="display:flex;align-items:center;gap:10px">
               <div class="loading-dots"><span></span><span></span><span></span></div>
               <span style="font-size:12px;color:var(--text-muted);font-family:var(--font-serif);font-style:italic" id="loading-msg"></span>
             </div>`
        }
      </div>
    </div>`;
  })();

  const briefingHtml = round.briefing ? `
  <div class="briefing-box">
    <div class="br-label">⚠ 사건 브리핑</div>
    <div class="br-text">${round.briefing}</div>
  </div>` : '';

  const nextBtn = (() => {
    if (!reply) return '';
    const isLast = S.ri === ROUNDS.length - 1;
    const label  = isLast ? '마지막 논쟁이 끝났다 →' : `${ROUNDS[S.ri+1].label}으로 →`;
    return `<button class="btn btn-primary" style="margin-top:20px" onclick="${isLast ? 'goDissolution()' : 'nextRound()'}">${label}</button>`;
  })();

  return `
  ${progressBar()}
  <div class="scene">
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <div class="round-badge">⚔ ${round.label}</div>
        <div class="card-title" style="font-size:clamp(16px,3.5vw,20px)">${round.issue}</div>
      </div>
      <div class="card-body">
        ${briefingHtml}
        <div class="issue-box">
          <div class="iss-label">📌 상황</div>
          <div class="iss-text">${round.issueDesc}</div>
        </div>

        <div class="choice-label">당신의 논거를 선택하세요</div>
        <div class="choices">${choicesHtml}</div>

        ${emperorHtml}
        ${nextBtn}
      </div>
    </div>
  </div>`;
}

function renderDissolution() {
  return `
  <div class="scene">
    <div class="dissolution-scene">
      <div class="diss-date">1898년 12월 25일 · 서울 종로</div>
      <div class="diss-icon">🕯</div>
      <div class="diss-title">독립협회,<br>강제 해산되다</div>

      <div class="diss-decree">
        <div class="dd-label">📜 황제의 칙령</div>
        독립협회는 국가의 안녕을 어지럽히는 불온한 단체이니 즉각 해산을 명한다.
        짐은 대한제국의 안정과 자주독립을 위해 이 결단을 내리노라.
      </div>

      <div class="diss-question">
        "그러나 질문은 남았다."
      </div>
    </div>
    <div style="padding:0 16px 32px">
      <button class="btn btn-gold" onclick="goResult()">결과 돌아보기 →</button>
    </div>
  </div>`;
}

function renderResult() {
  const flowHtml = S.selections.map((sel, i) => {
    const round = ROUNDS[i];
    return `
    <div class="flow-item">
      <div class="flow-round">${round.label}</div>
      <div class="flow-choice">${sel.choiceText.replace(/<[^>]+>/g, '')}</div>
    </div>`;
  }).join('');

  return `
  <div class="scene">
    <div class="card" style="margin-top:16px">
      <div class="card-body">
        <div class="result-header">
          <div class="result-icon">📜</div>
          <div class="result-title">논쟁의 기록</div>
          <div class="result-sub">당신은 3번 황제와 논쟁했습니다.<br>그러나 대한제국의 방향은 바뀌지 않았습니다.</div>
        </div>

        <div class="flow-title">▪ 나의 선택 흐름</div>
        <div class="flow-list">${flowHtml}</div>

        <div class="final-decree">
          <div class="fd-label">황제의 최종 판단</div>
          <div class="fd-text">"짐은 대한제국의 안정을 위해 독립협회를 해산한다. 이것이 짐의 결단이오."</div>
        </div>

        <div class="hist-result">
          <div class="hr-label">📅 역사의 결말</div>
          <div class="hr-text">
            1898년 12월 25일, 독립협회는 강제 해산되었습니다.<br>
            이듬해 1899년, ${tt('대한국 국제')}가 반포되며 ${tt('전제정치')}가 공식화되었습니다.<br>
            ${tt('민권')}과 의회의 꿈은 이후 1919년 3·1운동까지 기다려야 했습니다.
          </div>
        </div>

        <div class="intro-box" style="border-left-color:var(--gold);border-color:rgba(201,160,82,0.25);background:rgba(201,160,82,0.05);margin-bottom:20px">
          <div class="ib-title" style="color:var(--gold)">🤔 생각해봅시다</div>
          논쟁을 마친 지금, 고종을 어떻게 평가하게 되었습니까?<br>
          <span style="color:var(--text-muted);font-size:13px">단순한 독재자였을까요, 아니면 나름의 논리를 가진 통치자였을까요?</span>
        </div>

        <hr class="div">

        <div class="comment-wrap">
          <div class="comment-label">💬 한 줄 소감을 남겨보세요 (이름·학번 제외)</div>
          <textarea id="comment" rows="3"
            placeholder="독립협회는 왜 황제를 설득하지 못했을까요?"
            maxlength="100"></textarea>
        </div>

        <button class="btn btn-gold" onclick="copyResult()">📋 결과 복사하기 (패들렛 공유용)</button>
        <button class="btn btn-outline" style="margin-top:8px" onclick="restart()">다시 맞서기</button>

        <div class="copyright">© 찰리쌤 · hischarlie.tistory.com</div>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════
   EVENTS
══════════════════════════════════ */
function startGame() {
  S.phase = 'round'; S.ri = 0;
  S.currentChoice = null; S.loading = false;
  R();
}

async function selectChoice(choiceId) {
  if (S.loading || S.currentChoice) return;
  const round  = ROUNDS[S.ri];
  const choice = round.choices.find(c => c.id === choiceId);
  if (!choice) return;

  S.currentChoice = choiceId;
  S.loading = true;
  S.selections[S.ri] = {
    roundId: round.id,
    choiceId,
    choiceText: choice.text,
    strength: choice.strength,
  };
  R(); // show loading

  // 역사 테마 로딩 문구 삽입
  const msgEl = document.getElementById('loading-msg');
  if (msgEl) {
    msgEl.textContent = LOADING_MSGS[Math.floor(Math.random() * LOADING_MSGS.length)];
  }

  const reply = await callEmperor(round, choice.text.replace(/<[^>]+>/g, ''), choice.strength);
  S.emperorReplies[S.ri] = reply;
  S.loading = false;
  R();
}

function nextRound() {
  S.ri++;
  S.currentChoice = null;
  S.loading = false;
  R();
}

function goDissolution() {
  S.phase = 'dissolution';
  R();
}

function goResult() {
  S.phase = 'result';

  if (!S.submitted) {
    sendToSupabase({
      selections: S.selections.map(sel => ({
        round: sel.roundId,
        choice: sel.choiceId,
        strength: sel.strength,
      })),
    }, '');
    S.submitted = true;
  }
  R();
}

function copyResult() {
  const comment = document.getElementById('comment')?.value?.trim() || '';

  if (comment) {
    sendToSupabase({
      selections: S.selections.map(sel => ({
        round: sel.roundId,
        choice: sel.choiceId,
        strength: sel.strength,
      })),
    }, comment);
  }

  const lines = [
    '📜 황제와 맞서다 — 1898 독립협회',
    '',
    '▪ 나의 선택',
    ...S.selections.map((sel, i) => {
      const round = ROUNDS[i];
      return `${round.label}: ${sel.choiceText.replace(/<[^>]+>/g, '')}`;
    }),
    '',
    '▪ 황제의 최종 판단',
    '"짐은 대한제국의 안정을 위해 독립협회를 해산한다."',
    '',
    '▪ 역사의 결말',
    '1898년 12월 25일, 독립협회는 강제 해산되었다.',
    comment ? `\n▪ 소감\n${comment}` : '',
    '',
    '— 찰리쌤의 한국사 게임실 · hischarlie.tistory.com',
  ].filter(l => l !== undefined).join('\n');

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(lines).then(() => showToast('📋 결과가 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = lines; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 결과가 복사되었습니다!'); }
    catch { showToast('❌ 복사 실패. 직접 선택해 복사해주세요.'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = {
    phase: 'intro', ri: 0,
    selections: [], emperorReplies: [],
    currentChoice: null, loading: false, submitted: false,
  };
  R();
}

/* ── START ── */
R();
</script>
</body>
</html>
