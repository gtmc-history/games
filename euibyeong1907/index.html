/* ═══════════════════════════════════════
   ROOT — 근현대 테마 (일제강점기)
═══════════════════════════════════════ */
:root {
  --bg:        #f0ece4;
  --surface:   #e8e0d4;
  --surface2:  #ddd5c6;
  --primary:   #1a2e5a;   /* 태극 청색 */
  --accent:    #9b2020;   /* 태극 적색 */
  --gold:      #7a5c1e;
  --text:      #1c1410;
  --text-mid:  #3d3028;
  --text-muted:#7a6e60;
  --border:    #b0a090;
  --border-strong: #7a6e60;
  --sepia:     #8b7355;
  --ink:       #1c1410;
  --paper:     #f5f0e8;
  --danger:    #8b1a1a;

  --font-serif: 'Noto Serif KR', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  /* 낡은 종이 노이즈 */

    linear-gradient(160deg, #f5f0e8 0%, #ece4d8 100%);
}

/* ── 스캔라인 느낌 오버레이 ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(100,80,50,0.012) 3px,
    rgba(100,80,50,0.012) 4px
  );
}

#app {
  position: relative; z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #e8dfc8;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px; padding: 10px 22px;
  font-size: 13px; font-family: var(--font-sans);
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
}
#toast.show { opacity: 1; }

/* ═══════════════════════════════════════
   COMMON LAYOUT
═══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.scene { animation: fadeUp 0.4s ease; }

/* 격문 스타일 헤더 */
.doc-header {
  text-align: center;
  padding: 32px 20px 24px;
  border-bottom: 2px solid var(--primary);
  margin-bottom: 0;
  position: relative;
}
.doc-header::before {
  content: '';
  display: block;
  width: 40px; height: 2px;
  background: var(--accent);
  margin: 0 auto 16px;
}
.doc-era {
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--sepia); font-family: var(--font-sans);
  margin-bottom: 10px;
}
.doc-title {
  font-family: var(--font-title);
  font-size: clamp(26px, 5vw, 38px);
  color: var(--primary);
  line-height: 1.2;
  margin-bottom: 10px;
}
.doc-subtitle {
  font-size: 13px; color: var(--text-muted);
  font-family: var(--font-serif); font-weight: 300;
  letter-spacing: 0.05em;
}

/* 종이 카드 */
.paper-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
/* 카드 모서리 장식 */
.paper-card::before, .paper-card::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-style: solid;
  border-color: var(--border-strong);
  opacity: 0.5;
}
.paper-card::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
.paper-card::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

═══════════════════════════════════════ */

}

.intro-body {

}

.intro-manifesto {

}

}

.timeline-row {
  display: flex; gap: 0;

}
.tl-item {
  flex: 1;

  border: 1px solid var(--border);

}
.tl-item + .tl-item { border-left: none; }

.tl-year {

.tl-name {

.crackdown-banner {

/* ═══════════════════════════════════════

}

}
.rc-icon { font-size: 26px; margin-bottom: 8px; }
.rc-name {

}

}

  margin-top: 6px; font-family: var(--font-sans);
  display: flex; align-items: center; gap: 4px;
}
.rc-lock-note::before { content: '🔒'; font-size: 11px; }

/* ═══════════════════════════════════════

═══════════════════════════════════════ */

  gap: 1px; background: var(--border);
}
.strat-card {
  background: var(--paper);
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex; gap: 14px; align-items: flex-start;
  border-left: 3px solid transparent;
}
.strat-card:hover:not(.selected) {
  background: #ede7db;
  border-left-color: rgba(26,46,90,0.4);
}
.strat-card.selected {
  border-left-color: var(--primary);
  background: rgba(26,46,90,0.06);
}
.sc-icon { font-size: 24px; flex-shrink: 0; line-height: 1.3; }
.sc-right { flex: 1; }
.sc-name {
  font-size: 14px; font-weight: 600;
  color: var(--text); margin-bottom: 4px;
  font-family: var(--font-serif);
}
.sc-desc {
  font-size: 12px; color: var(--text-muted);
  font-family: var(--font-sans); font-weight: 300;
  line-height: 1.6;
}
.sc-hint {
  font-size: 11px; color: var(--sepia);
  margin-top: 5px; font-style: italic;
  font-family: var(--font-serif);
}

/* ═══════════════════════════════════════
   RESULT PHASE
═══════════════════════════════════════ */
.result-block {
  padding: 24px 24px 20px;
}
.result-verdict {
  display: flex; align-items: flex-start; gap: 16px;
  margin-bottom: 20px;
}
.verdict-icon { font-size: 40px; flex-shrink: 0; line-height: 1; }
.verdict-text { flex: 1; }
.verdict-label {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--sepia); font-family: var(--font-sans);
  margin-bottom: 6px;
}
.verdict-title {

  color: var(--primary); font-family: var(--font-serif);

}

.outcome-list {

}
.outcome-item {

  border-left: 3px solid var(--border-strong);
  font-size: 13px; color: var(--text-mid);
  font-family: var(--font-sans); font-weight: 300;
  line-height: 1.7;
  border-radius: 0 2px 2px 0;
}
.outcome-item.positive { border-left-color: var(--safe); }
.outcome-item.negative { border-left-color: var(--accent); }
.outcome-item.neutral  { border-left-color: var(--sepia); }

/* 상태 표시 (숫자 숨김, 텍스트만) */
.status-strip {
  display: flex; gap: 1px;
  margin: 16px 0;
  background: var(--border);
}
.status-cell {
  flex: 1; background: var(--paper);
  padding: 10px 8px; text-align: center;
}
.status-label {
  font-size: 10px; letter-spacing: 0.1em;
  color: var(--text-muted); font-family: var(--font-sans);
  margin-bottom: 5px;
}
.status-bar-wrap {
  height: 5px; background: var(--surface2);
  border-radius: 3px; overflow: hidden;
}
.status-bar {
  height: 100%; border-radius: 3px;

}
.status-bar.fight { background: var(--primary); }
.status-bar.heart { background: var(--safe); }

.ftl-bar {

.ftl-bar.good  { background: var(--safe); }

}
.fc-title {
  font-size: 11px; letter-spacing: 0.2em;
  color: var(--primary); font-family: var(--font-sans);
  margin-bottom: 12px;
}
.fc-text {
  font-size: 14px; color: var(--text-mid);
  font-family: var(--font-serif); font-weight: 300;

}
.fc-text strong { color: var(--primary); font-weight: 700; }

  padding: 20px 24px 28px;
  display: flex; flex-direction: column; gap: 10px;

═══════════════════════════════════════ */
.comment-block {
  padding: 0 24px 20px;
}
.comment-label {
  font-size: 11px; letter-spacing: 0.15em;
  color: var(--sepia); font-family: var(--font-sans);
  margin-bottom: 8px; display: block;
}
.comment-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 12px;
  font-size: 13px; font-family: var(--font-sans);
  color: var(--text); line-height: 1.7;
  resize: none; outline: none;
  transition: border-color 0.2s;
}
.comment-textarea:focus { border-color: var(--primary); }
.comment-hint {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-sans); margin-top: 5px;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 2px;

═══════════════════════════════════════ */
.confirm-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.confirm-hint {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-sans); margin-bottom: 10px;

/* ═══════════════════════════════════════
   저작권
═══════════════════════════════════════ */
.copyright {
  text-align: center;
  font-size: 11px; color: rgba(120,100,80,0.5);
  font-family: var(--font-sans);
  padding: 16px 0 4px;
}

/* ── 결과 텍스트 생성 ── */
function makeOutcome(round, recruits, strategy) {
  // recruits: 선택한 id 배열, strategy: id
  const hasSoldier  = recruits.includes('soldier');
  const hasScholar  = recruits.includes('scholar');
  const hasFarmer   = recruits.includes('farmer');
  const hasCommoner = recruits.includes('commoner');

  // 기본 수치 (내부)
  let fight = 1, heart = 1, carry = 1;

  // 병력 효과
  if (hasSoldier)  fight += 2;
  if (hasScholar)  heart += 1;
  if (hasFarmer)   fight += 1;
  if (hasCommoner) heart += 1;

  // 전략 효과
  if (strategy === 'guerrilla')   { carry += 1; }
  if (strategy === 'frontal')     { fight += 1; carry -= 1; }
  if (strategy === 'mountain')    { carry += 2; fight -= 1; }
  if (strategy === 'diplomatic')  { heart += 1; carry += 1; }  // 해외 기록 → 장기 계승 효과

  // 탄압 패널티 (라운드 심할수록)
  fight -= round.id;
  carry -= Math.floor(round.id * 0.5);

  // 클램프
  fight = Math.max(0, Math.min(3, fight));
  heart = Math.max(0, Math.min(3, heart));
  carry = Math.max(0, Math.min(3, carry));

  // 결과 텍스트 구성
  const items = [];

  // 탄압 결과 (항상)
  if (round.id === 0) {
    items.push({ cls:'negative', text:'일본 순사대의 추격으로 의병은 흩어졌다. 일부는 산속으로 숨어들었다.' });
    items.push({ cls:'negative', text:'의병을 숨겨주었다는 이유로 마을 주민 여러 명이 일본군에 끌려가 조사를 받았다.' });
  } else if (round.id === 1) {
    items.push({ cls:'negative', text:'전신망을 통해 의병의 위치가 바로 보고되었다. 일본 토벌대가 빠르게 포위해 들어왔다.' });
    items.push({ cls:'negative', text:'의병이 드나들었다는 이유로 인근 마을이 불에 탔다. 주민들은 피란길에 올랐다.' });
  } else {
    items.push({ cls:'negative', text:'남한대토벌작전이 시작되었다. 마을이 불에 탔고, 수많은 의병이 전사하거나 포로가 되었다.' });
    items.push({ cls:'negative', text:'일본군은 의병에 협조했다는 이유로 민간인을 처벌했다. 의병과 주민 모두가 혹독한 대가를 치렀다.' });
  }

  // 전략 결과
  if (strategy === 'guerrilla') {
    items.push({ cls:'neutral', text:'밤길 습격으로 일본군 물자 보급선을 여러 차례 끊었다. 주민들 사이에서 의병 이야기가 조심스럽게 오갔다.' });
  } else if (strategy === 'frontal') {
    if (hasSoldier && round.id === 2) {
      items.push({ cls:'neutral', text:'13도 창의군이 서울 진공 작전을 시도했다. 비록 실패했지만, 전국 의병 연합의 가능성을 처음으로 보여주었다. 이 시도 자체가 역사에 기록되었다.' });
    } else if (fight >= 2) {
      items.push({ cls:'neutral', text:'정면 결전에서 격렬하게 맞섰다. 적에게 적잖은 피해를 주었지만, 의병의 피해도 컸다. 싸움 후 병력이 크게 줄었다.' });
    } else {
      items.push({ cls:'negative', text:'정면 결전을 시도했지만 화력 차이가 너무 컸다. 많은 이들이 쓰러졌다.' });
    }
  } else if (strategy === 'mountain') {
    items.push({ cls:'neutral', text:'산속 근거지에 숨어들어 불씨를 보존했다. 전투는 피할 수 있었다.' });
    items.push({ cls:'negative', text:'겨울이 길어지자 식량이 부족해졌다. 굶주림을 견디지 못한 일부 의병이 산을 내려갔다. 주민들에게 도움을 구하기도 어려웠다.' });
  } else if (strategy === 'diplomatic') {
    if (round.id === 0) {
      items.push({ cls:'neutral', text:'각국 공사관에 격문을 보냈다. 일부 외국 신문이 조선의 상황을 보도했지만, 열강은 움직이지 않았다.' });
      items.push({ cls:'positive', text:'직접적인 도움은 없었지만, 조선의 상황이 해외 기록에 남기 시작했다. 훗날 독립운동가들이 이 기록을 활용하게 된다.' });
    } else if (round.id === 1) {
      items.push({ cls:'negative', text:'가쓰라-태프트 밀약으로 미국은 이미 일본 편이었다. 공사관 문은 열리지 않았다.' });
      items.push({ cls:'neutral', text:'그러나 일부 선교사와 외국 언론이 조선의 저항을 기록했다. 이 기록은 훗날 독립의 정당성을 알리는 데 쓰이게 된다.' });
    } else {
      items.push({ cls:'negative', text:'포츠머스 조약 이후 국제 여론은 더 이상 조선에 유리하지 않았다. 호소는 허공에 흩어졌다.' });
      items.push({ cls:'neutral', text:'그럼에도 해외 교민 사회와 독립운동 단체들이 이 싸움을 기록으로 남겼다.' });
    }
  }

  // 민심 결과
  if (heart >= 2) {
    items.push({ cls:'positive', text:'주민들이 식량을 가져다주었다. 의병에 합류하겠다는 청년이 찾아오기도 했다.' });
  } else if (heart === 1) {
    items.push({ cls:'neutral', text:'마을 주민 일부는 보복이 두려워 의병과 거리를 두기 시작했다.' });
  } else {
    items.push({ cls:'negative', text:'일본군의 탄압이 심해지면서, 주민들은 의병 곁에 있다가는 자신도 위험하다고 여겼다.' });
  }

  // 해산군인 특이사항
  if (hasSoldier && round.id === 2) {
    items.push({ cls:'neutral', text:'해산 군인의 합류로 화력과 전술이 크게 강해졌다. 그러나 탄약 보급이 끊겨, 총알이 바닥나기 시작했다.' });
  }

  // 계승 결과
  if (carry >= 3) {
    items.push({ cls:'positive', text:'살아남은 의병들이 조직을 추슬렀다. 일부는 훗날의 싸움을 위해 만주·연해주로 길을 떠났다.' });
  } else if (carry >= 2) {
    items.push({ cls:'positive', text:'흩어진 이들 중 일부가 다시 모였다. 작은 불씨가 남았다.' });
  } else if (carry === 1) {
    items.push({ cls:'neutral', text:'의병 조직 대부분이 와해되었다. 개인으로 흩어진 이들이 각자의 방식으로 저항을 이어갔다.' });
  } else {
    items.push({ cls:'negative', text:'이 지역 의병은 사실상 해체되었다. 소식은 다른 지역으로 전해졌다.' });
  }

  return { items, fight, heart, carry };
}

function getEnding(history) {
  const totalCarry = history.reduce((s,h) => s + h.carry, 0);
  const totalHeart = history.reduce((s,h) => s + h.heart, 0);
  const totalFight = history.reduce((s,h) => s + h.fight, 0);

  // 피로 물든 전선: 전투에 집중했으나 지속성이 낮은 경우
  if (totalFight >= 6 && totalCarry <= 3) {
    return {
      icon: '⚔️',
      title: '피로 물든 전선',
      quote: '"끝까지 싸웠다. 그것만은 사실이다."',
      connect: `끝까지 싸웠지만 너무 많은 것을 잃었습니다. 살아남은 조직은 적었고, 다음을 기약하기 어려웠습니다. 그러나 <strong>처절하게 맞선 의병의 기록은 지워지지 않았습니다.</strong> 이 항전의 역사는 후대 독립운동가들에게 싸울 이유가 되었습니다.`,
      quality: 'tough',
    };
  }

  if (totalCarry >= 6) {
    return {
      icon: '🔥',
      title: '살아남은 불씨',
      quote: '"의병은 패했다. 그러나 끝나지 않았다."',
      connect: `3시기에 걸쳐 의병의 조직이 이어졌습니다. 살아남은 이들은 <strong>만주와 연해주로 건너가 독립군 부대의 기반</strong>이 되었습니다. 의병의 무장 경험과 항일 정신은 1919년 이후 독립군으로 계승되었습니다.`,
      quality: 'good',
    };
  } else if (totalHeart >= 5) {
    return {
      icon: '🌾',
      title: '민심의 씨앗',
      quote: '"총탄은 사람을 멈추게 할 수 있지만, 마음은 멈추게 할 수 없다."',
      connect: `의병은 군사적으로 패했지만, <strong>주민들 사이에 국권 회복의 의식이 퍼져나갔습니다.</strong> 이 의식은 이후 교육·계몽 운동과 3·1운동의 토양이 되었습니다.`,
      quality: 'mid',
    };
  } else {
    return {
      icon: '📜',
      title: '고립된 싸움',
      quote: '"이긴 싸움은 아니었다. 그러나 싸우지 않은 것도 아니었다."',
      connect: `의병은 고립된 채 각지에서 소멸했습니다. 그러나 <strong>이 저항의 기록은 지워지지 않았습니다.</strong> 훗날 독립운동가들은 의병의 역사에서 다시 일어설 이유를 찾았습니다.`,
      quality: 'tough',
    };
  }
}

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let S = {
  phase: 'intro',   // intro | recruit | strategy | result | final
  roundIdx: 0,
  selRecruits: [],  // 선택한 병력 id 배열 (최대 2)
  selStrategy: null,
  history: [],      // [{round, recruits, strategy, outcome}]
  submitted: false,
};

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
let toastT = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

function scrollTop() { window.scrollTo(0, 0); }

function barPct(val, max=3) { return Math.round((val / max) * 100) + '%'; }

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function R() {
  scrollTop();
  const app = document.getElementById('app');
  if      (S.phase === 'intro')    app.innerHTML = renderIntro();
  else if (S.phase === 'recruit')  app.innerHTML = renderRecruit();
  else if (S.phase === 'strategy') app.innerHTML = renderStrategy();
  else if (S.phase === 'result')   app.innerHTML = renderResult();
  else                             app.innerHTML = renderFinal();
}

/* ── INTRO ── */
function renderIntro() {
  return `
  <div class="scene">
    <div class="paper-card intro-wrap">
      <div class="doc-header">
        <div class="doc-era">1895 · 1905 · 1907</div>
        <div class="doc-title">의병을 일으켜라</div>
        <div class="doc-subtitle">을미 · 을사 · 정미의병 체험</div>
      </div>
      <div class="intro-body">
        <p class="intro-manifesto">
          국권이 무너지고 있다.<br>
          당신은 <strong>의병장</strong>이 되어<br>
          세 번의 시기에 걸쳐<br>
          <em>병력을 모으고, 전략을 선택한다.</em><br><br>
          전투에서 질지라도,<br>
          무엇이 남는지 지켜보라.
        </p>
        <div class="intro-rule-box">
          <div class="intro-rule-title">■ 게임 방법</div>
          <ul class="intro-rule-list">
            <li>3개 시기(을미·을사·정미)를 차례로 체험한다</li>
            <li>매 시기마다 병력 2종과 전략 1가지를 고른다</li>
            <li>시기마다 모을 수 있는 병력이 달라진다</li>
            <li>군사적 승패보다 <strong>무엇이 이어지는지</strong>가 중요하다</li>
          </ul>
        </div>
        <div class="timeline-row">
          <div class="tl-item">
            <div class="tl-icon">📜</div>
            <div class="tl-year">1895</div>
            <div class="tl-name">을미의병</div>
          </div>
          <div class="tl-item">
            <div class="tl-icon">🪧</div>
            <div class="tl-year">1905</div>
            <div class="tl-name">을사의병</div>
          </div>
          <div class="tl-item">
            <div class="tl-icon">⚔️</div>
            <div class="tl-year">1907</div>
            <div class="tl-name">정미의병</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="startGame()">의병을 일으킨다 →</button>
      </div>
    </div>
  </div>`;
}

/* ── RECRUIT ── */
function renderRecruit() {
  const round = ROUNDS[S.roundIdx];
  const canNext = S.selRecruits.length === 2;

  const recruitHtml = Object.values(RECRUITS).map(r => {
    const locked = r.lockIf(S.roundIdx);
    const selected = S.selRecruits.includes(r.id);
    return `
    <div class="recruit-card${selected ? ' selected' : ''}${locked ? ' locked' : ''}"
         onclick="${locked ? '' : 'toggleRecruit(\'' + r.id + '\')'}">
      <div class="rc-icon">${r.icon}</div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>
      ${!locked ? `<div class="rc-desc" style="margin-top:5px;color:var(--accent);font-size:11px">↳ ${r.burden}</div>` : ''}
      ${locked ? `<div class="rc-lock-note">${r.lockNote}</div>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="scene">
    <div class="round-bar">
      <span class="round-bar-left">${S.roundIdx + 1}/3</span>
      <span class="round-bar-title">${round.era}</span>
      <span class="round-bar-right">${round.year}년</span>
    </div>
    <div class="paper-card">
      <div class="situation-block">
        <div class="situation-tag">상황</div>
        <p class="situation-text">${round.situation}</p>
      </div>
      <div class="crackdown-banner">
        <div class="crackdown-icon">${round.crackdown.icon}</div>
        <div class="crackdown-text">${round.crackdown.text}</div>
      </div>
      <div class="phase-title">병력 모집 — <span>2종 선택 (${S.selRecruits.length}/2)</span></div>
      <div class="recruit-grid">${recruitHtml}</div>
      <div class="confirm-bar">
        <div class="confirm-hint">병력 2종을 고른 뒤 전략을 선택합니다</div>
        <button class="btn btn-primary" ${canNext ? '' : 'disabled'} onclick="goStrategy()">
          전략 선택으로 →
        </button>
      </div>
    </div>
  </div>`;
}

/* ── STRATEGY ── */
function renderStrategy() {
  const round = ROUNDS[S.roundIdx];
  const canNext = S.selStrategy !== null;

  const stratHtml = STRATEGIES.map(st => {
    const selected = S.selStrategy === st.id;
    return `
    <div class="strat-card${selected ? ' selected' : ''}" onclick="selectStrategy('${st.id}')">
      <div class="sc-icon">${st.icon}</div>
      <div class="sc-right">
        <div class="sc-name">${st.name}</div>
        <div class="sc-desc">${st.desc}</div>
        <div class="sc-hint">${st.hint}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="scene">
    <div class="round-bar">
      <span class="round-bar-left">${S.roundIdx + 1}/3</span>
      <span class="round-bar-title">${round.era}</span>
      <span class="round-bar-right">${round.year}년</span>
    </div>
    <div class="paper-card">
      <div class="phase-title">작전 선택 — <span>1가지 선택</span></div>
      <div class="strat-list">${stratHtml}</div>
      <div class="confirm-bar">
        <div class="confirm-hint">작전을 고른 뒤 결과를 확인합니다</div>
        <button class="btn btn-accent" ${canNext ? '' : 'disabled'} onclick="goResult()">
          의병을 이끈다 →
        </button>
      </div>
    </div>
  </div>`;
}

/* ── RESULT ── */
function renderResult() {
  const round = ROUNDS[S.roundIdx];
  const h = S.history[S.roundIdx];
  const isLast = S.roundIdx >= ROUNDS.length - 1;
  const histNote = getHistNote(round, h.outcome);

  const itemsHtml = h.outcome.items.map(item =>
    `<div class="outcome-item ${item.cls}">${item.text}</div>`
  ).join('');

  const { fight, heart, carry } = h.outcome;

  return `
  <div class="scene">
    <div class="round-bar">
      <span class="round-bar-left">${S.roundIdx + 1}/3</span>
      <span class="round-bar-title">${round.era} — 결과</span>
      <span class="round-bar-right">${round.year}년</span>
    </div>
    <div class="paper-card">
      <div class="result-block">
        <div class="result-verdict">
          <div class="verdict-icon">📰</div>
          <div class="verdict-text">
            <div class="verdict-label">기록</div>
            <div class="verdict-title">${round.era}의 기억</div>
          </div>
        </div>
        <div class="outcome-list">${itemsHtml}</div>
        <div class="status-strip">
          <div class="status-cell">
            <div class="status-label">전투력</div>
            <div class="status-bar-wrap"><div class="status-bar fight" style="width:${barPct(fight)}"></div></div>
          </div>
          <div class="status-cell">
            <div class="status-label">민심</div>
            <div class="status-bar-wrap"><div class="status-bar heart" style="width:${barPct(heart)}"></div></div>
          </div>
          <div class="status-cell">
            <div class="status-label">지속성</div>
            <div class="status-bar-wrap"><div class="status-bar carry" style="width:${barPct(carry)}"></div></div>
          </div>
        </div>
        <div class="history-note">
          <div class="history-note-label">■ 역사 기록</div>
          <div class="history-note-text">${histNote}</div>
        </div>
        <div class="history-note" style="margin-top:10px;border-color:rgba(155,32,32,0.3);background:rgba(155,32,32,0.04)">
          <div class="history-note-label" style="color:var(--accent)">■ 실제 의병 인물</div>
          <div class="history-note-text">${getPersonRecord(S.roundIdx)}</div>
        </div>
      </div>
      <div style="padding:0 24px 24px">
        <button class="btn btn-primary" onclick="${isLast ? 'goFinal()' : 'goNextRound()'}">
          ${isLast ? '3시기의 기록을 확인한다 →' : `${ROUNDS[S.roundIdx + 1].year}년 — ${ROUNDS[S.roundIdx + 1].era}으로 →`}
        </button>
      </div>
    </div>
  </div>`;
}

/* ── FINAL ── */
function renderFinal() {
  const ending = getEnding(S.history.map(h => h.outcome));

  const timelineHtml = S.history.map(h => {
    const r = ROUNDS[h.roundIdx];
    const recruitsLabel = h.recruits.map(id => RECRUITS[id].name).join(' + ');
    const stratLabel = STRATEGIES.find(s => s.id === h.strategy).name;
    const qual = h.outcome.carry >= 2 ? 'good' : h.outcome.heart >= 2 ? 'mid' : 'tough';
    return `
    <div class="ftl-row">
      <div class="ftl-year">${r.year}</div>
      <div class="ftl-bar ${qual}"></div>
      <div class="ftl-content">
        <div class="ftl-name">${r.era}</div>
        <div class="ftl-detail">${recruitsLabel} · ${stratLabel}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="scene">
    <div class="paper-card">
      <div class="final-header">
        <div class="final-era">1895 · 1905 · 1907 — 3시기의 기록</div>
        <div class="final-icon">${ending.icon}</div>
        <div class="final-title">${ending.title}</div>
        <div class="final-quote">${ending.quote}</div>
      </div>
      <div class="final-timeline">${timelineHtml}</div>
      <div class="final-connect">
        <div class="fc-title">■ 역사의 이어짐</div>
        <div class="fc-text">${ending.connect}</div>
      </div>
      <div class="comment-block" style="padding-top:20px">
        <label class="comment-label" for="comment">■ 한 줄 소감</label>
        <textarea id="comment" class="comment-textarea" rows="2"
          placeholder="게임을 마치고 떠오른 생각을 한 줄로 남겨보세요. (이름·학번 제외)"
          maxlength="100"></textarea>
        <div class="comment-hint">최대 100자</div>
      </div>
      <div class="final-actions">
        <button class="btn btn-primary" onclick="copyResult()">📋 기록 복사하기 (패들렛 공유)</button>
        <button class="btn btn-ghost" onclick="restart()">다시 의병을 일으킨다</button>
      </div>
      <div class="copyright">© 찰리쌤 · hischarlie.tistory.com</div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
function startGame() {
  S.phase = 'recruit';
  S.roundIdx = 0;
  S.selRecruits = [];
  S.selStrategy = null;
  S.history = [];
  S.submitted = false;
  R();
}

function toggleRecruit(id) {
  if (S.selRecruits.includes(id)) {
    S.selRecruits = S.selRecruits.filter(x => x !== id);
  } else {
    if (S.selRecruits.length >= 2) {
      showToast('병력은 2종만 선택할 수 있습니다');
      return;
    }
    S.selRecruits.push(id);
  }
  R();
}

function goStrategy() {
  if (S.selRecruits.length < 2) return;
  S.selStrategy = null;
  S.phase = 'strategy';
  R();
}

function selectStrategy(id) {
  S.selStrategy = id;
  R();
}

function goResult() {
  if (!S.selStrategy) return;
  const round = ROUNDS[S.roundIdx];
  const outcome = makeOutcome(round, S.selRecruits, S.selStrategy);
  S.history.push({
    roundIdx: S.roundIdx,
    recruits: [...S.selRecruits],
    strategy: S.selStrategy,
    outcome,
  });
  S.phase = 'result';
  R();
}

function goNextRound() {
  S.roundIdx++;
  S.selRecruits = [];
  S.selStrategy = null;
  S.phase = 'recruit';
  R();
}

function goFinal() {
  S.phase = 'final';

  // Supabase 즉시 전송
  if (!S.submitted) {
    const choiceData = S.history.map(h => ({
      era: ROUNDS[h.roundIdx].era,
      recruits: h.recruits,
      strategy: h.strategy,
      fight: h.outcome.fight,
      heart: h.outcome.heart,
      carry: h.outcome.carry,
    }));
    sendToSupabase(choiceData, '');
    S.submitted = true;
  }
  R();
}

function copyResult() {
  const comment = document.getElementById('comment')?.value?.trim() || '';
  if (comment) {
    const choiceData = S.history.map(h => ({
      era: ROUNDS[h.roundIdx].era,
      recruits: h.recruits,
      strategy: h.strategy,
    }));
    sendToSupabase(choiceData, comment);
  }

  const ending = getEnding(S.history.map(h => h.outcome));
  const lines = [
    `🔥 의병을 일으켜라 — ${ending.title}`,
    '',
    ...S.history.map(h => {
      const r = ROUNDS[h.roundIdx];
      const recruitsLabel = h.recruits.map(id => RECRUITS[id].name).join(' + ');
      const stratLabel = STRATEGIES.find(s => s.id === h.strategy).name;
      return `${r.year} ${r.era}: ${recruitsLabel} · ${stratLabel}`;
    }),
    '',
    comment ? `소감: ${comment}` : '',
    '— 찰리쌤의 한국사 게임실',
  ].filter(l => l !== undefined);

  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 기록이 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
    try { document.execCommand('copy'); showToast('📋 기록이 복사되었습니다!'); }
    catch(e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = { phase: 'intro', roundIdx: 0, selRecruits: [], selStrategy: null, history: [], submitted: false };
  R();
}

R();
</script>
