<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우정총국의 밤 — 갑신정변 1884</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 근현대 + 긴박감 혼합 팔레트 */
  --bg:       #0a0906;
  --surface:  #14110d;
  --surface2: #1e1a14;
  --gold:     #c9a052;
  --gold2:    #e8c97a;
  --gold-dim: rgba(201,160,82,0.15);
  --red:      #b83030;
  --red2:     #d44040;
  --green:    #2e6e52;
  --green2:   #48a07a;
  --text:     #e8dcc8;
  --text-mid: #b8aa94;
  --text-dim: #7a6e5a;
  --border:   rgba(201,160,82,0.25);
  --border2:  rgba(201,160,82,0.12);

  --font-display: 'Black Han Sans', sans-serif;
  --font-serif:   'Noto Serif KR', serif;
  --font-body:    'Noto Sans KR', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px 12px 64px;
  position: relative;
  overflow-x: hidden;
}

/* 배경 grain 효과 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,160,82,0.05) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 680px;
}

/* ═══════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════ */
.tt {
  border-bottom: 1.5px dashed var(--gold);
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  color: inherit;
  transition: border-color 0.15s;
}
.tt:hover { border-bottom-color: var(--red2); }

#tt-bubble {
  position: fixed;
  z-index: 9000;
  max-width: 260px;
  background: #1a1410;
  border: 1px solid rgba(201,160,82,0.5);
  border-radius: 4px;
  padding: 10px 13px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.7);
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.18s, transform 0.18s;
}
#tt-bubble.show { opacity: 1; transform: translateY(0); }
#tt-bubble .tb-word { font-size: 12px; font-weight: 700; color: var(--gold2); margin-bottom: 5px; }
#tt-bubble .tb-desc { font-size: 12px; color: rgba(232,220,200,0.85); line-height: 1.7; }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1410; color: var(--gold2);
  border: 1px solid var(--gold); border-radius: 24px;
  padding: 10px 22px; font-size: 13px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 9999; transition: opacity 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
#toast.show { opacity: 1; }

/* ═══════════════════════════════════════
   GAUGE BAR (상단 고정)
═══════════════════════════════════════ */
.gauge-bar {
  background: rgba(10,9,6,0.95);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 12px; align-items: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(4px);
}
.gauge-item { flex: 1; }
.gauge-label {
  font-size: 10px; letter-spacing: 0.12em;
  color: var(--text-dim); margin-bottom: 4px;
  font-family: var(--font-body); font-weight: 500;
}
.gauge-track {
  height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden;
}
.gauge-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.gauge-fill.prep     { background: linear-gradient(to right, #c8972a, #e8c97a); }
.gauge-fill.legit    { background: linear-gradient(to right, #2e6e52, #48a07a); }
.gauge-fill.japan    { background: linear-gradient(to right, #8b1a1a, #b83030); }
.gauge-val {
  font-size: 10px; color: var(--text-mid);
  text-align: right; margin-top: 3px;
  font-family: var(--font-body);
}
.gauge-val.warn { color: var(--red2); }

/* ═══════════════════════════════════════
   SCENE SHELL
═══════════════════════════════════════ */
.scene {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  animation: sceneIn 0.4s ease forwards;
  margin-top: 0;
}
@keyframes sceneIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════
   SCENE HEADER
═══════════════════════════════════════ */
.scene-hdr {
  border-bottom: 1px solid var(--border2);
  padding: 20px 24px 16px;
  position: relative;
}
.scene-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.scene-num {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--gold); font-family: var(--font-body);
  font-weight: 700;
}
.scene-date {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.1em;
}
.scene-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 4vw, 24px);
  color: var(--text);
  line-height: 1.3;
}
.scene-title em {
  color: var(--gold2); font-style: normal;
}

/* ═══════════════════════════════════════
   SITUATION BOX
═══════════════════════════════════════ */
.situation {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border2);
}
.situation-text {
  font-size: 15px; line-height: 1.9;
  color: var(--text-mid);
  font-family: var(--font-serif);
  font-weight: 300;
}
.situation-text strong { color: var(--text); font-weight: 600; }
.situation-text em {
  color: var(--gold); font-style: normal;
  font-weight: 400;
}

/* 인물 발언 */
.speech {
  margin: 14px 0 0;
  background: var(--surface2);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  padding: 12px 16px;
}
.speech-who {
  font-size: 11px; color: var(--gold);
  letter-spacing: 0.1em; margin-bottom: 6px;
  font-weight: 700;
}
.speech-text {
  font-size: 14px; color: var(--text);
  line-height: 1.8; font-family: var(--font-serif);
  font-style: italic;
}

/* ═══════════════════════════════════════
   CHOICES
═══════════════════════════════════════ */
.choices-wrap {
  padding: 20px 24px 24px;
}
.choices-label {
  font-size: 11px; letter-spacing: 0.15em;
  color: var(--text-dim); margin-bottom: 12px;
  font-weight: 500;
}
.choices { display: flex; flex-direction: column; gap: 10px; }

.choice-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-left: 3px solid transparent;
  border-radius: 4px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative;
}
.choice-card:hover {
  border-left-color: var(--gold);
  background: rgba(201,160,82,0.06);
  transform: translateX(3px);
}
.choice-card:active { transform: translateX(1px) scale(0.99); }
.choice-card.selected {
  border-left-color: var(--gold);
  border-color: rgba(201,160,82,0.4);
  background: rgba(201,160,82,0.08);
}
.choice-card.disabled {
  opacity: 0.4; cursor: not-allowed;
  pointer-events: none;
}

.choice-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 6px;
}
.choice-text {
  font-size: 15px; font-weight: 600;
  color: var(--text); line-height: 1.5;
  font-family: var(--font-serif);
}
.choice-badge {
  font-size: 10px; padding: 2px 8px;
  border-radius: 2px; white-space: nowrap;
  font-weight: 700; flex-shrink: 0; margin-top: 3px;
  font-family: var(--font-body);
}
.badge-certain   { background: rgba(46,110,82,0.3); color: var(--green2); border: 1px solid rgba(46,110,82,0.5); }
.badge-uncertain { background: rgba(201,160,82,0.15); color: var(--gold); border: 1px solid rgba(201,160,82,0.3); }
.badge-risky     { background: rgba(184,48,48,0.2); color: #e06060; border: 1px solid rgba(184,48,48,0.4); }

.choice-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.7; font-family: var(--font-body);
  font-weight: 300;
}

/* ═══════════════════════════════════════
   FEEDBACK (선택 후 반응)
═══════════════════════════════════════ */
.feedback-box {
  margin: 0 24px 20px;
  border-radius: 4px;
  padding: 14px 16px;
  animation: sceneIn 0.35s ease forwards;
}
.feedback-box.negative {
  background: rgba(184,48,48,0.1);
  border: 1px solid rgba(184,48,48,0.3);
}
.feedback-box.positive {
  background: rgba(46,110,82,0.1);
  border: 1px solid rgba(46,110,82,0.3);
}
.feedback-box.neutral {
  background: rgba(201,160,82,0.08);
  border: 1px solid rgba(201,160,82,0.2);
}
.feedback-icon { font-size: 16px; margin-bottom: 6px; display: block; }
.feedback-text {
  font-size: 13px; line-height: 1.8;
  color: var(--text-mid); font-family: var(--font-body);
  font-weight: 300;
}
.feedback-text strong { color: var(--text); font-weight: 600; }

.next-btn {
  display: block; width: calc(100% - 48px);
  margin: 0 24px 24px;
  padding: 13px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--gold2);
  font-family: var(--font-serif);
  font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.04em;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.next-btn:hover {
  background: var(--gold-dim);
  border-color: var(--gold);
  transform: translateY(-1px);
}
.next-btn:active { transform: translateY(0) scale(0.98); }

/* ═══════════════════════════════════════
   SUMMARY (엔딩 직전 요약)
═══════════════════════════════════════ */
.summary-scene {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  animation: sceneIn 0.4s ease forwards;
}
.summary-hdr {
  background: linear-gradient(135deg, #14110d, #0a0906);
  border-bottom: 1px solid var(--border);
  padding: 24px 24px 20px;
  text-align: center;
}
.summary-hdr-label {
  font-size: 10px; letter-spacing: 0.25em;
  color: var(--gold); margin-bottom: 10px;
  font-weight: 700;
}
.summary-hdr-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 4.5vw, 28px);
  color: var(--text);
  line-height: 1.3;
}
.summary-body { padding: 20px 24px; }
.summary-log {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 20px;
}
.log-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  font-size: 13px; line-height: 1.6;
  color: var(--text-mid);
}
.log-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0; margin-top: 6px;
}
.log-dot.neg  { background: var(--red); }
.log-dot.pos  { background: var(--green2); }
.log-dot.warn { background: var(--gold); }

.summary-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border), transparent);
  margin: 20px 0;
}
.summary-question {
  font-size: 14px; color: var(--text-mid);
  line-height: 1.8; margin-bottom: 16px;
  font-family: var(--font-serif); font-style: italic;
  text-align: center;
}
.final-choices { display: flex; flex-direction: column; gap: 10px; }
.final-choice-btn {
  padding: 14px 16px;
  border-radius: 3px;
  border: 1px solid;
  background: transparent;
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text);
  text-align: left;
}
.final-choice-btn.exile {
  border-color: rgba(201,160,82,0.4);
  color: var(--gold2);
}
.final-choice-btn.exile:hover {
  background: rgba(201,160,82,0.1);
  border-color: var(--gold);
}
.final-choice-btn.fight {
  border-color: rgba(184,48,48,0.4);
  color: #e06060;
}
.final-choice-btn.fight:hover {
  background: rgba(184,48,48,0.1);
  border-color: var(--red2);
}
.final-choice-sub {
  display: block; font-size: 12px;
  color: var(--text-dim); font-weight: 300;
  margin-top: 4px; font-family: var(--font-body);
  font-style: normal;
}

/* ═══════════════════════════════════════
   ENDING
═══════════════════════════════════════ */
.ending-scene {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  animation: sceneIn 0.5s ease forwards;
}
.ending-banner {
  padding: 36px 24px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border2);
  position: relative;
}
.ending-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,160,82,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.ending-icon { font-size: 54px; margin-bottom: 16px; display: block; }
.ending-type {
  font-size: 10px; letter-spacing: 0.25em;
  color: var(--gold); margin-bottom: 10px;
  font-weight: 700;
}
.ending-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 5vw, 32px);
  line-height: 1.3; margin-bottom: 12px;
}
.ending-title.end-3days  { color: var(--text); }
.ending-title.end-japan  { color: #e06060; }
.ending-title.end-give   { color: var(--text-dim); }
.ending-title.end-ideal  { color: var(--green2); }

.ending-core {
  font-size: 14px; color: var(--text-mid);
  line-height: 1.8; font-family: var(--font-serif);
  font-style: italic;
}

.ending-body { padding: 24px; }

.ending-gauges {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.eg-item {
  flex: 1; padding: 12px 10px; text-align: center;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
}
.eg-label { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.08em; }
.eg-val { font-size: 20px; font-weight: 700; font-family: var(--font-body); }
.eg-val.high-prep  { color: var(--gold2); }
.eg-val.low-prep   { color: var(--red2); }
.eg-val.high-legit { color: var(--green2); }
.eg-val.low-legit  { color: var(--red2); }
.eg-val.high-japan { color: var(--red2); }
.eg-val.low-japan  { color: var(--green2); }

.ending-hist {
  background: var(--surface2);
  border: 1px dashed rgba(201,160,82,0.3);
  border-radius: 4px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.ending-hist-label {
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 8px;
  font-weight: 700;
}
.ending-hist-text {
  font-size: 13px; color: var(--text-mid);
  line-height: 1.8; font-family: var(--font-body);
  font-weight: 300;
}

.ending-question {
  border: 1px solid rgba(201,160,82,0.2);
  border-radius: 4px; padding: 16px;
  margin-bottom: 20px;
  background: rgba(201,160,82,0.04);
}
.eq-label {
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 8px; font-weight: 700;
}
.eq-text {
  font-size: 14px; color: var(--text);
  line-height: 1.8; font-family: var(--font-serif);
}

.ending-btns { display: flex; flex-direction: column; gap: 8px; }
.btn-copy {
  padding: 13px;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--gold2);
  font-family: var(--font-serif);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-copy:hover { background: rgba(201,160,82,0.2); border-color: var(--gold); transform: translateY(-1px); }
.btn-restart {
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 3px;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-restart:hover { border-color: rgba(255,255,255,0.2); color: var(--text-mid); }

/* 소감 입력 */
.comment-box {
  margin-bottom: 16px;
}
.comment-label {
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--gold); font-weight: 700;
  margin-bottom: 8px; display: block;
}
.comment-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 11px 14px;
  resize: none;
  transition: border-color 0.2s;
  line-height: 1.6;
}
.comment-input::placeholder { color: var(--text-dim); }
.comment-input:focus {
  outline: none;
  border-color: rgba(201,160,82,0.5);
}

/* 저작권 */
.copyright {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: rgba(120,100,80,0.4);
  font-family: var(--font-body);
}

/* ═══════════════════════════════════════
   INTRO
═══════════════════════════════════════ */
.intro-scene {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  animation: sceneIn 0.5s ease forwards;
}
.intro-hdr {
  background: linear-gradient(180deg, #0f0d0a 0%, #14110d 100%);
  border-bottom: 1px solid var(--border);
  padding: 36px 24px 28px;
  text-align: center;
  position: relative;
}
.intro-hdr::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.intro-label {
  font-size: 10px; letter-spacing: 0.3em;
  color: var(--gold); margin-bottom: 16px; font-weight: 700;
}
.intro-title {
  font-family: var(--font-display);
  font-size: clamp(24px, 6vw, 38px);
  color: var(--text);
  line-height: 1.3; margin-bottom: 8px;
}
.intro-title em { color: var(--gold2); font-style: normal; }
.intro-sub {
  font-size: 13px; color: var(--text-dim);
  letter-spacing: 0.08em;
}

.intro-body { padding: 24px; }

.intro-situation {
  font-size: 14px; color: var(--text-mid);
  line-height: 1.9; margin-bottom: 20px;
  font-family: var(--font-serif); font-weight: 300;
}
.intro-situation strong { color: var(--text); font-weight: 600; }

.intro-info {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 24px;
}
.info-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
}
.info-icon { font-size: 18px; flex-shrink: 0; }
.info-right {}
.info-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.info-val { font-size: 13px; color: var(--text-mid); font-weight: 400; }
.info-val strong { color: var(--text); }

.gauge-intro {

function tt(word, key) {
  const tip = TIPS[key || word] || '';
  if (!tip) return word;
  return `<span class="tt" data-tip="${encodeURIComponent(tip)}" data-word="${word}">${word}</span>`;
}

const bubble = document.getElementById('tt-bubble');
let bubbleTimer = null;
document.addEventListener('click', function(e) {
  const el = e.target.closest('.tt');
  if (el) {
    e.stopPropagation();
    bubble.querySelector('.tb-word').textContent = el.dataset.word;
    bubble.querySelector('.tb-desc').textContent = decodeURIComponent(el.dataset.tip);
    const bw = 260;
    const rect = el.getBoundingClientRect();
    let left = Math.max(8, Math.min(rect.left + rect.width/2 - bw/2, window.innerWidth - bw - 8));
    bubble.style.width = bw + 'px';
    bubble.style.left = left + 'px';
    bubble.style.top = '-9999px';
    bubble.classList.add('show');
    const bubH = bubble.offsetHeight;
    bubble.style.top = (rect.top - bubH - 14 < 8)
      ? (rect.bottom + 10) + 'px'
      : (rect.top - bubH - 14) + 'px';
    if (bubbleTimer) clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4500);
  } else {
    bubble.classList.remove('show');
  }
});

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

    return {

      message: '아무것도 바뀌지 않았다. 그리고 아무것도 지지 않았다.',
    };
  }

  // 일본 보호국 엔딩 (일본 의존 높고 정당성 낮으면)
  if (japan >= 70 && legit <= 30) {

function clamp(v) { return Math.max(0, Math.min(100, v)); }

function applyEffects(effects) {
  S.prep  = clamp(S.prep  + (effects.prep  || 0));
  S.legit = clamp(S.legit + (effects.legit || 0));
  S.japan = clamp(S.japan + (effects.japan || 0));
}

function renderGaugeBar() {
  return `
  <div class="gauge-bar">
    <div class="gauge-item">
      <div class="gauge-label">거사 준비도</div>
      <div class="gauge-track"><div class="gauge-fill prep" style="width:${S.prep}%"></div></div>
      <div class="gauge-val${S.prep <= 25 ? ' warn' : ''}">${S.prep}%</div>
    </div>
    <div class="gauge-item">
      <div class="gauge-label">정치적 정당성</div>
      <div class="gauge-track"><div class="gauge-fill legit" style="width:${S.legit}%"></div></div>
      <div class="gauge-val${S.legit <= 25 ? ' warn' : ''}">${S.legit}%</div>
    </div>
    <div class="gauge-item">
      <div class="gauge-label">일본 의존도</div>
      <div class="gauge-track"><div class="gauge-fill japan" style="width:${S.japan}%"></div></div>
      <div class="gauge-val${S.japan >= 70 ? ' warn' : ''}">${S.japan}%</div>
    </div>
  </div>`;
}

function renderScene() {
  const scene = SCENES[S.sceneIdx];
  const choicesHtml = scene.choices.map(c => {
    const isSel = S.selectedChoice && S.selectedChoice.id === c.id;
    const isDisabled = S.showingFeedback && !isSel;
    return `
    <div class="choice-card${isSel ? ' selected' : ''}${isDisabled ? ' disabled' : ''}"
         onclick="${S.showingFeedback ? '' : `selectChoice('${c.id}')`}">
      <div class="choice-top">
        <div class="choice-text">${c.text}</div>
        <span class="choice-badge ${c.badgeCls}">${c.badge}</span>
      </div>
      <div class="choice-desc">${c.desc}</div>
    </div>`;
  }).join('');

  const feedbackHtml = S.showingFeedback && S.selectedChoice ? (() => {
    const fb = S.selectedChoice.feedback;
    return `
    <div class="feedback-box ${fb.type}">
      <span class="feedback-icon">${fb.icon}</span>
      <div class="feedback-text">${fb.text}</div>
    </div>
    <button class="next-btn" onclick="nextScene()">
      ${S.sceneIdx >= SCENES.length - 1 ? '마지막 결정을 앞두고 →' : '다음 장면으로 →'}
    </button>`;
  })() : '';

  return `
  ${renderGaugeBar()}
  <div class="scene">
    <div class="scene-hdr">
      <div class="scene-meta">
        <span class="scene-num">${scene.num}</span>
        <span class="scene-date">${scene.date}</span>
      </div>
      <div class="scene-title">${scene.title()}</div>
    </div>
    <div class="situation">${scene.situation()}</div>
    <div class="choices-wrap">
      <div class="choices-label">▣ 선택하라</div>
      <div class="choices">${choicesHtml}</div>
    </div>
    ${feedbackHtml}
  </div>`;
}

        <button class="final-choice-btn exile" onclick="makeFinalChoice('exile')">
          ${tt('망명','망명')}한다 — 일본으로 건너가 때를 기다린다
          <span class="final-choice-sub">살아서 다음을 도모한다. 그러나 조선으로 돌아오지 못할 수도 있다.</span>
        </button>
        <button class="final-choice-btn fight" onclick="makeFinalChoice('fight')">
          끝까지 싸운다 — 이 자리에서 결판을 낸다
          <span class="final-choice-sub">승산이 없다. 그러나 도망치지 않는다는 것을 역사에 남긴다.</span>
        </button>
      </div>
    </div>
  </div>`;
}

function renderEnding() {
  const ending = getEnding();

  const prepCls = S.prep >= 50 ? 'high-prep' : 'low-prep';
  const legitCls = S.legit >= 50 ? 'high-legit' : 'low-legit';
  const japanCls = S.japan >= 50 ? 'high-japan' : 'low-japan';

  const finalNote = S.finalChoice === 'exile'
    ? '김옥균은 일본으로 망명했다. 10년 후인 1894년, 그는 상하이에서 조선 자객에게 암살됐다.'
    : '끝까지 싸웠다. 동지들과 함께 한성에서 역사의 일부가 됐다.';

  return `
  <div class="ending-scene">
    <div class="ending-banner">
      <span class="ending-icon">${ending.icon}</span>
      <div class="ending-type">${ending.type}</div>
      <div class="ending-title ${ending.titleCls}">${ending.title}</div>
      <div class="ending-core">${ending.core}</div>
    </div>
    <div class="ending-body">
      <div class="ending-gauges">
        <div class="eg-item">
          <div class="eg-label">거사 준비도</div>
          <div class="eg-val ${prepCls}">${S.prep}%</div>
        </div>
        <div class="eg-item">
          <div class="eg-label">정치적 정당성</div>
          <div class="eg-val ${legitCls}">${S.legit}%</div>
        </div>
        <div class="eg-item">
          <div class="eg-label">일본 의존도</div>
          <div class="eg-val ${japanCls}">${S.japan}%</div>
        </div>
      </div>
      <div class="ending-hist">
        <div class="ending-hist-label">📜 실제 역사</div>
        <div class="ending-hist-text">${ending.hist}<br><br><em>${finalNote}</em></div>
      </div>
      <div class="ending-question">
        <div class="eq-label">✦ 생각해볼 질문</div>
        <div class="eq-text">${ending.question}</div>
      </div>
      <div style="text-align:center;font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:16px;line-height:1.7">${ending.message}</div>
      <div class="ending-btns">
        <div class="comment-box">
          <span class="comment-label">✦ 한 줄 소감 (복사 시 함께 포함됩니다)</span>
          <textarea class="comment-input" id="comment-input" rows="2"
            placeholder="이 정변은 왜 실패했는가? 한 줄로 남겨보세요. (이름·학번 제외)"
            maxlength="100"
            oninput="S.comment = this.value"></textarea>
        </div>
        <button class="btn-copy" onclick="copyResult()">📋 내 결과 복사하기 (패들렛 공유용)</button>
        <button class="btn-restart" onclick="restartGame()">다시 플레이하기</button>
      </div>
      <div class="copyright">© 찰리쌤 · hischarlie.tistory.com</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   RENDER ROUTER
═══════════════════════════════════════ */
function R() {
  window.scrollTo(0, 0);
  const app = document.getElementById('app');
  app.innerHTML =
    S.phase === 'intro'   ? renderIntro() :
    S.phase === 'scene'   ? renderScene() :
    S.phase === 'summary' ? renderSummary() :
                            renderEnding();
}

/* ═══════════════════════════════════════
   EVENTS
═══════════════════════════════════════ */
function startGame() {
  gtag('event', 'start_game', { game: 'ujeongtonguk' });
  S.phase = 'scene'; S.sceneIdx = 0; R();
}

function selectChoice(choiceId) {
  const scene = SCENES[S.sceneIdx];
  const choice = scene.choices.find(c => c.id === choiceId);
  if (!choice) return;

  S.selectedChoice = choice;
  S.showingFeedback = true;
  applyEffects(choice.effects);
  S.chosenIds.push(choiceId);
  S.log.push({ text: choice.logText, type: choice.logType });

  gtag('event', 'select_choice', { game: 'ujeongtonguk', scene: scene.id, choice: choiceId });
  R();
}

function nextScene() {
  S.showingFeedback = false;
  S.selectedChoice = null;

  if (S.sceneIdx >= SCENES.length - 1) {
    S.phase = 'summary';
  } else {
    S.sceneIdx++;
  }
  R();
}

function makeFinalChoice(choice) {
  S.finalChoice = choice;
  S.phase = 'ending';
  gtag('event', 'final_choice', { game: 'ujeongtonguk', choice });
  gtag('event', 'finish_game', { game: 'ujeongtonguk', ending: getEnding().id });
  R();
}

function copyResult() {
  const ending = getEnding();
  const choiceLabels = {
    c1a: '일본 차관 수락', c1b: '독자 자금 조달',
    c2a: '고문단 조건 수락', c2b: '조건 거절',
    c3a: '예정대로 실행', c3b: '하루 연기',
    c4a: '미·영 지지 호소', c4b: '일본군 공식 배치',
    c5a: '청과 협상 시도', c5b: '끝까지 저항',
  };
  const finalLabel = S.finalChoice === 'exile' ? '망명' : '끝까지 저항';

  // 중복 제출 방지 — 첫 복사 시에만 Supabase 전송
  if (!S.submitted) {
    sendToSupabase({
      choices: S.chosenIds,
      finalChoice: S.finalChoice,
      ending: ending.id,
      prep: S.prep,
      legit: S.legit,
      japan: S.japan,
    }, S.comment.trim());
    S.submitted = true;
    const btn = document.querySelector('.btn-copy');
    if (btn) { btn.textContent = '✅ 제출 완료 (다시 복사하기)'; }
  }

  const lines = [
    `⚔️ 우정총국의 밤 — 갑신정변 1884`,
    ``,
    `나의 선택:`,
    ...S.chosenIds.map((id, i) => `  ${i+1}. ${choiceLabels[id] || id}`),
    `  최후: ${finalLabel}`,
    ``,
    `결과: ${ending.title.replace('\n', ' ')}`,
    `거사 준비도 ${S.prep}% / 정치적 정당성 ${S.legit}% / 일본 의존도 ${S.japan}%`,
    ``,
    `"${ending.message}"`,
    ...(S.comment.trim() ? [``, `소감: ${S.comment.trim()}`] : []),
    ``,
    `— 찰리쌤 한국사 게임 · hischarlie.tistory.com`,
  ];
  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 결과가 복사됐습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast('📋 결과가 복사됐습니다!'); }
    catch(e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restartGame() {
  S.phase = 'intro'; S.sceneIdx = 0;
  S.prep = 50; S.legit = 60; S.japan = 20;
  S.chosenIds = []; S.log = [];
  S.selectedChoice = null; S.showingFeedback = false;
  S.finalChoice = null; S.comment = ''; S.submitted = false;
  R();
}

R();
</script>
</body>
</html>
