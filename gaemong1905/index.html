<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1905년의 선택 — 애국계몽운동</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 근현대 팔레트 ── */
:root {
  --bg:       #f0ece4;
  --surface:  #e8e0d4;
  --surface2: #ddd5c8;
  --primary:  #003087;
  --accent:   #cd2e3a;
  --text:     #1a1a1a;
  --muted:    #6b5f52;
  --sepia:    #8b7355;
  --border:   rgba(139,115,85,0.35);
  --gold:     #8b6914;

  --font-title: 'Black Han Sans', sans-serif;
  --font-body:  'Noto Sans KR', sans-serif;
  --font-serif: 'Noto Serif KR', serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 0 0 80px;
}

/* ── 배경 텍스처 (낡은 사진 질감) ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.6;
}

/* ── 레이아웃 ── */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 680px;
  padding: 0 20px;
}

/* ── 씬 공통 ── */
.scene {
  animation: sceneIn 0.45s ease forwards;
  padding-top: 40px;
}
@keyframes sceneIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 진행 바 ── */
.progress-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 3px;
  background: var(--surface2);
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width 0.5s ease;
}

/* ── 씬 번호 ── */
.scene-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--sepia);
  font-family: var(--font-body);
  font-weight: 500;
  margin-bottom: 12px;
  text-transform: uppercase;
}

/* ── 제목 ── */
.scene-title {
  font-family: var(--font-title);
  font-size: clamp(22px, 5vw, 30px);
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 8px;
}

/* ── 구분선 ── */
.divider {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, var(--primary), transparent);
  margin: 16px 0 24px;
  opacity: 0.4;
}

/* ── 본문 텍스트 ── */
.scene-body {
  font-size: 16px;
  line-height: 2;
  color: var(--text);
  font-weight: 300;
  white-space: pre-line;
  margin-bottom: 32px;
}
.scene-body strong { font-weight: 600; color: var(--primary); }
.scene-body em     { color: var(--accent); font-style: normal; font-weight: 500; }

/* ── 연도 강조 블록 ── */
.year-block {
  display: inline-block;
  font-family: var(--font-title);
  font-size: 13px;
  color: var(--accent);
  border: 1px solid rgba(205,46,58,0.3);
  border-radius: 2px;
  padding: 2px 10px;
  margin-bottom: 20px;
  letter-spacing: 0.1em;
  background: rgba(205,46,58,0.05);
}

/* ── 선택지 카드 ── */
.choices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

.choice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid transparent;
  border-radius: 2px;
  padding: 18px 20px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  text-align: left;
}
.choice-card:hover {
  border-left-color: var(--primary);
  background: rgba(0,48,135,0.04);
  transform: translateX(4px);
}
.choice-card.selected {
  border-left-color: var(--accent);
  background: rgba(205,46,58,0.05);
}
.choice-card:active { transform: translateX(2px) scale(0.99); }

.choice-num {
  font-size: 11px;
  font-weight: 500;
  color: var(--sepia);
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  font-family: var(--font-body);
}
.choice-title {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 5px;
  line-height: 1.4;
}
.choice-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  font-weight: 300;
}

/* ── 버튼 ── */
.btn {
  display: block;
  width: 100%;
  padding: 16px 24px;
  border: 1px solid var(--primary);
  border-radius: 2px;
  background: var(--primary);
  color: #fff;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  letter-spacing: 0.04em;
  text-align: center;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,48,135,0.25);
  background: #004ab8;
}
.btn:active { transform: translateY(0) scale(0.98); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-outline {
  background: transparent;
  color: var(--primary);
  margin-top: 10px;
}
.btn-outline:hover {
  background: rgba(0,48,135,0.06);
  box-shadow: 0 4px 16px rgba(0,48,135,0.1);
}

.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
}
.btn-accent:hover {
  background: #a8222d;
  box-shadow: 0 4px 16px rgba(205,46,58,0.3);
}

/* ── 노선 뱃지 ── */
.route-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 2px;
  border: 1px solid;
  margin-bottom: 20px;
  letter-spacing: 0.05em;
}
.route-badge.public  { color: var(--accent); border-color: rgba(205,46,58,0.4); background: rgba(205,46,58,0.06); }
.route-badge.educ    { color: var(--primary); border-color: rgba(0,48,135,0.4); background: rgba(0,48,135,0.06); }
.route-badge.secret  { color: #4a3520; border-color: rgba(74,53,32,0.4); background: rgba(74,53,32,0.06); }

/* ── 역사 메모 박스 ── */
.history-note {
  background: var(--surface2);
  border-left: 3px solid var(--sepia);
  border-radius: 0 2px 2px 0;
  padding: 14px 16px;
  margin: 20px 0;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
  font-weight: 300;
}
.history-note::before {
  content: '📜 실제 역사';
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--sepia);
  margin-bottom: 6px;
  font-family: var(--font-body);
}

/* ── 압박 카드 (씬 6) ── */
.pressure-card {
  background: #1a1208;
  border: 1px solid rgba(205,46,58,0.3);
  border-radius: 2px;
  padding: 20px;
  margin-bottom: 24px;
  color: #e8dcc8;
  font-size: 15px;
  line-height: 2;
  font-weight: 300;
  white-space: pre-line;
}
.pressure-card em {
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

/* ── 엔딩 ── */
.ending-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--primary);
  border-radius: 0 0 2px 2px;
  padding: 24px;
  margin-bottom: 24px;
}
.ending-icon { font-size: 36px; margin-bottom: 12px; }
.ending-title {
  font-family: var(--font-title);
  font-size: 22px;
  color: var(--primary);
  margin-bottom: 12px;
}
.ending-text {
  font-size: 15px;
  line-height: 2;
  color: var(--text);
  font-weight: 300;
  white-space: pre-line;
}

/* ── 선택 요약 ── */
.summary-box {
  background: rgba(0,48,135,0.04);
  border: 1px solid rgba(0,48,135,0.15);
  border-radius: 2px;
  padding: 16px 20px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
}
.summary-box strong { color: var(--text); font-weight: 500; }

/* ── 소감 입력 ── */
.comment-section { margin-bottom: 20px; }
.comment-label {
  font-size: 12px;
  color: var(--sepia);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  font-weight: 500;
}
.comment-textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 300;
  color: var(--text);
  resize: none;
  line-height: 1.7;
  transition: border-color 0.2s;
}
.comment-textarea:focus {
  outline: none;
  border-color: var(--primary);
}

/* ── 저작권 ── */
.copyright {
  text-align: center;
  font-size: 11px;
  color: rgba(120,100,80,0.4);
  margin-top: 8px;
  letter-spacing: 0.08em;
}

/* ── 인트로 화면 ── */
.intro-header {
  padding: 48px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.intro-eyebrow {
  font-size: 11px;
  letter-spacing: 0.28em;
  color: var(--sepia);
  font-weight: 500;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.intro-title {
  font-family: var(--font-title);
  font-size: clamp(28px, 7vw, 42px);
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 12px;
}
.intro-subtitle {
  font-size: 14px;
  color: var(--muted);
  font-weight: 300;
  letter-spacing: 0.05em;
  line-height: 1.7;
}
.intro-body {
  font-size: 15px;
  line-height: 2;
  color: var(--text);
  font-weight: 300;
  margin-bottom: 32px;
  white-space: pre-line;
}
.route-preview {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}
.route-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 14px;
}
.route-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.route-item:nth-child(1) .route-dot { background: var(--accent); }
.route-item:nth-child(2) .route-dot { background: var(--primary); }
.route-item:nth-child(3) .route-dot { background: #4a3520; }
.route-name { font-weight: 500; color: var(--text); flex: 1; }
.route-note { font-size: 12px; color: var(--muted); font-weight: 300; }

/* ── 전환 텍스트 박스 ── */
.transition-box {
  background: var(--surface2);
  border: 1px dashed rgba(139,115,85,0.5);
  border-radius: 2px;
  padding: 16px 20px;
  margin: 20px 0;
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  font-style: italic;
}

/* ── 반응형 ── */
@media (max-width: 480px) {
  #app { padding: 0 16px; }
  .scene { padding-top: 28px; }
  .choice-card { padding: 14px 16px; }
  .btn { padding: 14px 20px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const SUPABASE_URL = 'https://xgniwztlrakkrbzcfklb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnbml3enRscmFra3JiemNma2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDUxNTQsImV4cCI6MjA5NDE4MTE1NH0.lvYjcvKFVqt_rLQwVgUEQB5pbyQ2saRwaoH8LLuFuqw';
const CLASS = new URLSearchParams(location.search).get('class') || '미입력';

const TOTAL_SCENES = 7;

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let S = {
  scene: 0,        // 0=인트로, 1~7=씬
  route: null,     // 'public' | 'educ' | 'secret'
  scene5Choice: null, // 'stay' | 'switch'
  submitted: false,
};

const ROUTE_LABELS = {
  public: '공개 운동 — 경제 이권 수호',
  educ:   '계몽 운동 — 학교·신문',
  secret: '비밀 조직 — 신민회',
};
const ROUTE_BADGES = {
  public: '공개 운동',
  educ:   '계몽 운동',
  secret: '비밀 조직',
};

/* ══════════════════════════════════════════
   SUPABASE
══════════════════════════════════════════ */
function sendToSupabase(choiceData, comment) {
  fetch(`${SUPABASE_URL}/rest/v1/game_results`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({
      class: CLASS,
      game: 'gaemong1905',
      choices: choiceData,
      comment: comment,
      timestamp: new Date().toISOString(),
    }),
  }).catch(() => {});
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function updateProgress() {
  const pct = S.scene === 0 ? 0 : Math.round((S.scene / TOTAL_SCENES) * 100);
  document.getElementById('progress').style.width = pct + '%';
}

function R() {
  window.scrollTo(0, 0);
  updateProgress();
  const app = document.getElementById('app');
  const scene = S.scene;
  if      (scene === 0) app.innerHTML = renderIntro();
  else if (scene === 1) app.innerHTML = renderScene1();
  else if (scene === 2) app.innerHTML = renderScene2();
  else if (scene === 3) app.innerHTML = renderScene3();
  else if (scene === 4) app.innerHTML = renderScene4();
  else if (scene === 5) app.innerHTML = renderScene5();
  else if (scene === 6) app.innerHTML = renderScene6();
  else if (scene === 7) app.innerHTML = renderScene7();
}

/* ── 씬 라벨 ── */
function sceneLabel(n) {
  return `<div class="scene-label">씬 ${n} / ${TOTAL_SCENES}</div>`;
}

/* ── 노선 뱃지 ── */
function routeBadge() {
  if (!S.route) return '';
  return `<div class="route-badge ${S.route}">${ROUTE_BADGES[S.route]}</div>`;
}

/* ══════════════════════════════════════════
   씬 0 — 인트로
══════════════════════════════════════════ */
function renderIntro() {
  return `
  <div class="scene">
    <div class="intro-header">
      <p class="intro-eyebrow">애국계몽운동 · 1904–1910</p>
      <h1 class="intro-title">1905년의<br>선택</h1>
      <p class="intro-subtitle">나라를 지키는 방법은 하나가 아니었다</p>
    </div>
    <p class="intro-body">을사늑약이 체결된 1905년.
당신은 이 땅에 남아 싸우기로 했습니다.
그러나 어떻게 싸울 것인가는
당신이 결정해야 합니다.

세 가지 길이 있습니다.</p>
    <div class="route-preview">
      <div class="route-item">
        <div class="route-dot"></div>
        <span class="route-name">일본의 경제 침탈에 맞선다</span>
        <span class="route-note">공개 운동</span>
      </div>
      <div class="route-item">
        <div class="route-dot"></div>
        <span class="route-name">학교와 신문으로 사람들을 키운다</span>
        <span class="route-note">계몽 운동</span>
      </div>
      <div class="route-item">
        <div class="route-dot"></div>
        <span class="route-name">드러나지 않는 조직을 만든다</span>
        <span class="route-note">비밀 조직</span>
      </div>
    </div>
    <button class="btn" onclick="go(1)">시작하기 →</button>
  </div>`;
}

/* ══════════════════════════════════════════
   씬 1 — 1905년 현실 (선택 없음)
══════════════════════════════════════════ */
function renderScene1() {
  return `
  <div class="scene">
    ${sceneLabel(1)}
    <div class="year-block">1904–1905</div>
    <h2 class="scene-title">당신 앞의 현실</h2>
    <hr class="divider">
    <p class="scene-body">1904년, 일본은 대한제국의 황무지를 요구했습니다.
1년 뒤, 을사늑약이 체결되었습니다.

군대는 이미 무장을 빼앗겼습니다.
무기고는 비어 있습니다.
러일전쟁에서 이긴 일본을 막아줄 나라는 없습니다.

통감부가 서울에 들어섰습니다.
사람들은 감시당하고, 모임은 의심받습니다.

당신은 분노합니다.
그러나 지금 당장 싸울 수 있는 조건이 없습니다.

당신에게 남은 것은 사람과 시간뿐입니다.</p>
    <button class="btn" onclick="go(2)">다음으로 →</button>
  </div>`;
}

/* ══════════════════════════════════════════
   씬 2 — 노선 선택
══════════════════════════════════════════ */
function renderScene2() {
  const canNext = S.route !== null;
  return `
  <div class="scene">
    ${sceneLabel(2)}
    <h2 class="scene-title">당신은 어디에<br>힘을 쓰겠습니까</h2>
    <hr class="divider">
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px;font-weight:300;line-height:1.8">군대도, 무기도 없습니다.<br>그러나 아직 사람은 남아 있습니다.</p>
    <div class="choices">
      <div class="choice-card ${S.route==='public'?'selected':''}" onclick="selectRoute('public')">
        <div class="choice-num">선택지 ①</div>
        <div class="choice-title">일본의 경제 침탈에 맞선다</div>
        <div class="choice-desc">지금 막지 못하면, 싸울 기반도 사라진다.</div>
      </div>
      <div class="choice-card ${S.route==='educ'?'selected':''}" onclick="selectRoute('educ')">
        <div class="choice-num">선택지 ②</div>
        <div class="choice-title">학교와 신문으로 사람들을 키운다</div>
        <div class="choice-desc">총은 없지만, 배울 사람은 아직 남아 있다.</div>
      </div>
      <div class="choice-card ${S.route==='secret'?'selected':''}" onclick="selectRoute('secret')">
        <div class="choice-num">선택지 ③</div>
        <div class="choice-title">드러나지 않는 조직을 만든다</div>
        <div class="choice-desc">감시받지 않는 곳에서 움직여야 한다.</div>
      </div>

function go(n) {

}

function goFinal() {
  S.scene = 7;
  if (!S.submitted) {
    sendToSupabase({
      route: S.route,
      scene5: S.scene5Choice,
    }, '');
    S.submitted = true;
  }
  R();
}

function copyResult() {
  const comment = document.getElementById('comment')?.value?.trim() || '';
  if (comment) {
    sendToSupabase({
      route: S.route,
      scene5: S.scene5Choice,
    }, comment);
  }

  const d = ENDINGS[S.route];
  const s5label = S.scene5Choice === 'stay' ? '방식을 이어간다' : '다른 길을 찾는다';
  const lines = [
    `📋 1905년의 선택 — 애국계몽운동`,
    ``,
    `처음 선택한 길: ${ROUTE_LABELS[S.route]}`,
    `한계에 부딪혔을 때: ${s5label}`,
    ``,
    `${d.icon} ${d.title.replace('\n', ' ')}`,
    ``,
    comment ? `소감: ${comment}` : '',
    `— 찰리쌤의 한국사 게임실 · hischarlie.tistory.com`,
  ].filter(l => l !== null && l !== undefined).join('\n').replace(/\n{3,}/g, '\n\n');

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(lines).then(() => showToast('📋 결과가 복사되었습니다!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = lines;
    ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
    try { document.execCommand('copy'); showToast('📋 결과가 복사되었습니다!'); }
    catch (e) { showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
  }
}

function restart() {
  S = { scene: 0, route: null, scene5Choice: null, submitted: false };
  R();
}

/* ── 토스트 ── */
let toastTimer = null;
function showToast(msg) {
  let el = document.getElementById('toast-msg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast-msg';
    el.style.cssText = `
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      background:#1a1a1a;color:#f0ece4;border-radius:20px;
      padding:10px 22px;font-size:13px;font-family:var(--font-body);
      opacity:0;pointer-events:none;white-space:nowrap;z-index:9999;
      transition:opacity 0.3s;border:1px solid rgba(255,255,255,0.1);
    `;
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2400);
}
