<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>고려 지배세력 탐정단</title>
<style>
:root {
  --bg:     #0d1a1f;
  --bg2:    #111f26;
  --celadon:#4a9a8a;
  --celd:   #2e6e60;
  --celf:   #7bc4b4;
  --cream:  #f0ede4;
  --cream2: #e4dfd4;
  --ink:    #1a1f1e;
  --gold:   #c49a30;
  --gold2:  #e0b840;
  --muted:  #6a8a84;
  --danger: #c04040;
  --correct:#2e7a58;
  --font-b: 'Georgia', serif;
  --font-s: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 30%, rgba(74,154,138,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(17,31,38,0.9) 0%, transparent 50%);
  min-height:100vh;display:flex;justify-content:center;
  padding:20px 12px 60px;font-family:var(--font-s);
}
#app{width:100%;max-width:460px;}
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg2);color:var(--cream);
  border:1px solid var(--celadon);border-radius:2px;
  padding:10px 22px;font-size:13px;
  opacity:0;pointer-events:none;z-index:9999;transition:opacity 0.3s;
  white-space:nowrap;
}
#toast.show{opacity:1;}

/* ─── GLOSS ─── */
.term{border-bottom:1.5px dotted var(--celadon);cursor:pointer;border-radius:2px;padding:0 1px;transition:background 0.15s;}
.term:hover,.term:active{background:rgba(74,154,138,0.15);}
#gloss-popup{
  position:fixed;z-index:9998;background:var(--bg2);color:var(--cream);
  border:1px solid var(--celadon);border-radius:4px;
  padding:10px 14px;font-size:12px;line-height:1.7;font-family:var(--font-s);
  max-width:240px;box-shadow:0 6px 24px rgba(0,0,0,0.6);display:none;
  animation:glossIn 0.15s ease;
}
@keyframes glossIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
#gloss-popup .g-term{font-weight:700;color:var(--celf);margin-bottom:4px;font-size:13px;}
#gloss-popup .g-close{float:right;cursor:pointer;color:var(--muted);font-size:14px;margin-left:8px;}

/* ─── CARD SHELL ─── */
.card-shell{
  background:var(--cream);
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(200,240,230,0.4) 0%, transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(74,154,138,0.05) 26px,rgba(74,154,138,0.05) 27px);
  border-radius:3px;
  box-shadow:
    0 0 0 1px rgba(74,154,138,0.5),
    0 0 0 4px var(--bg),
    0 0 0 5px rgba(74,154,138,0.25),
    0 20px 60px rgba(0,0,0,0.7);
  animation:unfurl 0.4s cubic-bezier(0.22,1,0.36,1);
  position:relative;overflow:hidden;
}
@keyframes unfurl{from{opacity:0;transform:translateY(12px) scaleY(0.97);}to{opacity:1;transform:translateY(0) scaleY(1);}}
.card-shell>*{position:relative;z-index:1;}
.cr{position:absolute;width:18px;height:18px;border-style:solid;border-color:var(--celadon);opacity:0.4;z-index:2;}
.cr.tl{top:7px;left:7px;border-width:1.5px 0 0 1.5px;}
.cr.tr{top:7px;right:7px;border-width:1.5px 1.5px 0 0;}
.cr.bl{bottom:7px;left:7px;border-width:0 0 1.5px 1.5px;}
.cr.br{bottom:7px;right:7px;border-width:0 1.5px 1.5px 0;}

/* ─── DARK SHELL (intro/result) ─── */
.dark-shell{
  background:var(--bg2);
  border-radius:3px;
  box-shadow:
    0 0 0 1px rgba(74,154,138,0.4),
    0 0 0 4px var(--bg),
    0 0 0 5px rgba(74,154,138,0.2),
    0 20px 60px rgba(0,0,0,0.7);
  animation:unfurl 0.4s cubic-bezier(0.22,1,0.36,1);
  position:relative;overflow:hidden;
}
.dark-shell>*{position:relative;z-index:1;}
.dark-shell .cr{border-color:var(--celadon);}

/* ─── PROGRESS ─── */
.progress-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 20px;
  background:rgba(74,154,138,0.06);
  border-bottom:1px solid rgba(74,154,138,0.2);
}
.prog-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.prog-track{flex:1;display:flex;gap:4px;}
.prog-pip{flex:1;height:4px;border-radius:2px;background:rgba(74,154,138,0.15);transition:background 0.4s;}
.prog-pip.done{background:var(--correct);}
.prog-pip.wrong{background:var(--danger);}
.prog-pip.active{background:var(--celadon);}
.prog-score{font-size:12px;font-weight:700;color:var(--celadon);min-width:36px;text-align:right;}

/* ─── HEADER ─── */
.card-header{border-bottom:2px solid var(--celadon);padding:18px 20px 14px;text-align:center;}
.h-badge{font-size:11px;letter-spacing:0.2em;color:var(--celd);margin-bottom:8px;font-weight:700;}
.dark-shell .h-badge{color:var(--celadon);}
.h-title{font-family:var(--font-b);font-size:20px;font-weight:800;color:var(--ink);line-height:1.3;}
.dark-shell .h-title{color:var(--cream);}
.h-sub{font-size:11px;color:var(--muted);margin-top:5px;}

.body{padding:18px 20px 26px;}

/* ─── INTRO ─── */
.intro-emblem{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--celd),var(--bg2));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 16px;
  box-shadow:0 0 0 2px var(--bg2),0 0 0 4px var(--celadon),0 6px 20px rgba(0,0,0,0.4);
  animation:sealDrop 0.5s 0.2s both cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes sealDrop{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.intro-text{font-size:13px;color:var(--cream2);line-height:2;text-align:center;margin-bottom:16px;}
.intro-text strong{color:var(--celf);font-weight:700;}

.power-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
.power-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:2px;
  background:rgba(74,154,138,0.07);
  border:1px solid rgba(74,154,138,0.2);
  border-left:3px solid;
}
.power-item .p-era{font-size:10px;color:var(--muted);min-width:60px;}
.power-item .p-name{font-size:13px;font-weight:700;flex:1;}
.power-item .p-icon{font-size:18px;}

/* ─── SPEECH CARD ─── */
.speech-wrap{
  background:rgba(74,154,138,0.05);
  border:1px solid rgba(74,154,138,0.25);
  border-radius:3px;padding:18px 18px 16px;
  margin-bottom:18px;position:relative;
}
.speech-wrap::before{
  content:'"';
  position:absolute;top:-4px;left:12px;
  font-size:48px;color:var(--celadon);opacity:0.25;
  font-family:var(--font-b);line-height:1;
}
.speaker-label{
  font-size:10px;letter-spacing:0.2em;color:var(--muted);
  font-weight:700;margin-bottom:10px;
}
.speech-text{
  font-size:14px;color:var(--ink);line-height:1.9;
  font-family:var(--font-b);
  font-style:italic;
}
.card-num{
  position:absolute;top:10px;right:12px;
  font-size:10px;color:var(--muted);font-family:var(--font-s);
}

/* ─── POWER BUTTONS ─── */
.pow-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;letter-spacing:0.08em;}
.pow-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.pow-btn{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,0.55);
  border:1.5px solid rgba(74,154,138,0.25);
  border-radius:2px;cursor:pointer;
  font-size:13px;font-family:var(--font-s);color:var(--ink);
  text-align:left;transition:all 0.18s;
  display:flex;align-items:center;gap:10px;
}
.pow-btn:hover:not(:disabled){background:rgba(74,154,138,0.1);border-color:var(--celadon);transform:translateX(2px);}
.pow-btn:disabled{cursor:not-allowed;}
.pow-btn.correct{background:rgba(46,122,88,0.15);border-color:var(--correct);border-width:2px;}
.pow-btn.wrong{background:rgba(192,64,64,0.1);border-color:var(--danger);opacity:0.7;}
.pow-btn.reveal{background:rgba(46,122,88,0.08);border-color:var(--correct);}
.pow-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:rgba(74,154,138,0.3);
}
.correct .pow-dot{background:var(--correct);}
.wrong   .pow-dot{background:var(--danger);}
.reveal  .pow-dot{background:var(--correct);}

/* ─── VERDICT ─── */
.verdict{text-align:center;padding:8px 0 12px;}
.stamp{
  width:64px;height:64px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;border:3px solid;
  animation:stampIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes stampIn{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.stamp.ok{border-color:var(--correct);background:rgba(46,122,88,0.1);}
.stamp.ng{border-color:var(--danger);background:rgba(192,64,64,0.07);}

/* ─── FEEDBACK ─── */
.fb-box{
  border-radius:2px;padding:12px 14px;margin-top:10px;
  font-size:12px;line-height:1.8;animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fb-ok{background:rgba(46,122,88,0.08);border:1px solid var(--correct);border-left:3px solid var(--correct);}
.fb-ng{background:rgba(192,64,64,0.06);border:1px solid var(--danger);border-left:3px solid var(--danger);}
.fb-head{font-size:13px;font-weight:700;margin-bottom:6px;}
.fb-ok .fb-head{color:var(--correct);}
.fb-ng .fb-head{color:var(--danger);}

/* ─── BTN ─── */
.btn{width:100%;padding:13px;border:none;border-radius:2px;font-family:var(--font-b);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;letter-spacing:0.04em;}
.btn+.btn{margin-top:8px;}
.btn-celd{background:var(--celd);color:#fff;border:1.5px solid var(--celadon);}
.btn-celd:hover{background:var(--celadon);transform:translateY(-1px);}
.btn-dark{background:var(--bg2);color:var(--cream);border:1.5px solid var(--celadon);}
.btn-dark:hover{background:#1a2f38;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--muted);border:1.5px solid rgba(74,154,138,0.3);}
.btn-outline:hover{border-color:var(--celadon);color:var(--cream);}

/* ─── FINAL ─── */
.final-banner{text-align:center;padding:18px 0 14px;border-bottom:1px solid rgba(74,154,138,0.25);margin-bottom:14px;}
.f-icon{font-size:52px;margin-bottom:10px;}
.f-grade{font-size:11px;color:var(--celadon);letter-spacing:0.2em;margin-bottom:4px;}
.f-title{font-family:var(--font-b);font-size:20px;font-weight:800;color:var(--cream);margin-bottom:6px;}
.f-desc{font-size:12px;color:var(--muted);line-height:1.7;}
.f-score{font-size:12px;color:var(--celadon);margin-top:6px;font-weight:700;}

/* ─── FLOW TABLE ─── */
.flow-wrap{margin-bottom:16px;}
.flow-title{
  background:var(--celd);color:#fff;
  padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:0.15em;
  border-radius:2px 2px 0 0;
}
.flow-row{
  display:flex;align-items:stretch;
  border:1px solid rgba(74,154,138,0.2);border-top:none;
  background:rgba(74,154,138,0.04);
}
.flow-row:nth-child(even){background:rgba(74,154,138,0.08);}
.flow-era{font-size:10px;color:var(--muted);padding:10px 8px;border-right:1px solid rgba(74,154,138,0.15);min-width:60px;display:flex;align-items:center;}
.flow-icon{font-size:18px;padding:8px;border-right:1px solid rgba(74,154,138,0.15);display:flex;align-items:center;}
.flow-right{flex:1;padding:8px 10px;}
.flow-name{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:3px;}
.flow-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.flow-arrow{display:flex;justify-content:center;padding:4px 0;font-size:12px;color:rgba(74,154,138,0.5);}

.badge-wrap{background:var(--celd);border-radius:2px;padding:14px;margin:12px 0;text-align:center;animation:fadeIn 0.5s 0.2s both;}
.bw-tag{font-size:10px;color:rgba(200,240,230,0.6);letter-spacing:0.2em;margin-bottom:4px;}
.bw-icon{font-size:32px;margin-bottom:4px;}
.bw-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px;}
.bw-desc{font-size:11px;color:rgba(200,240,230,0.65);line-height:1.5;}

hr.div{border:none;height:1px;background:linear-gradient(90deg,transparent,rgba(74,154,138,0.3),transparent);margin:12px 0;}
</style>
</head>
<body>
<div id="toast"></div>
<div id="gloss-popup"><span class="g-close" onclick="closeGloss()">✕</span><div class="g-term" id="g-term"></div><div id="g-def"></div></div>
<div id="app"></div>
<script>
// ═══ 용어 사전 ═══
const GLOSSARY={
  호족:{term:'호족(豪族)',def:'고려 건국 초기의 지방 세력가. 독자적인 군사력과 경제력을 가졌으며, 왕건은 이들의 협력을 얻기 위해 혼인 동맹과 사성(왕씨 성 하사) 정책을 펼쳤습니다.'},
  노비안검법:{term:'노비안검법(奴婢按檢法)',def:'광종이 실시한 정책. 전쟁 등으로 억울하게 노비가 된 사람을 조사해 양인으로 해방시켰습니다. 호족의 경제 기반(노비)을 약화시키는 왕권 강화 정책이었습니다.'},
  음서:{term:'음서(蔭敍)',def:'5품 이상 고위 관리의 자손에게 시험 없이 관직을 주는 제도. 고려 문벌이 대를 이어 권력을 유지할 수 있었던 핵심 제도입니다.'},
  문벌:{term:'문벌(門閥貴族)',def:'고려 전기 지배세력. 여러 대에 걸쳐 고위 관직을 독점하고, 왕실이나 귀족 가문끼리 중첩 혼인으로 권력을 유지했습니다. 인주 이씨, 파평 윤씨 등이 대표적입니다.'},
  무신정변:{term:'무신정변(武臣政變, 1170)',def:'의종 24년, 정중부·이의방 등 무신들이 문신 중심의 조정에 반발해 일으킨 쿠데타. "문관의 관을 쓴 자는 모조리 죽여라"는 구호로 유명합니다.'},
  교정도감:{term:'교정도감(敎定都監)',def:'최충헌이 설치한 최고 권력 기구. 국정 전반을 장악했으며, 이후 최씨 무신정권이 60여 년간 권력을 유지하는 기반이 되었습니다.'},
  원간섭기:{term:'원 간섭기',def:'몽골(원나라)과의 강화 이후(1259~1356) 고려가 원의 간섭을 받던 시기. 원나라 공주가 왕비가 되었고, 왕의 이름에도 몽골식 이름이 사용되었습니다.'},
  권문세족:{term:'권문세족(權門勢族)',def:'원 간섭기에 성장한 새로운 지배세력. 원나라와의 연결고리(몽골어 능통, 원나라 관직)를 이용해 권력을 잡았으며, 불법적인 토지 겸병으로 대규모 농장을 소유했습니다.'},
  농장:{term:'농장(農莊)',def:'고려 말 권력자들이 타인의 토지를 강제로 빼앗아 만든 대규모 사유지. "산과 강으로 경계를 삼는다"는 표현처럼 그 규모가 어마어마했습니다. 국가 재정을 위협하고, 땅을 잃은 농민들이 고향을 떠나 떠돌이가 되었습니다.'},
  신진사대부:{term:'신진사대부(新進士大夫)',def:'고려 말에 성장한 새로운 세력. 성리학을 공부하고 과거를 통해 중앙에 진출했습니다. 권문세족의 비리를 비판하며 개혁을 주장했고, 이후 조선 건국의 주체가 됩니다.'},
  성리학:{term:'성리학(性理學)',def:'중국 송나라에서 발달한 유학의 한 갈래. 고려 말 안향이 도입했으며, 신진사대부의 이념적 기반이 되었습니다. 불교의 폐단을 비판하고 합리적 사회 질서를 추구했습니다.'},
  전민변정도감:{term:'전민변정도감(田民辨正都監)',def:'공민왕 때 신돈의 건의로 설치. 권문세족이 강제로 빼앗은 토지를 원 주인에게 돌려주고, 억울하게 노비가 된 사람을 양인으로 해방시키는 개혁 기구였습니다.'},
  과전법:{term:'과전법(科田法)',def:'고려 말 이성계 세력이 단행한 토지 개혁. 불법으로 빼앗긴 토지를 혁파하고 재분배했습니다. 조선 건국의 경제적 토대가 됩니다.'},
  사성정책:{term:'사성정책(賜姓政策)',def:'왕건이 공을 세운 지방 호족에게 성씨를 내려준 정책. 왕씨뿐 아니라 다양한 성씨를 하사했습니다. 혼인 동맹과 함께 호족을 회유하는 수단이었습니다.'},
};
function T(word,key){return `<span class="term" onclick="showGloss(event,'${key}')">${word}</span>`;}
function showGloss(e,key){
  e.stopPropagation();
  const g=GLOSSARY[key];if(!g)return;
  const p=document.getElementById('gloss-popup');
  document.getElementById('g-term').textContent=g.term;
  document.getElementById('g-def').textContent=g.def;
  // 일단 보이지 않는 곳에서 렌더해 실제 크기 측정
  p.style.left='0px';p.style.top='-9999px';p.style.display='block';
  requestAnimationFrame(()=>{
    const pw=p.offsetWidth, ph=p.offsetHeight;
    const vw=window.innerWidth, vh=window.innerHeight;
    let x=e.clientX;
    let y=e.clientY+16;
    // 오른쪽 이탈 방지
    x=Math.max(8, Math.min(x, vw-pw-8));
    // 아래 이탈 시 위로
    if(y+ph>vh-8) y=e.clientY-ph-8;
    y=Math.max(8,y);
    p.style.left=x+'px';
    p.style.top=y+'px';
  });
}
function closeGloss(){document.getElementById('gloss-popup').style.display='none';}
document.addEventListener('click',closeGloss);

  {min:8, icon:'📜',grade:'선임 탐정',name:'날카로운 추리',desc:'거의 모두 맞혔습니다. 각 세력의 특징을 잘 파악하고 있습니다.'},
  {min:6, icon:'🏯',grade:'탐정 견습',name:'가능성의 탐정',desc:'절반 이상 맞혔습니다. 헷갈리는 세력이 있었나요? 다시 한 번 확인해보세요.'},
  {min:0, icon:'📖',grade:'역사 입문자',name:'고려가 어렵소',desc:'각 세력의 특징이 아직 헷갈립니다. 아래 흐름표를 꼭 확인해보세요.'},
];

// ═══ 유틸 ═══
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function crn(){return '<div class="cr tl"></div><div class="cr tr"></div><div class="cr bl"></div><div class="cr br"></div>';}
function progBar(){
  const pips=CARDS.map((_,i)=>{
    let c='prog-pip';
    const r=S.results[i];
    if(r!=null){c+=r?' done':' wrong';}
    else if(i===S.ci)c+=' active';
    return `<div class="${c}"></div>`;
  }).join('');
  return `<div class="progress-row"><span class="prog-label">🔍 단서 카드</span><div class="prog-track">${pips}</div><span class="prog-score">${S.score}/${CARDS.length}</span></div>`;
}

// ═══ 상태 ═══
let CARDS=[];
let S={phase:'intro',ci:0,answered:false,selectedId:null,score:0,results:[]};

function initCards(){
  // 20장 풀에서 매 플레이마다 10장 랜덤 추출
  CARDS=shuffle(CARDS_RAW).slice(0,10);
}

// ═══ 렌더 ═══
function R(){
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('app').innerHTML=
    S.phase==='intro'?renderIntro():
    S.phase==='game'?renderGame():renderFinal();
}

function renderIntro(){
  const plist=POWERS.map(p=>`
    <div class="power-item" style="border-left-color:${p.color}">
      <span class="p-era">${p.era}</span>
      <span class="p-name" style="color:${p.color}">${p.icon} ${p.name}</span>
    </div>`).join('');
  return `
  <div class="dark-shell">
    ${crn()}
    <div class="card-header">
      <div class="h-badge">🔍 고려사 탐정단 수사 의뢰</div>
      <div class="h-title">이 말, 누가 했을까?</div>
      <div class="h-sub">고려 지배세력 변천사 추리</div>
    </div>
    <div class="body">
      <div class="intro-emblem">🏯</div>
      <div class="intro-text">
        고려 500년, <strong>5개의 세력</strong>이<br>
        차례로 권력을 잡았습니다.<br><br>
        각 세력의 인물이 남긴 말을 읽고<br>
        <strong>누가 한 말인지</strong> 맞혀보세요.<br>
        밑줄 친 용어를 탭하면 설명을 볼 수 있습니다.
      </div>
      <div class="power-list">${plist}</div>
      <button class="btn btn-celd" onclick="startGame()">수사를 시작한다 →</button>
    </div>
  </div>`;
}

function renderGame(){
  const c=CARDS[S.ci];
  const pow=POWERS.find(p=>p.id===c.pid);

  const btns=POWERS.map(p=>{
    let cls='pow-btn';
    if(S.answered){
      if(p.id===c.pid)cls+=' reveal';
      if(p.id===S.selectedId&&p.id!==c.pid)cls+=' wrong';
      if(p.id===S.selectedId&&p.id===c.pid)cls='pow-btn correct';
    }
    return `<button class="${cls}" ${S.answered?'disabled':''} onclick="selectPower('${p.id}')">
      <span class="pow-dot"></span>
      <span>${p.icon} ${p.name} <span style="font-size:10px;color:var(--muted)">(${p.era})</span></span>
    </button>`;
  }).join('');

  const isOk=S.answered&&S.selectedId===c.pid;
  const verdictHtml=S.answered?`<div class="verdict"><div class="stamp ${isOk?'ok':'ng'}">${isOk?'✓':'✗'}</div></div>`:'';
  const fbHtml=S.answered?`
    <div class="fb-box ${isOk?'fb-ok':'fb-ng'}">
      <div class="fb-head">${isOk?`✅ 정확! — ${pow.icon} ${pow.name}`:`❌ 오답 — ${pow.icon} ${pow.name}이 한 말입니다`}</div>
      <div>${c.fb}</div>
    </div>`:'';
  const nextLabel=S.ci<CARDS.length-1?'다음 카드 →':'최종 결과 보기 →';

  return `
  ${progBar()}
  <div class="card-shell">
    ${crn()}
    <div class="card-header">
      <div class="h-badge">💬 ${S.ci+1} / ${CARDS.length}번째 대사</div>
      <div class="h-title">이 말을 한 사람은?</div>
    </div>
    <div class="body">
      <div class="speech-wrap">
        <div class="speaker-label">고려 시대 어느 인물의 말</div>
        <div class="speech-text">${c.text}</div>
        <div class="card-num">${S.ci+1}/${CARDS.length}</div>
      </div>
      <div class="pow-label">이 말을 한 세력을 선택하시오</div>
      <div class="pow-grid">${btns}</div>
      ${verdictHtml}
      ${fbHtml}
      ${S.answered?`<button class="btn btn-dark" style="margin-top:14px" onclick="nextCard()">${nextLabel}</button>`:''}
    </div>
  </div>`;
}

function renderFinal(){
  const rank=RANKS.find(r=>S.score>=r.min);

  // 흐름표
  const flowHtml=POWERS.map((p,i)=>{
    const arrow=i<POWERS.length-1?`<div class="flow-arrow">↓</div>`:'';
    return `
    <div class="flow-row">
      <div class="flow-era">${p.era}</div>
      <div class="flow-icon">${p.icon}</div>
      <div class="flow-right">
        <div class="flow-name" style="color:${p.color}">${p.name}</div>
        <div class="flow-desc">${p.desc}</div>
      </div>
    </div>${arrow}`;
  }).join('');

  return `
  <div class="dark-shell">
    ${crn()}
    <div class="card-header">
      <div class="h-badge">📋 수사 완료 — 최종 보고서</div>
      <div class="h-title">고려 지배세력 변천</div>
      <div class="h-sub">10개 대사 판별 결과 (총 20장 풀에서 랜덤 출제)</div>
    </div>
    <div class="body">
      <div class="final-banner">
        <div class="f-icon">${rank.icon}</div>
        <div class="f-grade">${rank.grade}</div>
        <div class="f-title">${rank.name}</div>
        <div class="f-desc">${rank.desc}</div>
        <div class="f-score">정확도 ${S.score} / ${CARDS.length}</div>
      </div>
      <div class="flow-wrap">
        <div class="flow-title">📖 고려 지배세력 변천 흐름</div>
        ${flowHtml}
      </div>
      <div class="badge-wrap">
        <div class="bw-tag">✨ 탐정 칭호</div>
        <div class="bw-icon">${rank.icon}</div>
        <div class="bw-name">${rank.grade} — ${rank.name}</div>
        <div class="bw-desc">고려 500년의 권력 이동 — 호족 → 문벌 → 무신 → 권문세족 → 신진사대부. 각 세력의 교체 배경을 이해하면 고려사의 절반은 끝납니다.</div>
      </div>
      <button class="btn btn-celd" onclick="copyResult()" style="margin-bottom:8px">📋 내 결과 복사하기 (패들렛 공유용)</button>
      <button class="btn btn-outline" onclick="confirmRestart()">다시 도전하기</button>
    </div>
  </div>`;
}

// ═══ 이벤트 ═══
function startGame(){
  initCards();
  S={phase:'game',ci:0,answered:false,selectedId:null,score:0,results:[]};
  R();
}
function selectPower(id){
  if(S.answered)return;
  S.selectedId=id;S.answered=true;
  const isOk=id===CARDS[S.ci].pid;
  if(isOk)S.score++;
  S.results.push(isOk);
  R();
}
function nextCard(){
  S.ci++;
  if(S.ci>=CARDS.length){S.phase='final';R();}
  else{S.answered=false;S.selectedId=null;R();}
}
function confirmRestart(){
  if(confirm('처음부터 다시 도전하시겠습니까?')){
    S={phase:'intro',ci:0,answered:false,selectedId:null,score:0,results:[]};
    R();
  }
}
function copyResult(){
  const rank=RANKS.find(r=>S.score>=r.min);
  const lines=[
    '🏯 고려 지배세력 탐정단 — 결과','',
    ...CARDS.map((c,i)=>{
      const p=POWERS.find(pw=>pw.id===c.pid);
      return `${i+1}. ${p.icon}${p.name}: ${S.results[i]?'✅':'❌'}`;
    }),
    '',
    `📋 정확도: ${S.score}/${CARDS.length}`,
    `✨ 등급: ${rank.grade} — ${rank.name}`,
    '— 고려 지배세력 변천사 추리 게임',
  ];
  const text=lines.join('\n');
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>showToast('📋 결과가 복사되었습니다!'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');showToast('📋 결과가 복사되었습니다!');}
    catch(e){showToast('❌ 복사 실패');}
    document.body.removeChild(ta);
  }
}

R();
</script>
</body>
